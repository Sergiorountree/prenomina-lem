  );
}

function ComprobanteHorario({ sucursalId, monday, weekId, onClose }) {
  const { state } = useApp();
  const sucursal = (state.sucursales || SEED.sucursales).find(s => s.id === sucursalId);
  const un = SEED.unidades.find(u => u.id === sucursal?.unId);
  const colabs = state.colaboradores.filter(c => c.sucursalId === sucursalId && c.estatus === 'activo');
  const horario = state.horarios?.[sucursalId + '_' + weekId];
  const prenomina = state.prenominas[sucursalId + '_' + weekId];
  const hayDatos = !!horario || !!prenomina;

  const dnCorto = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];

  // Para cada colaborador, arma sus 7 días y total de horas
  function datosColab(c) {
    const dias = [];
    let totalHoras = 0;
    let diasTrabajados = 0;
    for (let d = 0; d < 7; d++) {
      const h = horario?.detalle?.[c.id]?.[d];          // turno planeado (con horas)
      const pre = prenomina?.detalle?.[c.id]?.[d];        // indicador real capturado
      let texto = '—';

      // 1) Si hay horario con turno, usa las horas reales del turno
      if (h && h.tipo === 'trabaja') {
        texto = (h.entrada || '') + '-' + (h.salida || '');
        totalHoras += horasDeTurno(h.entrada, h.salida);
        diasTrabajados++;
      } else if (h && h.tipo === 'descanso') {
        texto = 'D';
      } else if (h && h.tipo === 'vacaciones') {
        texto = 'VAC';
      } else if (h && h.tipo === 'pcgs') {
        texto = 'PCGS';
      } else if (h && h.tipo === 'psgs') {
        texto = 'PSGS';
      }
      // 2) Si NO hubo horario pero la pre-nómina tiene indicador, úsalo
      else if (pre && pre.indicador) {
        texto = pre.indicador;
        // Si asistió, cuenta como día trabajado (8h jornada estándar como referencia)
        if (pre.indicador === 'A') { diasTrabajados++; totalHoras += 8; }
      }
      dias.push(texto);
    }
    return { dias, totalHoras, diasTrabajados };
  }

  function imprimir() { window.print(); }

  return ReactDOM.createPortal(
    <div className="modal-backdrop print-host" onClick={onClose}>
      <div className="modal-card comprobante-print" style={{ maxWidth: 900, maxHeight: '92vh', overflow: 'auto' }} onClick={e => e.stopPropagation()}>
        {/* Barra de acciones (no se imprime) */}
        <div className="no-print flex items-center justify-between p-4" style={{ borderBottom: '1px solid var(--border)', position: 'sticky', top: 0, background: 'white', zIndex: 2 }}>
          <div className="text-sm text-gray-500">Vista previa del comprobante</div>
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-secondary">Cerrar</button>
            <button onClick={imprimir} className="btn btn-primary"><Icon name="file" size={14} /> Imprimir / Guardar PDF</button>
          </div>
        </div>

        {/* Hoja imprimible */}
        <div className="p-8" id="hoja-comprobante">
          {/* Membrete */}
          <div className="flex items-center justify-between mb-6" style={{ borderBottom: '2px solid #1A1A1A', paddingBottom: 12 }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.02em' }}>Grupo LEM</div>
              <div style={{ fontSize: 13, color: '#555' }}>Comprobante de horario y días laborados</div>
            </div>
            <div style={{ textAlign: 'right', fontSize: 12, color: '#555' }}>
              <div><strong>{sucursal?.nombre}</strong> · {un?.nombre}</div>
              <div>Semana {weekId}</div>
              <div>{fmtFecha(monday)} al {fmtFecha(addDays(monday, 6))}</div>
            </div>
          </div>

          {/* Aviso si la semana no tiene datos capturados */}
          {!hayDatos && (
            <div className="no-print" style={{ background: '#FEF9E7', border: '1px solid #E8C547', borderRadius: 8, padding: '10px 14px', marginBottom: 14, fontSize: 12.5, color: '#7A4B05' }}>
              Esta semana aún no tiene horario ni pre-nómina capturada para {sucursal?.nombre}, por eso los días aparecen vacíos. Puedes imprimir la hoja en blanco para llenarla a mano, o elegir una semana con datos. El comprobante se llena solo cuando exista el horario o la pre-nómina de esa semana.
            </div>
          )}

          {/* Tabla */}
          <table className="w-full" style={{ borderCollapse: 'collapse', fontSize: 11 }}>
            <thead>
              <tr style={{ background: '#F3F1EC' }}>
                <th style={cellHead}>Colaborador</th>
                {dnCorto.map((d, i) => (
                  <th key={i} style={{ ...cellHead, textAlign: 'center', minWidth: 52 }}>
                    {d}<br /><span style={{ fontWeight: 400, color: '#888' }}>{addDays(monday, i).getDate()}</span>
                  </th>
                ))}
                <th style={{ ...cellHead, textAlign: 'center' }}>Días</th>
                <th style={{ ...cellHead, textAlign: 'center' }}>Total hrs</th>
                <th style={{ ...cellHead, minWidth: 160 }}>Firma</th>
              </tr>
            </thead>
            <tbody>
              {colabs.map(c => {
                const { dias, totalHoras, diasTrabajados } = datosColab(c);
                const puesto = SEED.puestos.find(p => p.id === c.puestoId);
                return (
                  <tr key={c.id}>
                    <td style={cell}>
                      <div style={{ fontWeight: 600 }}>{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</div>
                      <div style={{ fontSize: 9, color: '#888' }}>{puesto?.nombre}</div>
                    </td>
                    {dias.map((dx, i) => (
                      <td key={i} style={{ ...cell, textAlign: 'center', fontSize: 9.5 }}>{dx}</td>
                    ))}
                    <td style={{ ...cell, textAlign: 'center', fontWeight: 600 }}>{diasTrabajados > 0 ? diasTrabajados : '—'}</td>
                    <td style={{ ...cell, textAlign: 'center', fontWeight: 600 }}>{totalHoras > 0 ? totalHoras : '—'}</td>
                    <td style={{ ...cell, height: 38 }}></td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          {/* Leyenda */}
          <div style={{ fontSize: 9.5, color: '#777', marginTop: 10 }}>
            A = Asistencia · D = Descanso · FI = Falta injustificada · INC = Incapacidad · VAC = Vacaciones · PSGS / PCGS = Permisos. Las celdas con horario muestran entrada-salida.
          </div>

          {/* Declaración de conformidad */}
          <div style={{ fontSize: 10.5, color: '#444', marginTop: 18, lineHeight: 1.5, borderTop: '1px solid #ddd', paddingTop: 12 }}>
            Los colaboradores firmantes manifiestan estar de acuerdo con los horarios y días laborados registrados en el presente comprobante, correspondientes a la semana indicada.
          </div>

          {/* Firmas de responsables */}
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 40, gap: 40 }}>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ borderTop: '1px solid #333', paddingTop: 6, fontSize: 11 }}>Gerente de sucursal</div>
            </div>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ borderTop: '1px solid #333', paddingTop: 6, fontSize: 11 }}>Recursos Humanos</div>
            </div>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

const cellHead = { textAlign: 'left', padding: '7px 8px', borderBottom: '1.5px solid #333', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.03em' };
const cell = { padding: '6px 8px', borderBottom: '1px solid #e5e5e5', verticalAlign: 'top' };

/* ========================================================================
   HORAS EXTRAS — aprobación de HE reportadas (Contabilidad / Admin)
   ======================================================================== */
function HorasExtrasScreen() {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';

  const semanas = useMemo(() => {
    const set = {};
    Object.values(state.prenominas).forEach(p => {
      if (!set[p.weekId]) set[p.weekId] = { weekId: p.weekId, inicio: p.semanaInicio, fin: p.semanaFin };
    });
    return Object.values(set).sort((a, b) => (a.inicio < b.inicio ? 1 : -1));
  }, [state.prenominas]);

  const [weekId, setWeekId] = useState(semanas[0]?.weekId || '');
  const [montos3, setMontos3] = useState({});

  if (!verSueldos) {
    return (<><TopBar title="Horas extras" subtitle="Aprobación de horas extras" />
      <div className="p-8"><div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
        Este módulo solo está disponible para Contabilidad y Administración.</div></div></>);
  }
  if (semanas.length === 0) {
    return (<><TopBar title="Horas extras" subtitle="Aprobación de horas extras" />
      <div className="p-8"><div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
        Aún no hay pre-nóminas capturadas.</div></div></>);
  }

  const sucursales = state.sucursales || SEED.sucursales;
  const filas = [];
  sucursales.forEach(suc => {
    const preKey = suc.id + '_' + weekId;
    const pre = state.prenominas[preKey];
    if (!pre || !pre.detalle) return;
    Object.keys(pre.detalle).forEach(colabId => {
      const det = pre.detalle[colabId];
      let aCount = 0; for (let d = 0; d < 7; d++) if (det?.[d]?.indicador === 'A') aCount++;
      const auto = aCount === 7 ? 8 : 0;
      const base = det?.horasExtras || 0;
      const he = base + auto;
      if (he <= 0) return;
      const colab = state.colaboradores.find(c => c.id === colabId);
      if (!colab) return;
      filas.push({ suc, colab, det, he, base, auto, preKey });
    });
  });

  function actualizar(preKey, colabId, patch) {
    const pre = state.prenominas[preKey];
    const newPre = { ...pre, detalle: { ...pre.detalle, [colabId]: { ...pre.detalle[colabId], ...patch } } };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
  }
  function aprobar(fila, opcion) {
    const monto3 = parseFloat(montos3[fila.colab.id]);
    if (opcion === '3' && (!monto3 || monto3 <= 0)) { toast('Captura el monto de la opción 3.'); return; }
    actualizar(fila.preKey, fila.colab.id, { heOpcion: opcion, heAprobada: true, heAprobadoPor: user.id, heMonto3: opcion === '3' ? monto3 : 0 });
    addAuditLog({ modulo: 'horasextras', accion: 'aprobar', entidad: fila.preKey + ':' + fila.colab.id, valorAnterior: null, valorNuevo: { opcion, horas: fila.he } });
    toast('Horas extras aprobadas.');
  }
  function quitar(fila) {
    actualizar(fila.preKey, fila.colab.id, { heAprobada: false });
    addAuditLog({ modulo: 'horasextras', accion: 'rechazar', entidad: fila.preKey + ':' + fila.colab.id, valorAnterior: null, valorNuevo: { horas: fila.he } });
    toast('Aprobación retirada.');
  }
  const op1 = (c, he) => Math.round((c.sueldoDiario || 0) / 8 * he * 100) / 100;
  const op2 = (c, he) => Math.round((c.sueldoDiario || 0) / 8 * he * 2 * 100) / 100;
  const fmtM = n => '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const pendientes = filas.filter(f => !f.det.heAprobada).length;

  return (
    <>
      <TopBar title="Horas extras" subtitle="Aprobación de horas extras reportadas por el gerente" />
      <div className="p-8">
        <div className="flex flex-wrap items-end gap-3 mb-6">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Semana</label>
            <select value={weekId} onChange={e => setWeekId(e.target.value)}
              className="px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minWidth: 280 }}>
              {semanas.map(s => <option key={s.weekId} value={s.weekId}>Semana {s.weekId} · {fmtFecha(parseLocalDate(s.inicio))} – {fmtFecha(parseLocalDate(s.fin))}</option>)}
            </select>
          </div>
          <div className="flex-1" />
          <div className="text-sm text-gray-500">{filas.length} con horas extras · {pendientes} por aprobar</div>
        </div>

        {filas.length === 0 ? (
          <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
            No hay horas extras capturadas en esta semana. El gerente las registra en la columna HE de la pre-nómina.
          </div>
        ) : (
          <div className="bg-white rounded-xl shadow-card overflow-x-auto">
            <table className="lem-table w-full" style={{ minWidth: 980 }}>
              <thead><tr>
                <th>Colaborador</th>
                <th className="text-center">Horas</th>
                <th className="text-right">Opción 1<div className="text-[10px] font-normal text-gray-400 normal-case">sueldo/8 × h</div></th>
                <th className="text-right">Opción 2<div className="text-[10px] font-normal text-gray-400 normal-case">hora al doble</div></th>
                <th style={{ minWidth: 150 }}>Opción 3<div className="text-[10px] font-normal text-gray-400 normal-case">monto libre</div></th>
                <th className="text-center">Estado</th>
                <th style={{ minWidth: 180 }}>Observación del gerente</th>
              </tr></thead>
              <tbody>
                {filas.map(fila => {
                  const { colab, suc, he, det } = fila;
                  const un = SEED.unidades.find(u => u.id === suc.unId);
                  const m1 = op1(colab, he), m2 = op2(colab, he);
                  const aprobada = !!det.heAprobada;
                  const sel = det.heOpcion;
                  const btnOp = (opcion, label) => (
                    <button onClick={() => aprobar(fila, opcion)}
                      className="px-2.5 py-1.5 rounded-lg text-sm font-medium num"
                      style={aprobada && sel === opcion
                        ? { background: 'var(--lem)', color: 'white' }
                        : { background: 'var(--bg)', border: '1px solid var(--border-strong)', color: 'var(--text)' }}>
                      {label}
                    </button>
                  );
                  return (
                    <tr key={fila.preKey + ':' + colab.id} style={aprobada ? { background: '#F2FAF6' } : {}}>
                      <td>
                        <div className="flex items-center gap-2">
                          <span className="brand-dot" style={{ background: un?.color }} />
                          <div>
                            <div className="font-medium text-sm">{colab.nombre} {colab.apellidoPaterno}</div>
                            <div className="text-[11px] text-gray-500">{suc.nombre}</div>
                          </div>
                        </div>
                      </td>
                      <td className="text-center num font-medium">
                        {he}
                        {fila.auto > 0 && <div className="text-[10px] font-normal normal-case" style={{ color: 'var(--lem)' }}>incluye 8 auto · 7 días</div>}
                      </td>
                      <td className="text-right">{btnOp('1', fmtM(m1))}</td>
                      <td className="text-right">{btnOp('2', fmtM(m2))}</td>
                      <td>
                        <div className="flex items-center gap-1.5">
                          <input type="number" min="0" step="0.01" placeholder="0.00"
                            value={montos3[colab.id] ?? (sel === '3' ? det.heMonto3 : '')}
                            onChange={e => setMontos3(p => ({ ...p, [colab.id]: e.target.value }))}
                            className="w-24 num text-sm py-1.5 px-2 rounded border" style={{ borderColor: 'var(--border-strong)' }} />
                          <button onClick={() => aprobar(fila, '3')}
                            className="px-2 py-1.5 rounded-lg text-xs font-medium"
                            style={aprobada && sel === '3' ? { background: 'var(--lem)', color: 'white' } : { background: 'var(--bg)', border: '1px solid var(--border-strong)' }}>
                            Usar
                          </button>
                        </div>
                      </td>
                      <td className="text-center">
                        {aprobada
                          ? <div className="flex flex-col items-center gap-1">
                              <span className="badge badge-aprobada">Aprobada · Op {sel}</span>
                              <button onClick={() => quitar(fila)} className="text-[11px] text-gray-500 underline">Quitar</button>
                            </div>
                          : <span className="badge badge-borrador">Pendiente</span>}
                      </td>
                      <td className="text-sm text-gray-600">{det.observacion || <span className="text-gray-300">—</span>}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

/* ========================================================================
   NÓMINA SEMANAL — cálculo de percepciones por sucursal y empleado
   ======================================================================== */
function NominaSemanalScreen() {
  const { state } = useApp();
  const sucursales = (state.sucursales || SEED.sucursales);

  // Semanas con pre-nómina existente (cualquier estado), más recientes primero
  const semanas = useMemo(() => {
    const set = {};
    Object.values(state.prenominas).forEach(p => {
      if (!set[p.weekId]) set[p.weekId] = { weekId: p.weekId, inicio: p.semanaInicio, fin: p.semanaFin };
    });
    return Object.values(set).sort((a, b) => (a.inicio < b.inicio ? 1 : -1));
  }, [state.prenominas]);

  const [weekId, setWeekId] = useState(semanas[0]?.weekId || '');
  const [sucExpandida, setSucExpandida] = useState(null);

  if (semanas.length === 0) {
    return (
      <>
        <TopBar title="Nómina semanal" subtitle="Cálculo de percepciones" />
        <div className="p-8">
          <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
            Aún no hay pre-nóminas capturadas. La nómina se calcula a partir de las pre-nóminas de cada sucursal.
          </div>
        </div>
      </>
    );
  }

  const semana = semanas.find(s => s.weekId === weekId) || semanas[0];

  // Para cada sucursal con pre-nómina en esta semana, calcular su nómina
  const porSucursal = [];
  let granTotal = 0, granEmpleados = 0;
  sucursales.forEach(suc => {
    const pre = state.prenominas[suc.id + '_' + weekId];
    if (!pre) return;
    const colabs = state.colaboradores.filter(c => c.sucursalId === suc.id && (c.estatus === 'activo' || c.estatus === 'baja'));
    const empleados = [];
    let totalSuc = 0;
    colabs.forEach(c => {
      const detalleDias = pre.detalle?.[c.id];
      if (!detalleDias) return;
      const calc = calcularNominaColab(c, detalleDias);
      if (calc.diasPagados === 0 && calc.conteo.FI === 0 && calc.conteo.INC === 0 && calc.conteo.PSGS === 0) return; // sin datos
      empleados.push({ colab: c, calc });
      totalSuc += calc.total;
    });
    if (empleados.length === 0) return;
    const un = SEED.unidades.find(u => u.id === suc.unId);
    porSucursal.push({ suc, un, empleados, totalSuc });
    granTotal += totalSuc;
    granEmpleados += empleados.length;
  });

  function exportar() {
    const filas = [];
    porSucursal.forEach(({ suc, empleados }) => {
      empleados.forEach(({ colab, calc }) => {
        const puesto = SEED.puestos.find(p => p.id === colab.puestoId);
        const round1 = n => Math.round(n * 10) / 10;
        filas.push({
          'Sucursal': suc.nombre,
          'Colaborador': `${colab.nombre} ${colab.apellidoPaterno} ${colab.apellidoMaterno}`,
          'Puesto': puesto?.nombre || '',
          'Asistencias': calc.conteo.A,
          'Faltas (FI)': calc.conteo.FI,
          'Vacaciones': calc.conteo.VAC,
          'Permiso c/goce': calc.conteo.PCGS,
          'Permiso s/goce': calc.conteo.PSGS,
          'Domingo trabajado': calc.trabajoDomingo ? 'Sí (+25%)' : 'No',
          'Descanso pagado (días)': round1(calc.descansoPagado),
          'Días pagados': round1(calc.diasPagados),
          'Sueldo diario': calc.sueldo,
          'Monto sueldo': calc.montoSueldo,
          'Bono semanal': calc.bonoSemanal,
          'Bono pagado': calc.montoBono,
          'Horas extras (h)': calc.horasExtras,
          'Monto horas extras': calc.montoHE,
          'Total semana': calc.total,
        });
      });
    });
    const ws = XLSX.utils.json_to_sheet(filas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Nomina');
    XLSX.writeFile(wb, `nomina_semanal_${weekId}.xlsx`);
  }

  return (
    <>
      <TopBar title="Nómina semanal" subtitle="Cálculo de percepciones por sucursal y empleado" />
      <div className="p-8">
        {/* Controles */}
        <div className="flex flex-wrap items-end gap-3 mb-6">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Semana</label>
            <select value={weekId} onChange={e => { setWeekId(e.target.value); setSucExpandida(null); }}
              className="px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minWidth: 280 }}>
              {semanas.map(s => (
                <option key={s.weekId} value={s.weekId}>Semana {s.weekId} · {fmtFecha(parseLocalDate(s.inicio))} – {fmtFecha(parseLocalDate(s.fin))}</option>
              ))}
            </select>
          </div>
          <div className="flex-1" />
          {porSucursal.length > 0 && (
            <button onClick={exportar} className="btn btn-secondary"><Icon name="file" size={14} /> Exportar a Excel</button>
          )}
        </div>

        {/* Resumen superior */}
        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
          <StatCard label="Total a pagar (grupo)" value={'$' + granTotal.toLocaleString('es-MX')} color="var(--lem)" />
          <StatCard label="Sucursales" value={porSucursal.length} />
          <StatCard label="Empleados" value={granEmpleados} />
        </div>

        {porSucursal.length === 0 ? (
          <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
            No hay datos de nómina para esta semana. Verifica que las pre-nóminas estén capturadas.
          </div>
        ) : (
          <div className="space-y-3">
            {porSucursal.map(({ suc, un, empleados, totalSuc }) => {
              const abierta = sucExpandida === suc.id;
              return (
                <div key={suc.id} className="bg-white rounded-xl shadow-card overflow-hidden">
                  {/* Encabezado de sucursal (clic para expandir) */}
                  <button onClick={() => setSucExpandida(abierta ? null : suc.id)}
                    className="w-full flex items-center gap-3 p-5 text-left hover:bg-gray-50">
                    <span className="brand-dot" style={{ background: un?.color }} />
                    <div className="flex-1">
                      <div className="font-medium">{suc.nombre}</div>
                      <div className="text-xs text-gray-500">{un?.nombre} · {empleados.length} empleado(s)</div>
                    </div>
                    <div className="text-right">
                      <div className="text-lg font-semibold num" style={{ color: 'var(--lem-dark)' }}>${totalSuc.toLocaleString('es-MX')}</div>
                      <div className="text-[11px] text-gray-400">Total sucursal</div>
                    </div>
                    <Icon name={abierta ? 'x' : 'chart'} size={16} className="text-gray-400 ml-2" />
                  </button>

                  {/* Detalle por empleado */}
                  {abierta && (
                    <div className="px-5 pb-5 overflow-x-auto">
                      <table className="lem-table w-full" style={{ minWidth: 880 }}>
                        <thead><tr>
                          <th>Colaborador</th>
                          <th className="text-center" title="Asistencias">A</th>
                          <th className="text-center" title="Faltas injustificadas">FI</th>
                          <th className="text-center" title="Vacaciones">VAC</th>
                          <th className="text-center" title="Domingo trabajado (prima 25%)">Dom</th>
                          <th className="text-center" title="Descanso pagado (proporcional)">Desc.</th>
                          <th className="text-center" title="Días pagados totales">Días pag.</th>
                          <th className="text-right">Monto sueldo</th>
                          <th className="text-right">Bono</th>
                          <th className="text-right">H. Extra</th>
                          <th className="text-right">Total</th>
                        </tr></thead>
                        <tbody>
                          {empleados.map(({ colab, calc }) => {
                            const puesto = SEED.puestos.find(p => p.id === colab.puestoId);
                            const round1 = n => Math.round(n * 10) / 10;
                            return (
                              <tr key={colab.id}>
                                <td>
                                  <div className="font-medium text-sm">{colab.nombre} {colab.apellidoPaterno} {colab.apellidoMaterno}</div>
                                  <div className="text-[11px] text-gray-400">{puesto?.nombre} · ${calc.sueldo.toLocaleString('es-MX')}/día</div>
                                </td>
                                <td className="text-center num">{calc.conteo.A || '—'}</td>
                                <td className="text-center num" style={calc.conteo.FI ? { color: '#8C1F1B', fontWeight: 600 } : {}}>{calc.conteo.FI || '—'}</td>
                                <td className="text-center num">{calc.conteo.VAC || '—'}</td>
                                <td className="text-center num" style={calc.trabajoDomingo ? { color: 'var(--lem)', fontWeight: 600 } : {}}>{calc.trabajoDomingo ? '+25%' : '—'}</td>
                                <td className="text-center num">{calc.descansoPagado > 0 ? round1(calc.descansoPagado) : '—'}</td>
                                <td className="text-center num font-medium">{round1(calc.diasPagados)}</td>
                                <td className="text-right num">${calc.montoSueldo.toLocaleString('es-MX')}</td>
                                <td className="text-right num" style={calc.pierdeBono && calc.bonoSemanal > 0 ? { color: '#8C1F1B' } : {}}>
                                  {calc.bonoSemanal === 0 ? '—'
                                    : calc.pierdeBono ? <span title="Bono perdido por falta o permiso sin goce">$0 ✕</span>
                                    : '$' + calc.montoBono.toLocaleString('es-MX')}
                                </td>
                                <td className="text-right num">
                                  {calc.horasExtras === 0 ? '—'
                                    : calc.montoHE > 0 ? '$' + calc.montoHE.toLocaleString('es-MX')
                                    : <span title="Horas reportadas, pendientes de aprobar en el módulo de Horas extras" style={{ color: '#9A3412' }}>{calc.horasExtras}h ⏳</span>}
                                </td>
                                <td className="text-right num font-semibold" style={{ color: 'var(--lem-dark)' }}>${calc.total.toLocaleString('es-MX')}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                      <div className="text-[11px] text-gray-400 mt-2">
                        Dom +25% = prima dominical · Desc. = días de descanso pagados (proporcional a faltas) · Bono $0 ✕ = bono perdido por falta o permiso sin goce.
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Nota de criterios */}
        <div className="text-[11px] text-gray-400 mt-5 leading-relaxed">
          <strong>Criterios de cálculo:</strong> se pagan asistencias (A), vacaciones (VAC) y permisos con goce (PCGS). <strong>Prima dominical:</strong> el domingo trabajado se paga al 125%. <strong>Descanso:</strong> se requiere haber cubierto al menos 5 días; se descuenta 1/6 del descanso por cada falta (FI). <strong>Bono semanal fijo:</strong> se paga completo salvo que haya una falta (FI) o un permiso sin goce (PSGS); las vacaciones y el permiso con goce no afectan el bono. No se pagan FI, PSGS ni incapacidades (INC, las cubre el IMSS). Este cálculo es de percepciones; no incluye horas extras ni deducciones (ISR/IMSS), que se manejarán por separado.
        </div>
      </div>
    </>
  );
}

/* ========================================================================
   USUARIOS Y ACCESOS — gestión de cuentas de acceso al sistema (solo Admin)
   Nota: en producción (Firebase) la autenticación la maneja Firebase Auth.
   Aquí es una versión de prototipo para probar la mecánica de roles.
   ======================================================================== */
function UsuariosScreen() {
  const { state, setState, addAuditLog, toast } = useApp();
  const usuarios = getUsuarios(state);
  const [modal, setModal] = useState(null); // { mode:'nuevo'|'editar', usuario }

  const rolLabel = { admin: 'Administrador', rh: 'Recursos Humanos', contabilidad: 'Contabilidad', asesor: 'Asesor', gerente: 'Gerente de Sucursal' };
  const rolBadge = { admin: 'badge-aprobada', rh: 'badge-revision', contabilidad: 'badge-revision', asesor: 'badge-borrador', gerente: 'badge-enviada' };

  function guardar(data) {
    let nuevos;
    if (modal.mode === 'nuevo') {
      // Validar correo único
      if (usuarios.find(u => u.email.toLowerCase() === data.email.toLowerCase())) {
        toast('Ya existe una cuenta con ese correo.'); return;
      }
      const nuevo = { id: 'u_' + Date.now().toString(36), ...data };
      nuevos = [...usuarios, nuevo];
      addAuditLog({ modulo: 'usuarios', accion: 'crear', entidad: nuevo.id, valorAnterior: null, valorNuevo: { email: data.email, rol: data.rol } });
      toast(`Cuenta creada para ${data.nombre}.`);
    } else {
      nuevos = usuarios.map(u => u.id === modal.usuario.id ? { ...u, ...data } : u);
      addAuditLog({ modulo: 'usuarios', accion: 'editar', entidad: modal.usuario.id, valorAnterior: { rol: modal.usuario.rol }, valorNuevo: { rol: data.rol } });
      toast('Cuenta actualizada.');
    }
    setState({ ...state, usuarios: nuevos });
    setModal(null);
  }

  function eliminar(u) {
    if (u.rol === 'admin' && usuarios.filter(x => x.rol === 'admin').length <= 1) {
      toast('No puedes eliminar el único administrador.'); return;
    }
    setState({ ...state, usuarios: usuarios.filter(x => x.id !== u.id) });
    addAuditLog({ modulo: 'usuarios', accion: 'eliminar', entidad: u.id, valorAnterior: { email: u.email }, valorNuevo: null });
    toast(`Cuenta de ${u.nombre} eliminada.`);
  }

  return (
    <>
      <TopBar title="Usuarios y accesos" subtitle="Cuentas que pueden entrar al sistema" actions={
        <button className="btn btn-primary" onClick={() => setModal({ mode: 'nuevo' })}><Icon name="plus" size={14} /> Nueva cuenta</button>
      } />
      <div className="p-8">
        <div className="bg-white rounded-xl p-4 mb-5" style={{ background: 'var(--lem-light)', border: '1px solid var(--border)' }}>
          <p className="text-sm" style={{ color: 'var(--lem-dark)' }}>
            Aquí defines quién puede <strong>entrar al sistema</strong> y con qué rol. Tener el puesto de "Gerente" en el expediente no da acceso por sí solo; el acceso se crea aquí. A los gerentes y asesores se les asignan sucursales desde el módulo de <strong>Sucursales</strong>.
          </p>
        </div>

        <div className="bg-white rounded-xl overflow-hidden shadow-card">
          <table className="lem-table w-full">
            <thead><tr>
              <th>Nombre</th><th>Correo</th><th>Rol</th><th>Sucursales asignadas</th><th></th>
            </tr></thead>
            <tbody>
              {usuarios.map(u => {
                let sucs = [];
                if (u.rol === 'gerente') sucs = sucursalesDeGerente(state, u.id);
                else if (u.rol === 'asesor') sucs = sucursalesDeAsesor(state, u.id);
                const sucNombres = sucs.map(sid => (state.sucursales || SEED.sucursales).find(s => s.id === sid)?.nombre).filter(Boolean);
                const aplica = u.rol === 'gerente' || u.rol === 'asesor';
                return (
                  <tr key={u.id}>
                    <td className="font-medium">{u.nombre}</td>
                    <td className="text-sm" style={{ color: 'var(--text-soft)' }}>{u.email}</td>
                    <td><span className={`badge ${rolBadge[u.rol]}`}>{rolLabel[u.rol]}</span></td>
                    <td className="text-sm">
                      {!aplica ? <span className="text-gray-400">Todo el grupo</span>
                        : sucNombres.length ? sucNombres.join(', ')
                        : <span className="text-gray-400">Sin sucursales — asigna en Sucursales</span>}
                    </td>
                    <td className="text-right whitespace-nowrap">
                      <button onClick={() => setModal({ mode: 'editar', usuario: u })} className="btn btn-ghost p-2" title="Editar"><Icon name="settings" size={14} /></button>
                      <button onClick={() => eliminar(u)} className="btn btn-ghost p-2" title="Eliminar" style={{ color: '#8C1F1B' }}><Icon name="x" size={14} /></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {modal && <UsuarioModal mode={modal.mode} usuario={modal.usuario} colaboradores={state.colaboradores} onClose={() => setModal(null)} onSave={guardar} />}
    </>
  );
}

function UsuarioModal({ mode, usuario, colaboradores, onClose, onSave }) {
  const [nombre, setNombre] = useState(usuario?.nombre || '');
  const [email, setEmail] = useState(usuario?.email || '');
  const [password, setPassword] = useState(usuario?.password || '');
  const [rol, setRol] = useState(usuario?.rol || 'gerente');
  const [error, setError] = useState('');

  // Colaboradores con puesto gerencial/asesor que aún no tienen cuenta — para autollenar
  const candidatos = (colaboradores || []).filter(c => c.estatus === 'activo');

  function submit() {
    setError('');
    if (!nombre.trim()) { setError('El nombre es obligatorio.'); return; }
    if (!email.trim() || !email.includes('@')) { setError('Captura un correo válido.'); return; }
    if (!password.trim()) { setError('Define una contraseña.'); return; }
    onSave({ nombre: nombre.trim(), email: email.trim(), password: password.trim(), rol });
  }

  // Autocompletar nombre/correo desde un colaborador existente
  function vincular(colabId) {
    const c = candidatos.find(x => x.id === colabId);
    if (!c) return;
    const nombreCompleto = `${c.nombre} ${c.apellidoPaterno} ${c.apellidoMaterno}`.trim();
    setNombre(nombreCompleto);
    if (c.correo) setEmail(c.correo);
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 480 }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
          <h2 className="text-lg font-medium">{mode === 'nuevo' ? 'Nueva cuenta de acceso' : 'Editar cuenta'}</h2>
          <p className="text-sm text-gray-500 mt-0.5">Define quién entra al sistema y con qué rol.</p>
        </div>
        <div className="p-6 space-y-4">
          {mode === 'nuevo' && candidatos.length > 0 && (
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Vincular a un colaborador <span className="text-gray-400 normal-case">(opcional, autollena nombre y correo)</span></label>
              <select onChange={e => vincular(e.target.value)} defaultValue=""
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
                <option value="">Selecciona para autollenar...</option>
                {candidatos.map(c => <option key={c.id} value={c.id}>{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Nombre</label>
            <input value={nombre} onChange={e => setNombre(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: 'var(--border-strong)' }} placeholder="Nombre completo" />
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Correo (usuario para entrar)</label>
            <input value={email} onChange={e => setEmail(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: 'var(--border-strong)' }} placeholder="correo@grupolem.com" />
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Contraseña</label>
            <input value={password} onChange={e => setPassword(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm" style={{ borderColor: 'var(--border-strong)' }} placeholder="Contraseña de acceso" />
            <p className="text-[11px] text-gray-400 mt-1">En el sistema final (Firebase) cada quien podrá cambiar su contraseña y recuperarla por correo.</p>
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Rol</label>
            <select value={rol} onChange={e => setRol(e.target.value)} className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              <option value="gerente">Gerente de Sucursal</option>
              <option value="asesor">Asesor</option>
              <option value="rh">Recursos Humanos</option>
              <option value="contabilidad">Contabilidad</option>
              <option value="admin">Administrador</option>
            </select>
            {(rol === 'gerente' || rol === 'asesor') && (
              <p className="text-[11px] text-gray-400 mt-1">Después de crear la cuenta, asígnale sus sucursales desde el módulo de <strong>Sucursales</strong>.</p>
            )}
          </div>
          {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}><Icon name="alert" size={12} /> {error}</div>}
        </div>
        <div className="px-6 py-4 flex justify-end gap-2" style={{ borderTop: '1px solid var(--border)' }}>
          <button onClick={onClose} className="btn btn-secondary">Cancelar</button>
          <button onClick={submit} className="btn btn-primary">{mode === 'nuevo' ? 'Crear cuenta' : 'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

/* ========================================================================
   CONTRATOS — control y alertas de vencimiento (solo RH y Admin)
   ======================================================================== */
function ContratosScreen() {
  const { state, setState, addAuditLog, toast } = useApp();
  const DIAS_AVISO = 30;
  const [modal, setModal] = useState(null); // { mode, colabId, contrato }
  const [tab, setTab] = useState('alertas');

  const activos = state.colaboradores.filter(c => c.estatus === 'activo');

  // Construye, para cada colaborador activo, su contrato vigente y su alerta
  const filas = activos.map(c => {
    const vig = contratoVigente(state, c.id);
    const alerta = alertaContrato(vig, DIAS_AVISO);
    return { colab: c, vigente: vig, alerta };
  });

  const porVencer = filas.filter(f => f.alerta && (f.alerta.nivel === 'vencido' || f.alerta.nivel === 'porVencer'))
    .sort((a,b) => (a.alerta.dias) - (b.alerta.dias));
  const sinContrato = filas.filter(f => !f.vigente);

  function guardar(data) {
    let nuevos;
    if (modal.mode === 'nuevo') {
      const nuevo = { id: 'k_' + Date.now().toString(36), colaboradorId: modal.colabId, ...data };
      nuevos = [...(state.contratos || []), nuevo];
      addAuditLog({ modulo: 'contratos', accion: 'crear', entidad: nuevo.id, valorAnterior: null, valorNuevo: { tipo: data.tipo } });
      toast('Contrato registrado.');
    } else {
      nuevos = (state.contratos || []).map(k => k.id === modal.contrato.id ? { ...k, ...data } : k);
      addAuditLog({ modulo: 'contratos', accion: 'editar', entidad: modal.contrato.id, valorAnterior: { tipo: modal.contrato.tipo }, valorNuevo: { tipo: data.tipo } });
      toast('Contrato actualizado.');
    }
    setState({ ...state, contratos: nuevos });
    setModal(null);
  }

  function eliminarContrato(id) {
    setState({ ...state, contratos: (state.contratos || []).filter(k => k.id !== id) });
    toast('Contrato eliminado.');
  }

  const nivelBadge = { vencido: 'badge-rechazada', porVencer: 'badge-revision', vigente: 'badge-aprobada' };

  return (
    <>
      <TopBar title="Contratos" subtitle="Control y alertas de vencimiento" />
      <div className="px-8 pt-5">
        <div className="flex gap-1 border-b" style={{ borderColor: 'var(--border)' }}>
          {[{k:'alertas',l:`Por vencer (${porVencer.length})`},{k:'todos',l:'Todos los colaboradores'}].map(t => (
            <button key={t.k} onClick={() => setTab(t.k)}
              className="px-4 py-2.5 text-sm font-medium relative"
              style={tab === t.k ? { color: 'var(--lem)' } : { color: 'var(--text-soft)' }}>
              {t.l}
              {tab === t.k && <div style={{ position:'absolute', bottom:-1, left:0, right:0, height:2, background:'var(--lem)' }} />}
            </button>
          ))}
        </div>
      </div>

      <div className="p-8 pt-6">
        {tab === 'alertas' && (
          <>
            {porVencer.length === 0 ? (
              <div className="flex items-center gap-2 text-sm py-3 px-4 rounded-lg" style={{ background: '#ECF7E8', color: '#2A5A0E' }}>
                <Icon name="check" size={16} /> Ningún contrato temporal está por vencer en los próximos {DIAS_AVISO} días.
              </div>
            ) : (
              <>
                <p className="text-sm text-gray-500 mb-4">Contratos temporales vencidos o que vencen en los próximos {DIAS_AVISO} días. Renueva o pasa a planta a tiempo.</p>
                <div className="space-y-2">
                  {porVencer.map(({ colab, vigente, alerta }) => {
                    const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab.sucursalId);
                    const un = SEED.unidades.find(u => u.id === suc?.unId);
                    return (
                      <div key={colab.id} className="bg-white rounded-xl shadow-card p-4 flex items-center gap-4">
                        <div className="avatar" style={{ width: 38, height: 38, background: un?.color || '#999' }}>
                          {colab.nombre[0]}{colab.apellidoPaterno[0]}
                        </div>
                        <div className="flex-1">
                          <div className="font-medium">{colab.nombre} {colab.apellidoPaterno} {colab.apellidoMaterno}</div>
                          <div className="text-xs text-gray-500">{suc?.nombre} · {TIPOS_CONTRATO[vigente.tipo]?.label} · vence {fmtFecha(vigente.fechaFin)}</div>
                        </div>
                        <span className={`badge ${nivelBadge[alerta.nivel]}`}>{alerta.label}</span>
                        <button onClick={() => setModal({ mode: 'nuevo', colabId: colab.id })} className="btn btn-primary" style={{ padding: '6px 12px' }}>
                          <Icon name="plus" size={13} /> Renovar / Planta
                        </button>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
            {sinContrato.length > 0 && (
              <div className="mt-5 rounded-lg p-4" style={{ background: '#FEF3C7', border: '1px solid #FDE68A' }}>
                <div className="flex items-center gap-1.5 text-sm font-medium mb-1" style={{ color: '#92400E' }}>
                  <Icon name="alert" size={14} /> {sinContrato.length} colaborador(es) sin contrato registrado
                </div>
                <p className="text-[12px] mb-2" style={{ color: '#92400E' }}>
                  Estos colaboradores aún no tienen ningún contrato en el sistema. Ve a la pestaña "Todos los colaboradores" para registrarlos.
                </p>
                <button onClick={() => setTab('todos')} className="btn btn-secondary" style={{ padding: '5px 12px', fontSize: 12 }}>
                  Ir a registrar contratos
                </button>
              </div>
            )}
          </>
        )}

        {tab === 'todos' && (
          <div className="bg-white rounded-xl overflow-hidden shadow-card">
            <table className="lem-table w-full">
              <thead><tr>
                <th>Colaborador</th><th>Sucursal</th><th>Contrato vigente</th><th>Vence</th><th>Estado</th><th className="text-right">Acción</th>
              </tr></thead>
              <tbody>
                {filas.map(({ colab, vigente, alerta }) => {
                  const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab.sucursalId);
                  return (
                    <tr key={colab.id}>
                      <td className="font-medium">{colab.nombre} {colab.apellidoPaterno} {colab.apellidoMaterno}</td>
                      <td className="text-sm">{suc?.nombre}</td>
                      <td className="text-sm">{vigente ? TIPOS_CONTRATO[vigente.tipo]?.label : <span style={{ color: '#B45309', fontWeight: 500 }}>Sin contrato</span>}</td>
                      <td className="text-sm num">{vigente && TIPOS_CONTRATO[vigente.tipo]?.vence ? fmtFecha(vigente.fechaFin) : (vigente ? 'Indefinido' : '—')}</td>
                      <td>
                        {alerta ? <span className={`badge ${nivelBadge[alerta.nivel]}`}>{alerta.label}</span>

                          : <span className="badge" style={{ background: '#FEF3C7', color: '#92400E' }}>Falta registrar</span>}

                          <button onClick={() => setModal({ mode: 'nuevo', colabId: colab.id })} className="btn btn-primary" style={{ padding: '5px 12px', fontSize: 12 }}>

        <ContratoModal mode={modal.mode} colabId={modal.colabId} contrato={modal.contrato}

    </>
  );
}

function ContratoModal({ mode, colabId, contrato, onClose, onSave }) {
  const { state } = useApp();
  const colab = state.colaboradores.find(c => c.id === colabId);
  const previos = (state.contratos || []).filter(k => k.colaboradorId === colabId);
  const sugerirRenovacion = previos.length; // número de renovación sugerida

  const [tipo, setTipo] = useState(contrato?.tipo || (previos.length ? 'renovacion' : 'temporal'));
  const [fechaInicio, setFechaInicio] = useState(contrato?.fechaInicio || '');
  const [fechaFin, setFechaFin] = useState(contrato?.fechaFin || '');
  const [notas, setNotas] = useState(contrato?.notas || '');
  const [error, setError] = useState('');

  const vence = TIPOS_CONTRATO[tipo]?.vence;

  function submit() {
    setError('');
    if (!fechaInicio) { setError('Indica la fecha de inicio.'); return; }
    if (vence && !fechaFin) { setError('Los contratos temporales y renovaciones requieren fecha de fin.'); return; }
    if (vence && fechaFin < fechaInicio) { setError('La fecha de fin no puede ser anterior al inicio.'); return; }
    onSave({ tipo, fechaInicio, fechaFin: vence ? fechaFin : null, notas: notas.trim() });
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 460 }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
          <h2 className="text-lg font-medium">{mode === 'nuevo' ? 'Registrar contrato' : 'Editar contrato'}</h2>
          <p className="text-sm text-gray-500 mt-0.5">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</p>
        </div>
        <div className="p-6 space-y-4">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Tipo de contrato</label>
            <div className="grid grid-cols-3 gap-2">
              {Object.entries(TIPOS_CONTRATO).map(([k, v]) => (
                <button key={k} onClick={() => setTipo(k)}
                  className="py-2 rounded-lg text-[12px] font-medium border"
                  style={tipo === k ? { background:'var(--lem)', color:'white', borderColor:'var(--lem)' }
                    : { background:'white', borderColor:'var(--border-strong)', color:'var(--text-soft)' }}>
                  {v.label}
                </button>
              ))}
            </div>
            {tipo === 'renovacion' && <p className="text-[11px] text-gray-400 mt-1">Sería la renovación #{sugerirRenovacion}.</p>}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha de inicio</label>
              <input type="date" value={fechaInicio} onChange={e => setFechaInicio(e.target.value)}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
            </div>
            {vence && (
              <div>
                <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha de fin</label>
                <input type="date" value={fechaFin} onChange={e => setFechaFin(e.target.value)}
                  className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
              </div>
            )}
          </div>
          {!vence && <p className="text-[12px] text-gray-500">El contrato de planta es indefinido — no tiene fecha de fin ni genera alertas.</p>}
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Notas <span className="text-gray-400 normal-case">(opcional)</span></label>
            <textarea value={notas} onChange={e => setNotas(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minHeight: 50 }} />
          </div>
          {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}><Icon name="alert" size={12} /> {error}</div>}
        </div>
        <div className="px-6 py-4 flex justify-end gap-2" style={{ borderTop: '1px solid var(--border)' }}>
          <button onClick={onClose} className="btn btn-secondary">Cancelar</button>
          <button onClick={submit} className="btn btn-primary">{mode === 'nuevo' ? 'Registrar' : 'Guardar'}</button>
        </div>
      </div>
    </div>
  );
}

function ContratoHistorialModal({ colabId, onClose, onNuevo, onEliminar }) {
  const { state } = useApp();
  const colab = state.colaboradores.find(c => c.id === colabId);
  const lista = (state.contratos || []).filter(k => k.colaboradorId === colabId)
    .sort((a,b) => new Date(a.fechaInicio) - new Date(b.fechaInicio));

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 520, maxHeight: '85vh', overflow: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4 flex items-center justify-between" style={{ borderBottom: '1px solid var(--border)' }}>
          <div>
            <h2 className="text-lg font-medium">Historial de contratos</h2>
            <p className="text-sm text-gray-500 mt-0.5">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</p>
          </div>
          <button onClick={onNuevo} className="btn btn-primary" style={{ padding: '6px 12px' }}><Icon name="plus" size={13} /> Nuevo</button>
        </div>
        <div className="p-6">
          {lista.length === 0 ? (
            <p className="text-sm text-gray-500 text-center py-4">Este colaborador aún no tiene contratos registrados.</p>
          ) : (
            <div className="space-y-2">
              {lista.map((k, i) => {
                const alerta = alertaContrato(k);
                const nivelColor = alerta?.nivel === 'vencido' ? '#8C1F1B' : alerta?.nivel === 'porVencer' ? '#7A4B05' : 'var(--text-soft)';
                return (
                  <div key={k.id} className="flex items-center gap-3 p-3 rounded-lg" style={{ background: 'var(--bg)' }}>
                    <div className="text-xs font-mono text-gray-400">{i+1}</div>
                    <div className="flex-1">
                      <div className="text-sm font-medium">{TIPOS_CONTRATO[k.tipo]?.label}</div>
                      <div className="text-[12px] text-gray-500">
                        {fmtFecha(k.fechaInicio)}{k.fechaFin ? ` → ${fmtFecha(k.fechaFin)}` : ' · indefinido'}
                      </div>
                      {k.notas && <div className="text-[12px] text-gray-500 mt-0.5">"{k.notas}"</div>}
                    </div>
                    {alerta && <span className="text-[11px]" style={{ color: nivelColor }}>{alerta.label}</span>}
                    <button onClick={() => onEliminar(k.id)} className="btn btn-ghost p-1.5" style={{ color: '#8C1F1B' }} title="Eliminar"><Icon name="x" size={13} /></button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="px-6 py-4 flex justify-end" style={{ borderTop: '1px solid var(--border)' }}>
          <button onClick={onClose} className="btn btn-secondary">Cerrar</button>
        </div>
      </div>
    </div>
  );
}

/* ========================================================================
   APP SHELL
   ======================================================================== */
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem('lem_user')) || null; } catch { return null; }
  });
  const [state, setState] = useState(() => getInitialState());
  const [view, setView] = useState('dashboard');
  const [capturePreset, setCapturePreset] = useState(null);
  const { show, node } = useToast();

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => {
    if (user) sessionStorage.setItem('lem_user', JSON.stringify(user));
    else sessionStorage.removeItem('lem_user');
  }, [user]);

  // Handle dashboard "abrir captura" event
  useEffect(() => {
    const handler = e => { setCapturePreset(e.detail); setView('capturar'); };
    window.addEventListener('lem:gotoCapture', handler);
    return () => window.removeEventListener('lem:gotoCapture', handler);
  }, []);

  // ===== Fase 2: cargar colaboradores desde Firestore al entrar (según rol) =====
  useEffect(() => {
    if (!user || !db) return;
    _fsInicializado = false;           // bloquea el guardado hasta terminar la carga
    let cancelado = false;
    (async () => {
      await esperarAuthFirebase();     // espera a que Firebase reconozca la sesión
      if (cancelado) return;
      const fb = firebase.auth().currentUser;
      if (!fb) return;
      try {
        const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
        const email = (fb.email || '').toLowerCase();
        let misSucIds = null;
        if (user.rol === 'gerente' || user.rol === 'asesor') {
          misSucIds = SEED.sucursales.filter(s =>
            _emailDeUsuarioId(s.gerenteId) === email || _emailDeUsuarioId(s.asesorId) === email
          ).map(s => s.id);
        }
        const colabs = await fsCargarColaboradores(user.rol, email, verSueldos, misSucIds);
        const pre = await fsCargarMap('prenominas');
        const hor = await fsCargarMap('horarios');
        const vac = await fsCargarArray('vacaciones');
        const baj = await fsCargarArray('bajas');
        const ctr = await fsCargarArray('contratos');
        const notif = await fsCargarArray('notificaciones');
        const mov = await fsCargarMovimientos(user.rol, verSueldos);
        const aud = await fsCargarArray('auditoria');
        if (cancelado) return;
        _colabSync = {};
        colabs.forEach(c => _marcarSyncColab(c, verSueldos));
        _fsInicializado = true;
        setState(prev => ({ ...prev, colaboradores: colabs, prenominas: pre, horarios: hor,
          vacaciones: vac, bajas: baj, contratos: ctr, notificaciones: notif,
          movimientos: mov, auditoria: aud }));
      } catch (e) { console.error('Cargar colaboradores Firestore:', e); }
    })();
    return () => { cancelado = true; };
  }, [user]);

  // ===== Fase 2: guardar cambios de colaboradores en Firestore (diff, solo roles que escriben) =====
  useEffect(() => {
    if (!user || !db || !_fsInicializado) return;
    if (!['admin', 'rh', 'contabilidad'].includes(user.rol)) return;
    const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
    const cambios = [];
    (state.colaboradores || []).forEach(c => {
      const pub = Object.assign({}, c); delete pub.sueldoDiario; delete pub.bonoTransporte;
      const pubKey = JSON.stringify(pub);
      const compKey = verSueldos ? ((c.sueldoDiario||0) + '|' + (c.bonoTransporte||0)) : null;
      const prev = _colabSync[c.id];
      if (!prev || prev.pub !== pubKey || (verSueldos && prev.comp !== compKey)) {
        cambios.push({ id: c.id, pub, sd: c.sueldoDiario, bo: c.bonoTransporte,
          pc: !prev || prev.pub !== pubKey, cc: verSueldos && (!prev || prev.comp !== compKey) });
        _colabSync[c.id] = { pub: pubKey, comp: compKey };
      }
    });
    if (!cambios.length) return;
    (async () => {
      for (let i = 0; i < cambios.length; i += 150) {
        const lote = cambios.slice(i, i + 150);
        const batch = db.batch();
        lote.forEach(x => {
          const r = db.collection('colaboradores').doc(x.id);
          if (x.pc) batch.set(r, x.pub, { merge: true });
          if (x.cc) batch.set(r.collection('privado').doc('compensacion'),
            { sueldoDiario: x.sd || 0, bonoTransporte: x.bo || 0 }, { merge: true });
        });
        try { await batch.commit(); } catch (e) { console.error('Guardar colaboradores Firestore:', e); }
      }
    })();
  }, [state.colaboradores, user]);

  // ===== Fase 3: guardar pre-nóminas y horarios en Firestore (diff) =====
  useEffect(() => {
    if (!user || !db || !_fsInicializado) return;
    fsGuardarMap('prenominas', state.prenominas);
    fsGuardarMap('horarios', state.horarios);
  }, [state.prenominas, state.horarios, user]);

  // ===== Fase 4: guardar solicitudes, avisos y auditoría en Firestore (sin sueldos en claro) =====
  useEffect(() => {
    if (!user || !db || !_fsInicializado) return;
    fsGuardarArray('vacaciones', state.vacaciones);
    fsGuardarArray('bajas', state.bajas);
    fsGuardarArray('contratos', state.contratos);
    fsGuardarArray('notificaciones', state.notificaciones);
    fsGuardarArray('auditoria', state.auditoria);
  }, [state.vacaciones, state.bajas, state.contratos, state.notificaciones, state.auditoria, user]);

  // ===== Fase 5: guardar movimientos (montos de sueldo en subcolección privada) =====
  useEffect(() => {
    if (!user || !db || !_fsInicializado) return;
    const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
    fsGuardarMovimientos(state.movimientos, verSueldos);
  }, [state.movimientos, user]);

  function login(u) { setUser(u); setView('dashboard'); show(`Bienvenido, ${u.nombre.split(' ')[0]}.`); }
  function logout() { setUser(null); }

  function addAuditLog({ modulo, accion, entidad, valorAnterior, valorNuevo }) {
    setState(prev => ({
      ...prev,
      auditoria: [...(prev.auditoria || []), {
        id: 'aud_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        fecha: new Date().toISOString(),
        usuarioId: user.id, modulo, accion, entidad,
        valorAnterior, valorNuevo
      }]
    }));
  }

  if (!user) return (
    <AppCtx.Provider value={{ state, setState, toast: show }}>
      <LoginScreen onLogin={login} />
      {node}
    </AppCtx.Provider>
  );

  // Render the right view
  let body;
  if (view === 'dashboard') body = <Dashboard />;
  else if (view === 'colaboradores') body = <ColaboradoresList />;
  else if (view === 'sucursales') body = <SucursalesScreen />;
  else if (view === 'horario') body = <HorarioScreen />;
  else if (view === 'capturar' || (view === 'prenominas' && user.rol === 'gerente')) body = <PrenominaCapture presetSucursalId={capturePreset} />;
  else if (view === 'prenominas') body = <PrenominasList />;
  else if (view === 'inbox') body = <PrenominasList inbox />;
  else if (view === 'cumpleanos') body = <CumpleanosScreen />;
  else if (view === 'bonos') body = <BonosScreen />;
  else if (view === 'nomina') body = <NominaSemanalScreen />;
  else if (view === 'reportes') body = <ReportesScreen />;
  else if (view === 'contratos') body = <ContratosScreen />;
  else if (view === 'usuarios') body = <UsuariosScreen />;
  else if (view === 'auditoria') body = <AuditoriaScreen />;
  else if (view === 'vacaciones') body = <VacacionesScreen />;
  else if (view === 'bajas') body = <BajasScreen />;
  else if (view === 'movimientos') body = <MovimientosScreen />;
  else if (view === 'alertas') body = <ComingSoon title="Alertas de 4 FI en 30 días" subtitle="Monitoreo de inasistencias" items={[
    'Alerta automática cuando un colaborador acumula 4+ FI en 30 días',
    'Notificación a RH y Administrador',
    'Lista de colaboradores en riesgo',
    'No genera baja automática — solo alerta'
  ]} />;
  else if (view === 'horasextras') body = <HorasExtrasScreen />;
  else body = <ComingSoon title="Módulo" subtitle="" items={['Próximamente']} />;

  return (
    <AppCtx.Provider value={{ user, state, setState, logout, addAuditLog, toast: show }}>
      <div className="flex h-full">
        <Sidebar user={user} view={view} setView={(v) => { setCapturePreset(null); setView(v); }} />
        <main className="flex-1 flex flex-col overflow-hidden">
          <div className="flex-1 overflow-auto">{body}</div>
        </main>
      </div>
      {node}
    </AppCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
