/* --- Pestaña: Solicitar baja --- */
function BajaSolicitar() {
  const { user, state, setState, addAuditLog, toast } = useApp();

  // Colaboradores activos que el usuario puede dar de baja
  let candidatos = state.colaboradores.filter(c => c.estatus === 'activo');
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    candidatos = candidatos.filter(c => ids.includes(c.sucursalId));
  } else if (user.rol === 'asesor') {
    const sucs = sucursalesDeAsesor(state, user.id);
    candidatos = candidatos.filter(c => sucs.includes(c.sucursalId));
  }
  // Excluir colaboradores que ya tienen una baja pendiente
  const conBajaPendiente = new Set((state.bajas || []).filter(b => b.estado === 'pendiente').map(b => b.colaboradorId));
  candidatos = candidatos.filter(c => !conBajaPendiente.has(c.id));

  const [colabId, setColabId] = useState('');
  const [fechaBaja, setFechaBaja] = useState('');
  const [ultimoDia, setUltimoDia] = useState('');
  const [motivo, setMotivo] = useState(SEED.motivosBaja[0]);
  const [motivoLibre, setMotivoLibre] = useState('');
  const [comentarios, setComentarios] = useState('');
  const [tieneDoc, setTieneDoc] = useState(false);
  const [error, setError] = useState('');

  const colab = state.colaboradores.find(c => c.id === colabId);

  function enviar() {
    setError('');
    if (!colabId) { setError('Selecciona un colaborador.'); return; }
    if (!fechaBaja) { setError('Indica la fecha de baja.'); return; }
    if (motivo === 'Otro' && !motivoLibre.trim()) { setError('Especifica el motivo en el campo de texto.'); return; }
    const nueva = {
      id: 'baja_' + Date.now().toString(36),
      colaboradorId: colabId,
      fechaBaja,
      ultimoDiaLaborado: ultimoDia || fechaBaja,
      motivo: motivo === 'Otro' ? motivoLibre.trim() : motivo,
      motivoCatalogo: motivo,
      comentarios: comentarios.trim(),
      tieneDocumento: tieneDoc,
      estado: 'pendiente',
      solicitanteId: user.id,
      fechaSolicitud: new Date().toISOString(),
    };
    setState({ ...state, bajas: [...(state.bajas || []), nueva] });
    addAuditLog({ modulo: 'bajas', accion: 'solicitar', entidad: nueva.id,
      valorAnterior: null, valorNuevo: { colaborador: colab.nombre, motivo: nueva.motivo } });
    toast('Solicitud de baja enviada.');
    setColabId(''); setFechaBaja(''); setUltimoDia(''); setMotivo(SEED.motivosBaja[0]);
    setMotivoLibre(''); setComentarios(''); setTieneDoc(false);
  }

  if (candidatos.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No hay colaboradores activos disponibles para dar de baja.
    </div>;
  }

  return (
    <div className="bg-white rounded-xl shadow-card p-6 max-w-2xl">
      <h3 className="text-base font-medium mb-1">Nueva solicitud de baja</h3>
      <p className="text-sm text-gray-500 mb-5">Esta solicitud deberá ser aprobada por RH, Contabilidad o el Administrador.</p>
      <div className="space-y-4">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Colaborador</label>
          <select value={colabId} onChange={e => { setColabId(e.target.value); setError(''); }}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
            <option value="">Selecciona...</option>
            {candidatos.map(c => (
              <option key={c.id} value={c.id}>{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</option>
            ))}
          </select>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha de baja</label>
            <input type="date" value={fechaBaja} onChange={e => { setFechaBaja(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Último día laborado</label>
            <input type="date" value={ultimoDia} onChange={e => setUltimoDia(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
          </div>
        </div>
        <div className="text-[11px] text-gray-400 -mt-2">La baja puede programarse a fecha futura. Aplica desde el lunes siguiente a la fecha de baja.</div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Motivo</label>
          <select value={motivo} onChange={e => { setMotivo(e.target.value); setError(''); }}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
            {SEED.motivosBaja.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        {motivo === 'Otro' && (
          <div className="fade-in">
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Especifica el motivo</label>
            <input value={motivoLibre} onChange={e => { setMotivoLibre(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}
              placeholder="Describe el motivo de la baja" />
          </div>
        )}
        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Comentarios <span className="text-gray-400 normal-case">(opcional)</span></label>
          <textarea value={comentarios} onChange={e => setComentarios(e.target.value)}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minHeight: 70 }}
            placeholder="Información adicional sobre la baja" />
        </div>
        <label className="flex items-center gap-2.5 cursor-pointer">
          <input type="checkbox" checked={tieneDoc} onChange={e => setTieneDoc(e.target.checked)} style={{ width: 16, height: 16 }} />
          <span className="text-sm">Cuento con documento de respaldo (renuncia firmada, finiquito, etc.)</span>
        </label>
        <div className="text-[11px] text-gray-400 -mt-1">En esta etapa solo se registra si existe documento. La carga del archivo estará disponible en la versión final.</div>
        {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}>
          <Icon name="alert" size={12} /> {error}</div>}
        <div className="flex justify-end pt-1">
          <button onClick={enviar} className="btn btn-primary"><Icon name="logout" size={14} /> Enviar solicitud de baja</button>
        </div>
      </div>
    </div>
  );
}

/* --- Pestaña: Aprobaciones --- */
function BajaAprobaciones() {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const [rechazando, setRechazando] = useState(null);

  const pendientes = (state.bajas || []).filter(b => b.estado === 'pendiente');

  function resolver(bajaId, nuevoEstado, motivoRechazo) {
    const baja = state.bajas.find(b => b.id === bajaId);
    const colab = state.colaboradores.find(c => c.id === baja.colaboradorId);
    let nuevosColabs = state.colaboradores;
    // Si se aprueba, el colaborador pasa a estatus 'baja' (se queda en la base de datos)
    if (nuevoEstado === 'aprobada') {
      nuevosColabs = state.colaboradores.map(c => c.id === baja.colaboradorId
        ? { ...c, estatus: 'baja', fechaBajaActual: baja.fechaBaja }
        : c);
    }
    const nuevasBajas = state.bajas.map(b => b.id === bajaId
      ? { ...b, estado: nuevoEstado, aprobadorId: user.id, fechaResolucion: new Date().toISOString(),
          motivoRechazo: motivoRechazo || null }
      : b);
    setState({ ...state, bajas: nuevasBajas, colaboradores: nuevosColabs });
    addAuditLog({ modulo: 'bajas', accion: nuevoEstado === 'aprobada' ? 'aprobar' : 'rechazar',
      entidad: bajaId, valorAnterior: { estado: 'pendiente' },
      valorNuevo: { estado: nuevoEstado, colaborador: colab?.nombre } });
    toast(nuevoEstado === 'aprobada'
      ? `Baja de ${colab?.nombre} aprobada.`
      : `Solicitud de baja de ${colab?.nombre} rechazada.`);
  }

  if (pendientes.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No hay solicitudes de baja pendientes de aprobación.
    </div>;
  }

  return (
    <>
      <div className="space-y-3">
        {pendientes.map(b => {
          const colab = state.colaboradores.find(c => c.id === b.colaboradorId);
          const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab?.sucursalId);
          const un = SEED.unidades.find(u => u.id === suc?.unId);
          const solicitante = getUsuarios(state).find(u => u.id === b.solicitanteId);
          const puesto = SEED.puestos.find(p => p.id === colab?.puestoId);
          return (
            <div key={b.id} className="bg-white rounded-xl shadow-card p-5">
              <div className="flex items-start gap-4">
                <div className="avatar" style={{ width: 42, height: 42, background: un?.color || '#999' }}>
                  {colab?.nombre[0]}{colab?.apellidoPaterno[0]}
                </div>
                <div className="flex-1">
                  <div className="font-medium">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</div>
                  <div className="text-xs text-gray-500 mb-2">{suc?.nombre} · {puesto?.nombre}</div>
                  <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm">
                    <div><span className="text-gray-500">Fecha de baja:</span> <span className="num">{fmtFecha(b.fechaBaja)}</span></div>
                    <div><span className="text-gray-500">Último día:</span> <span className="num">{fmtFecha(b.ultimoDiaLaborado)}</span></div>
                    <div><span className="text-gray-500">Motivo:</span> <span className="font-medium">{b.motivo}</span></div>
                  </div>
                  {b.comentarios && <div className="text-sm text-gray-600 mt-1.5">"{b.comentarios}"</div>}
                  <div className="flex items-center gap-3 mt-1.5">
                    <div className="text-[11px] text-gray-400">Solicitó {solicitante?.nombre} · {fmtFecha(b.fechaSolicitud)}</div>
                    {b.tieneDocumento
                      ? <span className="badge badge-aprobada">Con documento</span>
                      : <span className="badge badge-borrador">Sin documento</span>}
                  </div>
                </div>
                <div className="flex flex-col gap-2">
                  <button onClick={() => resolver(b.id, 'aprobada')} className="btn btn-success"><Icon name="check" size={14} /> Aprobar baja</button>
                  <button onClick={() => setRechazando(b.id)} className="btn btn-danger"><Icon name="x" size={14} /> Rechazar</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {rechazando && (
        <BajaRechazoModal
          onClose={() => setRechazando(null)}
          onConfirm={(motivo) => { resolver(rechazando, 'rechazada', motivo); setRechazando(null); }}
        />
      )}
    </>
  );
}

function BajaRechazoModal({ onClose, onConfirm }) {

  return (
    <div className="modal-backdrop" onClick={onClose}>

        <p className="text-sm text-gray-500 mb-4">Indica el motivo del rechazo.</p>

/* --- Pestaña: Historial --- */
function BajaHistorial() {
  const { user, state } = useApp();
  let lista = [...(state.bajas || [])];
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    lista = lista.filter(b => {
      const c = state.colaboradores.find(x => x.id === b.colaboradorId);
      return c && ids.includes(c.sucursalId);
    });
  } else if (user.rol === 'asesor') {
    const sucs = sucursalesDeAsesor(state, user.id);
    lista = lista.filter(b => {
      const c = state.colaboradores.find(x => x.id === b.colaboradorId);
      return c && sucs.includes(c.sucursalId);
    });
  }
  lista.sort((a, b) => new Date(b.fechaSolicitud) - new Date(a.fechaSolicitud));

  if (lista.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      Aún no hay solicitudes de baja registradas.
    </div>;
  }

  return (
    <div className="bg-white rounded-xl overflow-hidden shadow-card">
      <table className="lem-table w-full">
        <thead><tr>
          <th>Colaborador</th><th>Sucursal</th><th>Fecha de baja</th><th>Motivo</th><th>Estado</th><th>Solicitada</th>
        </tr></thead>
        <tbody>
          {lista.slice(0, 60).map(b => {
            const colab = state.colaboradores.find(c => c.id === b.colaboradorId);
            const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab?.sucursalId);
            const un = SEED.unidades.find(u => u.id === suc?.unId);
            return (
              <tr key={b.id}>
                <td className="font-medium">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</td>
                <td>
                  <div className="flex items-center gap-2 text-sm">
                    <span className="brand-dot" style={{background:un?.color || '#999'}} />
                    {suc?.nombre || '—'}
                  </div>
                </td>
                <td className="num text-sm">{fmtFecha(b.fechaBaja)}</td>
                <td className="text-sm">{b.motivo}</td>
                <td>
                  {b.estado === 'pendiente' && <span className="badge badge-revision">Pendiente</span>}
                  {b.estado === 'aprobada' && <span className="badge badge-rechazada">Baja aprobada</span>}
                  {b.estado === 'rechazada' && <span className="badge badge-borrador">Rechazada</span>}
                </td>
                <td className="num text-sm text-gray-600">{fmtFecha(b.fechaSolicitud)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* --- Pestaña: Solicitar movimiento --- */
function MovSolicitar() {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';

  // Colaboradores que el usuario puede gestionar
  let candidatos = state.colaboradores.filter(c => c.estatus === 'activo');
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    candidatos = candidatos.filter(c => ids.includes(c.sucursalId));
  } else if (user.rol === 'asesor') {
    const sucs = sucursalesDeAsesor(state, user.id);
    candidatos = candidatos.filter(c => sucs.includes(c.sucursalId));
  }

  // Tipos de movimiento disponibles según rol:
  // sueldo solo lo solicitan quienes ven sueldos (admin/contabilidad)
  const tiposDisponibles = [
    { v: 'sucursal', label: 'Cambio de sucursal' },
    { v: 'puesto', label: 'Cambio de puesto' },
  ];
  if (verSueldos) tiposDisponibles.push({ v: 'sueldo', label: 'Cambio de sueldo' });

  const [colabId, setColabId] = useState('');
  const [tipo, setTipo] = useState('sucursal');
  const [nuevaSucursal, setNuevaSucursal] = useState('');
  const [nuevoPuesto, setNuevoPuesto] = useState('');
  const [nuevoSueldo, setNuevoSueldo] = useState('');
  const [fechaEfectiva, setFechaEfectiva] = useState('');
  const [motivo, setMotivo] = useState('');
  const [error, setError] = useState('');

  const colab = state.colaboradores.find(c => c.id === colabId);
  const sucActual = colab ? (state.sucursales || SEED.sucursales).find(s => s.id === colab.sucursalId) : null;
  const puestoActual = colab ? SEED.puestos.find(p => p.id === colab.puestoId) : null;
  const todasSuc = (state.sucursales || SEED.sucursales).filter(s => s.unId !== 'corp');
  const puestosOp = SEED.puestos.filter(p => p.cat === 'op');

  function enviar() {
    setError('');
    if (!colabId) { setError('Selecciona un colaborador.'); return; }
    if (!fechaEfectiva) { setError('Indica la fecha en que aplica el movimiento.'); return; }
    let detalleAnterior, detalleNuevo, resumen;
    if (tipo === 'sucursal') {
      if (!nuevaSucursal) { setError('Selecciona la sucursal destino.'); return; }
      if (nuevaSucursal === colab.sucursalId) { setError('La sucursal destino es la misma que la actual.'); return; }
      const sucDest = todasSuc.find(s => s.id === nuevaSucursal);
      detalleAnterior = sucActual?.nombre;
      detalleNuevo = sucDest?.nombre;
      resumen = `Sucursal: ${sucActual?.nombre} → ${sucDest?.nombre}`;
    } else if (tipo === 'puesto') {
      if (!nuevoPuesto) { setError('Selecciona el puesto destino.'); return; }
      if (nuevoPuesto === colab.puestoId) { setError('El puesto destino es el mismo que el actual.'); return; }
      const pDest = puestosOp.find(p => p.id === nuevoPuesto);
      detalleAnterior = puestoActual?.nombre;
      detalleNuevo = pDest?.nombre;
      resumen = `Puesto: ${puestoActual?.nombre} → ${pDest?.nombre}`;
    } else { // sueldo
      if (!nuevoSueldo || parseFloat(nuevoSueldo) <= 0) { setError('Indica el nuevo sueldo.'); return; }
      detalleAnterior = colab.sueldoDiario;
      detalleNuevo = parseFloat(nuevoSueldo);
      resumen = `Sueldo diario: $${colab.sueldoDiario} → $${parseFloat(nuevoSueldo)}`;
    }
    const nuevo = {
      id: 'mov_' + Date.now().toString(36),
      colaboradorId: colabId,
      tipo,
      detalleAnterior,
      detalleNuevo,
      resumen,
      fechaEfectiva,
      motivo: motivo.trim(),
      estado: 'pendiente',
      solicitanteId: user.id,
      fechaSolicitud: new Date().toISOString(),
    };
    setState({ ...state, movimientos: [...(state.movimientos || []), nuevo] });
    addAuditLog({ modulo: 'movimientos', accion: 'solicitar', entidad: nuevo.id,
      valorAnterior: null, valorNuevo: { colaborador: colab.nombre, tipo, resumen } });
    toast('Solicitud de movimiento enviada.');
    setColabId(''); setNuevaSucursal(''); setNuevoPuesto(''); setNuevoSueldo('');
    setFechaEfectiva(''); setMotivo('');
  }

  if (candidatos.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No hay colaboradores disponibles para gestionar movimientos.
    </div>;
  }

  return (
    <div className="bg-white rounded-xl shadow-card p-6 max-w-2xl">
      <h3 className="text-base font-medium mb-1">Nueva solicitud de movimiento</h3>
      <p className="text-sm text-gray-500 mb-5">Los cambios de sucursal y puesto los autoriza el Asesor o el Administrador. Los de sueldo, Contabilidad o el Administrador.</p>
      <div className="space-y-4">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Colaborador</label>
          <select value={colabId} onChange={e => { setColabId(e.target.value); setError(''); }}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
            <option value="">Selecciona...</option>
            {candidatos.map(c => <option key={c.id} value={c.id}>{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</option>)}
          </select>
        </div>

        {colab && (
          <div className="p-3 rounded-lg text-sm" style={{ background: 'var(--bg)' }}>
            <span className="text-gray-500">Situación actual:</span> {sucActual?.nombre} · {puestoActual?.nombre}
            {verSueldos && <> · ${colab.sueldoDiario}/día</>}
          </div>
        )}

        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Tipo de movimiento</label>
          <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${tiposDisponibles.length}, 1fr)` }}>
            {tiposDisponibles.map(t => (
              <button key={t.v} onClick={() => { setTipo(t.v); setError(''); }}
                className="py-2 rounded-lg text-sm font-medium border"
                style={tipo === t.v ? { background: 'var(--lem)', color: 'white', borderColor: 'var(--lem)' }
                  : { background: 'white', borderColor: 'var(--border-strong)', color: 'var(--text-soft)' }}>
                {t.label}
              </button>
            ))}
          </div>
        </div>

        {tipo === 'sucursal' && (
          <div className="fade-in">
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Sucursal destino</label>
            <select value={nuevaSucursal} onChange={e => { setNuevaSucursal(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              <option value="">Selecciona...</option>
              {todasSuc.filter(s => s.id !== colab?.sucursalId).map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
            </select>
          </div>
        )}
        {tipo === 'puesto' && (
          <div className="fade-in">
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Puesto destino</label>
            <select value={nuevoPuesto} onChange={e => { setNuevoPuesto(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              <option value="">Selecciona...</option>
              {puestosOp.filter(p => p.id !== colab?.puestoId).map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
            </select>
          </div>
        )}
        {tipo === 'sueldo' && (
          <div className="fade-in">
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Nuevo sueldo diario</label>
            <input type="number" value={nuevoSueldo} onChange={e => { setNuevoSueldo(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }}
              placeholder={colab ? `Actual: $${colab.sueldoDiario}` : '$'} />
          </div>
        )}

        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha efectiva</label>
          <input type="date" value={fechaEfectiva} onChange={e => { setFechaEfectiva(e.target.value); setError(''); }}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
          <p className="text-[11px] text-gray-400 mt-1">Puede ser una fecha futura. El cambio aplica al ser aprobado y llegada esta fecha.</p>
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Motivo <span className="text-gray-400 normal-case">(opcional)</span></label>
          <textarea value={motivo} onChange={e => setMotivo(e.target.value)}
            className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minHeight: 60 }}
            placeholder="Ej. promoción por desempeño, necesidad operativa..." />
        </div>
        {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}>
          <Icon name="alert" size={12} /> {error}</div>}
        <div className="flex justify-end pt-1">
          <button onClick={enviar} className="btn btn-primary"><Icon name="moveH" size={14} /> Enviar solicitud</button>
        </div>
      </div>
    </div>
  );
}

/* --- Pestaña: Aprobaciones --- */
function MovAprobaciones() {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const [rechazando, setRechazando] = useState(null);
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';

  // Qué puede aprobar cada rol:
  // - sueldo: solo admin y contabilidad
  // - sucursal/puesto: asesor (de su UN), admin
  function puedeAprobar(mov) {
    // El cambio de sueldo solo lo autorizan Admin y Contabilidad (los que ven montos)
    if (mov.tipo === 'sueldo') return user.rol === 'admin' || user.rol === 'contabilidad';
    // Cambios de sucursal o puesto: Admin y RH (todo el grupo), Asesor (solo sus sucursales asignadas)
    if (user.rol === 'admin') return true;
    if (user.rol === 'rh') return true;
    if (user.rol === 'asesor') {
      const colab = state.colaboradores.find(c => c.id === mov.colaboradorId);
      return colab && sucursalesDeAsesor(state, user.id).includes(colab.sucursalId);
    }
    return false;
  }

  const pendientes = (state.movimientos || []).filter(m => m.estado === 'pendiente');
  const visibles = pendientes.filter(puedeAprobar);

  function aplicarMovimiento(colaboradores, mov) {
    return colaboradores.map(c => {
      if (c.id !== mov.colaboradorId) return c;
      if (mov.tipo === 'sucursal') {
        const sucDest = (state.sucursales || SEED.sucursales).find(s => s.nombre === mov.detalleNuevo);
        return { ...c, sucursalId: sucDest ? sucDest.id : c.sucursalId };
      }
      if (mov.tipo === 'puesto') {
        const pDest = SEED.puestos.find(p => p.nombre === mov.detalleNuevo);
        return { ...c, puestoId: pDest ? pDest.id : c.puestoId };
      }
      if (mov.tipo === 'sueldo') {
        return { ...c, sueldoDiario: mov.detalleNuevo };
      }
      return c;
    });
  }

  function resolver(movId, nuevoEstado, motivoRechazo) {
    const mov = state.movimientos.find(m => m.id === movId);
    const colab = state.colaboradores.find(c => c.id === mov.colaboradorId);
    let nuevosColabs = state.colaboradores;
    if (nuevoEstado === 'aprobado') {
      nuevosColabs = aplicarMovimiento(state.colaboradores, mov);
    }
    const nuevosMovs = state.movimientos.map(m => m.id === movId
      ? { ...m, estado: nuevoEstado, aprobadorId: user.id, fechaResolucion: new Date().toISOString(),
          motivoRechazo: motivoRechazo || null }
      : m);
    setState({ ...state, movimientos: nuevosMovs, colaboradores: nuevosColabs });
    addAuditLog({ modulo: 'movimientos', accion: nuevoEstado === 'aprobado' ? 'aprobar' : 'rechazar',
      entidad: movId, valorAnterior: { estado: 'pendiente' },
      valorNuevo: { estado: nuevoEstado, colaborador: colab?.nombre, resumen: mov.resumen } });
    toast(nuevoEstado === 'aprobado'
      ? `Movimiento de ${colab?.nombre} aprobado y aplicado.`
      : `Movimiento de ${colab?.nombre} rechazado.`);
  }

  if (visibles.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No hay movimientos pendientes de tu aprobación.
    </div>;
  }

  return (
    <>
      <div className="space-y-3">
        {visibles.map(m => {
          const colab = state.colaboradores.find(c => c.id === m.colaboradorId);
          const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab?.sucursalId);
          const un = SEED.unidades.find(u => u.id === suc?.unId);
          const solicitante = getUsuarios(state).find(u => u.id === m.solicitanteId);
          const esSueldo = m.tipo === 'sueldo';
          // Ocultar montos a quien no ve sueldos (no debería llegar aquí, pero por seguridad)
          const mostrarResumen = esSueldo && !verSueldos ? 'Cambio de sueldo' : m.resumen;
          const tipoLabel = m.tipo === 'sucursal' ? 'Cambio de sucursal' : m.tipo === 'puesto' ? 'Cambio de puesto' : 'Cambio de sueldo';
          return (
            <div key={m.id} className="bg-white rounded-xl shadow-card p-5">
              <div className="flex items-start gap-4">
                <div className="avatar" style={{ width: 42, height: 42, background: un?.color || '#999' }}>
                  {colab?.nombre[0]}{colab?.apellidoPaterno[0]}
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <div className="font-medium">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</div>
                    <span className="badge badge-revision">{tipoLabel}</span>
                  </div>
                  <div className="text-xs text-gray-500 mb-2">{suc?.nombre} · {SEED.puestos.find(p => p.id === colab?.puestoId)?.nombre}</div>
                  <div className="text-sm font-medium" style={{ color: 'var(--lem-dark)' }}>{mostrarResumen}</div>
                  <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm mt-1">
                    <div><span className="text-gray-500">Aplica el:</span> <span className="num">{fmtFecha(m.fechaEfectiva)}</span></div>
                  </div>
                  {m.motivo && <div className="text-sm text-gray-600 mt-1.5">"{m.motivo}"</div>}
                  <div className="text-[11px] text-gray-400 mt-1.5">Solicitó {solicitante?.nombre} · {fmtFecha(m.fechaSolicitud)}</div>
                </div>
                <div className="flex flex-col gap-2">
                  <button onClick={() => resolver(m.id, 'aprobado')} className="btn btn-success"><Icon name="check" size={14} /> Aprobar</button>
                  <button onClick={() => setRechazando(m.id)} className="btn btn-danger"><Icon name="x" size={14} /> Rechazar</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {rechazando && (
        <MovRechazoModal
          onClose={() => setRechazando(null)}
          onConfirm={(motivo) => { resolver(rechazando, 'rechazado', motivo); setRechazando(null); }}
        />
      )}
    </>
  );
}

/* --- Pestaña: Historial --- */
function MovHistorial() {
  const { user, state } = useApp();
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
  let lista = [...(state.movimientos || [])];
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    lista = lista.filter(m => {
      const c = state.colaboradores.find(x => x.id === m.colaboradorId);
      return c && ids.includes(c.sucursalId);
    });
  } else if (user.rol === 'asesor') {
    const sucs = sucursalesDeAsesor(state, user.id);
    lista = lista.filter(m => {
      const c = state.colaboradores.find(x => x.id === m.colaboradorId);
      return c && sucs.includes(c.sucursalId);
    });
  }
  lista.sort((a, b) => new Date(b.fechaSolicitud) - new Date(a.fechaSolicitud));

  if (lista.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      Aún no hay movimientos registrados.
    </div>;
  }

  return (
    <div className="bg-white rounded-xl overflow-hidden shadow-card">
      <table className="lem-table w-full">
        <thead><tr>
          <th>Colaborador</th><th>Tipo</th><th>Detalle</th><th>Aplica</th><th>Estado</th>
        </tr></thead>
        <tbody>
          {lista.slice(0, 60).map(m => {
            const colab = state.colaboradores.find(c => c.id === m.colaboradorId);
            const tipoLabel = m.tipo === 'sucursal' ? 'Sucursal' : m.tipo === 'puesto' ? 'Puesto' : 'Sueldo';
            const mostrarDetalle = (m.tipo === 'sueldo' && !verSueldos) ? 'Cambio de sueldo' : m.resumen;
            return (
              <tr key={m.id}>
                <td className="font-medium">{colab?.nombre} {colab?.apellidoPaterno}</td>
                <td>{tipoLabel}</td>
                <td className="text-sm">{mostrarDetalle}</td>
                <td className="num text-sm">{fmtFecha(m.fechaEfectiva)}</td>
                <td>
                  {m.estado === 'pendiente' && <span className="badge badge-revision">Pendiente</span>}
                  {m.estado === 'aprobado' && <span className="badge badge-aprobada">Aprobado</span>}
                  {m.estado === 'rechazado' && <span className="badge badge-rechazada">Rechazado</span>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ========================================================================
   REPORTES — comprobante de horario y días trabajados (para firma)
   ======================================================================== */
function ReportesScreen() {
  const { state } = useApp();
  const todasSuc = (state.sucursales || SEED.sucursales).filter(s => s.unId !== 'corp');
  const [sucursalId, setSucursalId] = useState(todasSuc[0]?.id || '');
  // Semanas disponibles: la actual y las 7 anteriores
  const semanas = useMemo(() => {
    const arr = [];
    let monday = getMonday();
    for (let i = 0; i < 8; i++) {
      const m = addDays(monday, -7 * i);
      arr.push({ weekId: getWeekId(m), monday: m,
        label: `Semana ${getWeekId(m)} · ${fmtFechaCorta(m)} – ${fmtFechaCorta(addDays(m,6))}` });
    }
    return arr;
  }, []);
  const [weekIdx, setWeekIdx] = useState(0);
  const [generado, setGenerado] = useState(null);

    const semana = semanas[weekIdx];
    setGenerado({ sucursalId, monday: semana.monday, weekId: semana.weekId });
  }

  return (
    <>
      <TopBar title="Reportes" subtitle="Comprobantes para firma de colaboradores" />
      <div className="p-8">
        <div className="bg-white rounded-xl shadow-card p-6 max-w-2xl">
          <h3 className="text-base font-medium mb-1">Comprobante de horario y días trabajados</h3>

          </p>
          <div className="space-y-4">
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Sucursal</label>
              <select value={sucursalId} onChange={e => setSucursalId(e.target.value)}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
                {todasSuc.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            </div>
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Semana</label>
              <select value={weekIdx} onChange={e => setWeekIdx(parseInt(e.target.value))}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
                {semanas.map((s, i) => <option key={s.weekId} value={i}>{s.label}{i === 0 ? ' (actual)' : ''}</option>)}
              </select>
            </div>
            <div className="flex justify-end">
              <button onClick={generar} className="btn btn-primary"><Icon name="file" size={14} /> Generar comprobante</button>
            </div>

      {generado && (
        <ComprobanteHorario
          sucursalId={generado.sucursalId}

          onClose={() => setGenerado(null)}
        />
