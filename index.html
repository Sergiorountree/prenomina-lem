  .cell-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 100%; height: 36px; border: 1px solid; border-radius: 6px;
    font-weight: 500; font-size: 12px; letter-spacing: 0.02em;

  .cell-btn:hover { box-shadow: 0 0 0 2px rgba(83,74,183,0.15); }
  .cell-btn:active { transform: scale(0.97); }

  /* Fancy checkbox */
  input[type="checkbox"] { accent-color: var(--lem); }

  /* Subtle shadows */
  .shadow-card { box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 0 0 1px var(--border); }
  .shadow-pop { box-shadow: 0 6px 24px rgba(0,0,0,0.08), 0 0 0 1px var(--border-strong); }
  .shadow-soft { box-shadow: 0 1px 2px rgba(0,0,0,0.03); }

  /* Brand dot */
  .brand-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* Sidebar nav item */
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 8px; font-size: 14px;
    color: var(--text-soft); cursor: pointer;

    display: inline-flex; align-items: center; justify-content: center; gap: 6px;

  .btn-primary { background: var(--lem); color: white; }

    border-radius: 50%; font-weight: 500; font-size: 12px; color: white;

  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: #1A1A1A; color: white; padding: 12px 16px;
    border-radius: 10px; font-size: 13px; max-width: 400px;
    box-shadow: 0 10px 32px rgba(0,0,0,0.2);
    animation: toast-in 0.2s ease;
  }
  @keyframes toast-in {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Tooltip */
  .tip { position: relative; }
  .tip:hover .tip-body { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .tip-body {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%) translateY(4px);
    background: #1A1A1A; color: white; padding: 6px 10px; border-radius: 5px;
    font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none;
    transition: all 0.12s ease; z-index: 30;
  }

  /* Stat card */
  .stat-card {
    background: white; border: 1px solid var(--border); border-radius: 10px;

  .stat-card .stat-value { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; }

  .fade-in { animation: fade-in 0.2s ease; }

  @media print {
    html, body {

      width: 100% !important; height: auto !important;
      background: white !important;

    body > *:not(.print-host) { display: none !important; }

    .print-host {
      display: block !important; position: absolute !important;
      left: 0 !important; top: 0 !important; right: 0 !important;
      width: 100% !important; margin: 0 !important; padding: 0 !important;
      background: white !important; z-index: 9999 !important;
      backdrop-filter: none !important;

    .print-host .no-print { display: none !important; }

    }

      box-shadow: none !important; border-radius: 0 !important;

const STORAGE_KEY = 'lem_app_v16';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* Migraciones idempotentes sobre el estado ya guardado: inyectan datos
   nuevos del SEED (p. ej. gerentes de sucursal agregados después) SIN
   cambiar el STORAGE_KEY ni borrar lo ya capturado. Se ejecutan en cada
   carga sin duplicar usuarios ni pisar asignaciones existentes. */
/* ============================================================
   CAPA DE DATOS FIRESTORE (Fase 2 — en construcción)
   Funciones NUEVAS y aisladas: la app todavía NO las usa (sigue
   en localStorage). Sirven para sembrar catálogos, importar y leer
   contra Firestore, y probarse desde la consola (window.lemFS)
   ANTES de re-cablear la app.
   ============================================================ */
function _normEmail(e) { return String(e || '').trim().toLowerCase(); }
function _emailDeUsuarioId(uid) {
  if (!uid) return null;
  const u = SEED.usuarios.find(x => x.id === uid);
  return u ? _normEmail(u.email) : null;
}
// Siembra catálogos maestros (usuarios, sucursales, config). Solo Admin (lo exigen las reglas).
async function fsSeedMaestros() {
  if (!db) throw new Error('Firestore no disponible');
  const batch = db.batch();
  SEED.usuarios.forEach(u => {
    batch.set(db.collection('usuarios').doc(_normEmail(u.email)),
      { email: _normEmail(u.email), rol: u.rol, nombre: u.nombre, puestoLabel: u.puestoLabel || '', activo: true },
      { merge: true });
  });
  SEED.sucursales.forEach(s => {
    batch.set(db.collection('sucursales').doc(s.id),
      { nombre: s.nombre, unId: s.unId, plantillaObjetivo: s.plantillaObjetivo || 0,
        gerenteEmail: _emailDeUsuarioId(s.gerenteId), asesorEmail: _emailDeUsuarioId(s.asesorId) },
      { merge: true });
  });
  batch.set(db.collection('config').doc('catalogos'),
    { unidades: SEED.unidades, puestos: SEED.puestos, motivosBaja: SEED.motivosBaja }, { merge: true });
  await batch.commit();
  return { usuarios: SEED.usuarios.length, sucursales: SEED.sucursales.length };
}
async function fsCargarMaestros() {
  const [us, sus, cat] = await Promise.all([
    db.collection('usuarios').get(),
    db.collection('sucursales').get(),
    db.collection('config').doc('catalogos').get(),
  ]);
  return {
    usuarios: us.docs.map(d => ({ id: d.id, ...d.data() })),
    sucursales: sus.docs.map(d => ({ id: d.id, ...d.data() })),
    catalogos: cat.exists ? cat.data() : null,
  };
}
// Importa colaboradores: ficha pública + sub-ficha privada de compensación (regla de oro).
async function fsImportarColaboradores(nuevos, verSueldos) {
  if (!db) throw new Error('Firestore no disponible');
  let escritos = 0;
  for (let i = 0; i < nuevos.length; i += 200) {
    const lote = nuevos.slice(i, i + 200);
    const batch = db.batch();
    lote.forEach(c => {
      const { sueldoDiario, bonoTransporte, ...publico } = c;
      const ref = db.collection('colaboradores').doc(c.id);
      batch.set(ref, publico, { merge: true });
      if (verSueldos) {
        batch.set(ref.collection('privado').doc('compensacion'),
          { sueldoDiario: sueldoDiario || 0, bonoTransporte: bonoTransporte || 0 }, { merge: true });
      }
    });
    await batch.commit();
    lote.forEach(c => _marcarSyncColab(c, verSueldos));
    escritos += lote.length;
  }
  return escritos;
}
async function fsCargarColaboradores(rol, email, verSueldos, sucursalesUsuario) {
  if (!db) throw new Error('Firestore no disponible');
  let docs = [];
  if (['admin','rh','contabilidad'].includes(rol)) {
    docs = (await db.collection('colaboradores').get()).docs;
  } else {
    const ids = (sucursalesUsuario || []).slice(0, 30);
    if (!ids.length) return [];
    docs = (await db.collection('colaboradores').where('sucursalId', 'in', ids).get()).docs;
  }
  const colabs = docs.map(d => ({ id: d.id, ...d.data() }));
  if (verSueldos) {
    await Promise.all(colabs.map(async c => {
      const p = await db.collection('colaboradores').doc(c.id).collection('privado').doc('compensacion').get();
      if (p.exists) { c.sueldoDiario = p.data().sueldoDiario; c.bonoTransporte = p.data().bonoTransporte; }
    }));
  }
  return colabs;
}

var _colabSync = {};        // id -> { pub, comp } ya sincronizado con Firestore
var _fsInicializado = false; // true cuando ya se cargaron los colaboradores de Firestore
function _marcarSyncColab(c, verSueldos) {
  var pub = Object.assign({}, c); delete pub.sueldoDiario; delete pub.bonoTransporte;
  _colabSync[c.id] = { pub: JSON.stringify(pub),
    comp: verSueldos ? ((c.sueldoDiario||0) + '|' + (c.bonoTransporte||0)) : null };
}
// Espera a que Firebase Auth restaure la sesión tras recargar (evita permission-denied prematuro).
function esperarAuthFirebase(timeoutMs) {
  timeoutMs = timeoutMs || 8000;
  if (firebase.auth().currentUser) return Promise.resolve(firebase.auth().currentUser);
  return new Promise(function(resolve){
    var done = false;
    var unsub = firebase.auth().onAuthStateChanged(function(u){
      if (u && !done) { done = true; try{unsub();}catch(e){} resolve(u); }
    });
    setTimeout(function(){ if(!done){ done=true; try{unsub();}catch(e){} resolve(firebase.auth().currentUser); } }, timeoutMs);
  });
}

var _colMapSync = {};   // col -> { docId -> json }
async function fsCargarMap(col) {
  if (!db) return {};
  try {
    var snap = await db.collection(col).get();
    var obj = {}; _colMapSync[col] = {};
    snap.docs.forEach(function(d){ obj[d.id] = d.data(); _colMapSync[col][d.id] = JSON.stringify(d.data()); });
    return obj;
  } catch (e) { console.error('Cargar ' + col + ':', e); return {}; }
}
function fsGuardarMap(col, datos) {
  if (!db || !_fsInicializado) return;
  var sync = _colMapSync[col] || (_colMapSync[col] = {});
  var cambios = [];
  Object.keys(datos || {}).forEach(function(k){
    var json = JSON.stringify(datos[k]);
    if (sync[k] !== json) { cambios.push({ id: k, data: datos[k] }); sync[k] = json; }
  });
  if (!cambios.length) return;
  (async function(){
    for (var i = 0; i < cambios.length; i += 200) {
      var lote = cambios.slice(i, i + 200);
      var batch = db.batch();
      lote.forEach(function(x){ batch.set(db.collection(col).doc(String(x.id)), x.data, { merge: true }); });
      try { await batch.commit(); } catch (e) { console.error('Guardar ' + col + ':', e); }
    }
  })();
}

    }
  })();
}
// ---- Movimientos: los de tipo 'sueldo' guardan el MONTO en subcolección privada (regla de oro) ----
var _movSync = {};   // id -> json del doc público
function _sanitizarMov(m) {
  var pub = Object.assign({}, m); delete pub.id;
  if (m.tipo === 'sueldo') {
    var priv = { detalleAnterior: (m.detalleAnterior === undefined ? null : m.detalleAnterior),
                 detalleNuevo:    (m.detalleNuevo === undefined ? null : m.detalleNuevo),
                 resumen: m.resumen || '' };
    pub.detalleAnterior = null;
    pub.detalleNuevo = null;
    pub.resumen = 'Cambio de sueldo (monto reservado)';
    pub._montoPrivado = true;
    return { pub: pub, priv: priv };
  }
  return { pub: pub, priv: null };
}
async function fsCargarMovimientos(rol, verSueldos) {
  if (!db) return [];
  try {
    var snap = await db.collection('movimientos').get();
    _movSync = {};
    var arr = [];
    for (var d of snap.docs) {
      var data = d.data();
      _movSync[d.id] = JSON.stringify(data);
      var mov = Object.assign({ id: d.id }, data);
      if (mov._montoPrivado && verSueldos) {
        try {
          var p = await db.collection('movimientos').doc(d.id).collection('privado').doc('montos').get();
          if (p.exists) { mov.detalleAnterior = p.data().detalleAnterior; mov.detalleNuevo = p.data().detalleNuevo; mov.resumen = p.data().resumen; }
        } catch (e) {}
      }
      delete mov._montoPrivado;
      arr.push(mov);
    }
    return arr;
  } catch (e) { console.error('Cargar movimientos:', e); return []; }
}
function fsGuardarMovimientos(items, verSueldos) {
  if (!db || !_fsInicializado) return;
  var cambios = [];
  (items || []).forEach(function(m){
    if (!m || !m.id) return;
    var s = _sanitizarMov(m);
    var json = JSON.stringify(s.pub);
    if (_movSync[m.id] !== json) { cambios.push({ id: m.id, pub: s.pub, priv: s.priv }); _movSync[m.id] = json; }
  });
  if (!cambios.length) return;
  (async function(){
    for (var i = 0; i < cambios.length; i += 150) {
      var lote = cambios.slice(i, i + 150);
      var batch = db.batch();
      lote.forEach(function(x){
        var r = db.collection('movimientos').doc(String(x.id));
        batch.set(r, x.pub, { merge: true });
        if (x.priv && verSueldos) batch.set(r.collection('privado').doc('montos'), x.priv, { merge: true });
      });
      try { await batch.commit(); } catch (e) { console.error('Guardar movimientos:', e); }
    }
  })();
}

function aplicarMigraciones(state) {
  // 1) Agregar usuarios del SEED que aún no existan (match por email).
  const emails = new Set((state.usuarios || []).map(u => (u.email || '').toLowerCase()));
  SEED.usuarios.forEach(su => {
    const key = (su.email || '').toLowerCase();
    if (!emails.has(key)) { state.usuarios.push({ ...su }); emails.add(key); }
  });
  // 2) Asignar gerente y asesor del SEED a cada sucursal que aún no los tenga.
  SEED.sucursales.forEach(ss => {
    const tgt = (state.sucursales || []).find(s => s.id === ss.id);
    if (!tgt) return;
    if (ss.gerenteId && !tgt.gerenteId) tgt.gerenteId = ss.gerenteId;
    if (ss.asesorId && !tgt.asesorId) tgt.asesorId = ss.asesorId;
  });
  return state;
}

function getInitialState() {
  const base = {
    colaboradores: [],
    usuarios: SEED.usuarios.map(u => ({...u})),
    sucursales: SEED.sucursales.map(s => ({...s})),
    contratos: [],
    prenominas: {},
    horarios: {},
    vacaciones: [],
    bajas: [],
    movimientos: [],
    bonos: {},
    auditoria: [],
    notificaciones: [],
  };
  const existing = loadState();
  if (existing && existing.colaboradores && existing.colaboradores.length > 0) {
    // Fusionar con la base para garantizar que todos los campos existan,
    // aunque el estado guardado sea de una versión anterior incompleta.
    const merged = { ...base, ...existing,
      usuarios: existing.usuarios && existing.usuarios.length
        ? existing.usuarios
        : SEED.usuarios.map(u => ({...u})),
      sucursales: existing.sucursales && existing.sucursales.length
        ? existing.sucursales
        : SEED.sucursales.map(s => ({...s})) };
    return aplicarMigraciones(merged);
  }
  return { ...base, colaboradores: generateColaboradores() };
}

// Fuente única de usuarios: el estado (sembrado desde SEED). Permite que el Admin cree cuentas nuevas.
function getUsuarios(state) {
  return (state && state.usuarios && state.usuarios.length) ? state.usuarios : SEED.usuarios;
}

/* Devuelve los IDs de sucursales asignadas a un gerente.
   Fuente única de verdad: el campo gerenteId de cada sucursal en el estado.
   Así, al reasignar una sucursal desde el panel de Admin, el alcance
   del gerente se actualiza automáticamente. */
function sucursalesDeGerente(state, usuarioId) {
  const lista = (state && state.sucursales) ? state.sucursales : SEED.sucursales;
  return lista.filter(s => s.gerenteId === usuarioId).map(s => s.id);
}

// Sucursales asignadas a un asesor (campo asesorId en cada sucursal).
// El asesor puede tener tiendas de cualquier marca, igual que el gerente tiene varias sucursales.
function sucursalesDeAsesor(state, usuarioId) {
  const lista = (state && state.sucursales) ? state.sucursales : SEED.sucursales;
  return lista.filter(s => s.asesorId === usuarioId).map(s => s.id);
}

function getMonday(d = new Date()) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1);
  date.setDate(diff);
  date.setHours(0,0,0,0);
  return date;
}
function fmtFecha(d) {
  return new Date(d).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtFechaCorta(d) {
  return new Date(d).toLocaleDateString('es-MX', { day:'2-digit', month:'short' });
}
function calcAntiguedad(fechaIngreso) {
  const ini = new Date(fechaIngreso);
  const hoy = new Date();
  let meses = (hoy.getFullYear() - ini.getFullYear()) * 12 + (hoy.getMonth() - ini.getMonth());
  if (hoy.getDate() < ini.getDate()) meses--;
  if (meses < 0) meses = 0;
  const anios = Math.floor(meses / 12);
  const m = meses % 12;
  return { anios, meses: m, totalMeses: meses };
}
function fmtAntiguedad(fechaIngreso) {
  const a = calcAntiguedad(fechaIngreso);
  if (a.anios === 0 && a.meses === 0) return 'Recién ingreso';
  const partes = [];
  if (a.anios > 0) partes.push(a.anios + (a.anios === 1 ? ' año' : ' años'));
  if (a.meses > 0) partes.push(a.meses + (a.meses === 1 ? ' mes' : ' meses'));
  return partes.join(' ');
}

/* Días de vacaciones según LFT (reforma 2023) por años cumplidos de antigüedad.
   1er año: 12 · 2do: 14 · 3ro: 16 · 4to: 18 · 5to: 20 · luego +2 por cada 5 años. */
function diasVacacionesLFT(aniosCumplidos) {
  if (aniosCumplidos < 1) return 0;
  if (aniosCumplidos === 1) return 12;
  if (aniosCumplidos === 2) return 14;
  if (aniosCumplidos === 3) return 16;
  if (aniosCumplidos === 4) return 18;
  if (aniosCumplidos === 5) return 20;
  // 6+: 20 base, +2 por cada bloque de 5 años cumplidos
  const bloques = Math.floor((aniosCumplidos - 1) / 5);
  return 20 + bloques * 2;
}

/* Calcula el periodo de vacaciones vigente de un colaborador.
   El "año de vacaciones" va de aniversario a aniversario, no por calendario. */
function periodoVacaciones(fechaIngreso) {
  const ini = new Date(fechaIngreso);
  const hoy = new Date();
  const a = calcAntiguedad(fechaIngreso);
  const aniosCumplidos = a.anios;
  // Último aniversario cumplido
  const ultimoAniv = new Date(ini);
  ultimoAniv.setFullYear(ini.getFullYear() + aniosCumplidos);
  // Próximo aniversario
  const proxAniv = new Date(ini);
  proxAniv.setFullYear(ini.getFullYear() + aniosCumplidos + 1);
  // Días que corresponden en el periodo vigente
  const diasCorresponden = diasVacacionesLFT(aniosCumplidos);
  return {
    aniosCumplidos,
    ultimoAniv,
    proxAniv,
    diasCorresponden,
    // Días hasta el próximo aniversario
    diasParaAniv: Math.ceil((proxAniv - hoy) / 86400000),
  };
}

/* Suma los días naturales de vacaciones ya aprobadas dentro del periodo vigente. */
function diasTomados(state, colabId, periodo) {
  let total = 0;
  (state.vacaciones || []).forEach(v => {
    if (v.colaboradorId !== colabId) return;
    if (v.estado !== 'aprobada') return;
    const ini = new Date(v.fechaInicio);
    // Cuenta si la solicitud cae dentro del periodo vigente (desde último aniversario)
    if (ini >= periodo.ultimoAniv && ini < periodo.proxAniv) {
      total += v.diasNaturales || 0;
    }
  });
  return total;
}

/* Saldo completo de vacaciones de un colaborador. */
function saldoVacaciones(state, colab) {
  const periodo = periodoVacaciones(colab.fechaIngreso);
  const tomados = diasTomados(state, colab.id, periodo);
  return {
    ...periodo,
    tomados,
    pendientes: Math.max(0, periodo.diasCorresponden - tomados),
  };
}

function diasEntreFechas(inicio, fin) {
  const a = new Date(inicio), b = new Date(fin);
  return Math.floor((b - a) / 86400000) + 1; // inclusivo
}

/* Calcula las horas entre una hora de entrada y salida ("09:00", "17:00"). */
function horasDeTurno(entrada, salida) {
  if (!entrada || !salida) return 0;
  const [he, me] = entrada.split(':').map(Number);
  const [hs, ms] = salida.split(':').map(Number);
  let min = (hs * 60 + ms) - (he * 60 + me);
  if (min < 0) min += 24 * 60; // turno que cruza medianoche
  return Math.round((min / 60) * 10) / 10;
}

/* Estatus de alta ante el IMSS: etiqueta y estilo de badge. */
const IMSS_STATUS = {
  pendiente: { label: 'Pendiente', badge: 'badge-revision' },
  alta:      { label: 'Dado de alta', badge: 'badge-aprobada' },
  baja:      { label: 'Baja', badge: 'badge-rechazada' },
};
function imssInfo(status) {
  return IMSS_STATUS[status] || IMSS_STATUS.pendiente;
}

/* Tipos de contrato. Temporal y Renovación vencen; Planta es indefinido. */
const TIPOS_CONTRATO = {
  temporal:   { label: 'Temporal', vence: true },
  renovacion: { label: 'Renovación', vence: true },
  planta:     { label: 'Planta (definitivo)', vence: false },
};

/* Días que faltan para que venza un contrato (negativo = ya venció). */
function diasParaVencer(fechaFin) {
  if (!fechaFin) return null;
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fin = new Date(fechaFin); fin.setHours(0,0,0,0);
  return Math.round((fin - hoy) / 86400000);
}

/* Contrato vigente de un colaborador = el más reciente por fecha de inicio. */
function contratoVigente(state, colabId) {
  const lista = (state.contratos || []).filter(c => c.colaboradorId === colabId);
  if (!lista.length) return null;
  return lista.slice().sort((a,b) => new Date(b.fechaInicio) - new Date(a.fechaInicio))[0];
}

/* Estado de alerta de un contrato según días para vencer. */
function alertaContrato(contrato, diasAviso = 30) {
  if (!contrato) return null;
  const tipo = TIPOS_CONTRATO[contrato.tipo];
  if (!tipo || !tipo.vence) return null; // planta no alerta
  const dias = diasParaVencer(contrato.fechaFin);
  if (dias === null) return null;
  if (dias < 0) return { nivel: 'vencido', dias, label: `Venció hace ${Math.abs(dias)} día(s)` };
  if (dias === 0) return { nivel: 'vencido', dias, label: 'Vence hoy' };
  if (dias <= diasAviso) return { nivel: 'porVencer', dias, label: `Vence en ${dias} día(s)` };
  return { nivel: 'vigente', dias, label: `Vigente · ${dias} día(s)` };
}

/* ------------------------------------------------------------------
   ALERTA: descansos programados en fin de semana (vie/sáb/dom).
   En el horario, los días son lun=0 ... vie=4, sáb=5, dom=6.
   Viernes, sábado y domingo son los días pico en restaurantes,
   así que un descanso en esos días se marca para revisión del asesor/admin.
   ------------------------------------------------------------------ */
const DIAS_FINDE = [4, 5, 6]; // viernes, sábado, domingo
const NOMBRE_DIA_FINDE = { 4: 'viernes', 5: 'sábado', 6: 'domingo' };

/* Devuelve, para un horario dado, la lista de descansos en fin de semana:
   [{ colaboradorId, dias: [4,5], nombresDias: ['viernes','sábado'] }] */
function descansosFinDeSemana(horario) {
  if (!horario || !horario.detalle) return [];
  const resultado = [];
  Object.keys(horario.detalle).forEach(colabId => {
    const diasColab = horario.detalle[colabId];
    const diasDescanso = DIAS_FINDE.filter(d => diasColab?.[d]?.tipo === 'descanso');
    if (diasDescanso.length > 0) {
      resultado.push({ colaboradorId: colabId, dias: diasDescanso,
        nombresDias: diasDescanso.map(d => NOMBRE_DIA_FINDE[d]) });
    }
  });
  return resultado;
}

/* Recorre todos los horarios de un conjunto de sucursales y junta las alertas
   de descanso en fin de semana, con datos del colaborador y la sucursal. */
function alertasFinDeSemana(state, sucIds) {
  const alertas = [];
  const horarios = state.horarios || {};
  Object.keys(horarios).forEach(key => {
    const h = horarios[key];
    if (!h || !sucIds.includes(h.sucursalId)) return;
    descansosFinDeSemana(h).forEach(d => {
      const colab = state.colaboradores.find(c => c.id === d.colaboradorId);
      if (!colab || colab.estatus !== 'activo') return;
      alertas.push({
        colab, sucursalId: h.sucursalId, weekId: h.weekId,
        dias: d.dias, nombresDias: d.nombresDias,
      });
    });
  });
  return alertas;
}

/* ------------------------------------------------------------------
   CÁLCULO DE NÓMINA SEMANAL (solo percepciones, sin deducciones)
   Reglas (Grupo LEM):
   - A (asistencia), VAC, PCGS: se pagan 1 día c/u
   - D (descanso): se paga SOLO si el colaborador trabajó/cubrió 6 días
   - INC: no lo paga la empresa (lo cubre el IMSS)
   - PSGS, FI: no se pagan
   - Se suma el bono de transporte (diario) por cada día efectivamente pagado
   ------------------------------------------------------------------ */
function calcularNominaColab(colab, detalleDias) {
  // detalleDias: objeto { 0..6: { indicador } } de la pre-nómina. Día 6 = domingo.
  const conteo = { A: 0, D: 0, VAC: 0, PCGS: 0, PSGS: 0, FI: 0, INC: 0, BAJA: 0 };
  let trabajoDomingo = false;
  for (let d = 0; d < 7; d++) {
    const ind = detalleDias?.[d]?.indicador;
    if (ind && conteo[ind] !== undefined) conteo[ind]++;
    if (d === 6 && ind === 'A') trabajoDomingo = true; // domingo trabajado
  }

  const sueldo = colab.sueldoDiario || 0;

  // --- DÍAS TRABAJADOS / CUBIERTOS ---
  // Días que cuentan como cubiertos para el derecho a descanso: A + VAC + PCGS
  const diasCubiertos = conteo.A + conteo.VAC + conteo.PCGS;

  // --- DESCANSO PAGADO ---
  // Regla: se requieren al menos 5 días cubiertos para tener derecho a descanso.
  // Con 5 o 6 días, se descuenta 1/6 del descanso por cada falta (FI).
  // Con menos de 5 días cubiertos, no hay descanso pagado.
  let factorDescanso = 0; // proporción del día de descanso que se paga (0 a 1)
  if (conteo.D > 0 && diasCubiertos >= 5) {
    const fraccionPerdida = conteo.FI / 6;
    factorDescanso = Math.max(0, 1 - fraccionPerdida);
  }
  const descansoPagado = factorDescanso; // en "días" (puede ser fracción, ej. 0.833)

  // --- PRIMA DOMINICAL ---
  // Si trabajó el domingo, ese día (ya contado en A) recibe 25% adicional.
  const primaDominical = trabajoDomingo ? 0.25 : 0; // en "días" extra

  // --- DÍAS PAGADOS (sueldo) ---
  // A + VAC + PCGS (días base) + descanso proporcional + prima dominical
  const diasBase = conteo.A + conteo.VAC + conteo.PCGS;
  const diasPagados = diasBase + descansoPagado + primaDominical;
  const montoSueldo = Math.round(diasPagados * sueldo * 100) / 100;

  // --- BONO SEMANAL FIJO ---
  // Se pierde completo si hubo FI o PSGS en la semana. PCGS y VAC NO afectan el bono.
  const bonoSemanal = colab.bonoTransporte || 0;
  const pierdeBono = conteo.FI > 0 || conteo.PSGS > 0;
  const montoBono = pierdeBono ? 0 : bonoSemanal;

  // --- HORAS EXTRAS ---
  // El gerente captura las horas; Contabilidad/Admin aprueban el monto en el
  // módulo de Horas extras. Solo se paga lo aprobado. El monto en pesos se
  // calcula aquí (donde se ve el sueldo); en el documento solo se guarda la opción.
  // Regla: si trabajó los 7 días (7 asistencias) se acreditan 8 horas extra
  // automáticas, que se SUMAN a las que haya capturado el gerente.
  const horasExtras = (detalleDias?.horasExtras || 0) + (conteo.A === 7 ? 8 : 0);
  let montoHE = 0;
  if (detalleDias?.heAprobada) {
    const op = detalleDias.heOpcion;
    if (op === '1') montoHE = Math.round((sueldo / 8) * horasExtras * 100) / 100;
    else if (op === '2') montoHE = Math.round((sueldo / 8) * horasExtras * 2 * 100) / 100;
    else if (op === '3') montoHE = detalleDias.heMonto3 || 0;
  }

  const total = montoSueldo + montoBono + montoHE;

  return {
    conteo, diasCubiertos, descansoPagado, primaDominical, trabajoDomingo,
    diasBase, diasPagados, sueldo, bonoSemanal, montoSueldo, montoBono, pierdeBono,
    horasExtras, montoHE, heAprobada: !!detalleDias?.heAprobada, total,
  };
}

/* ========================================================================
   INDICADORES — rotación de personal y plantilla
   ======================================================================== */

/* Bajas aprobadas dentro de un rango de fechas, para un conjunto de sucursales. */
function bajasEnRango(state, sucIds, desde, hasta) {
  return (state.bajas || []).filter(b => {
    if (b.estado !== 'aprobada') return false;
    const colab = state.colaboradores.find(c => c.id === b.colaboradorId);
    if (!colab || !sucIds.includes(colab.sucursalId)) return false;
    const f = new Date(b.fechaBaja);
    return f >= desde && f <= hasta;
  }).length;
}

/* Rotación de personal (%) para un conjunto de sucursales en un periodo.
   Fórmula: bajas del periodo / plantilla activa promedio * 100.
   En el prototipo usamos la plantilla activa actual como aproximación del promedio. */
function calcRotacion(state, sucIds, periodo) {
  const hoy = new Date();
  let desde;
  if (periodo === 'mes') {
    desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  } else { // 'anio'
    desde = new Date(hoy.getFullYear(), 0, 1);
  }
  const bajas = bajasEnRango(state, sucIds, desde, hoy);
  // Plantilla base: activos actuales + las bajas del periodo (los que estaban al inicio)
  const activos = state.colaboradores.filter(c =>
    sucIds.includes(c.sucursalId) && c.estatus === 'activo').length;
  const base = activos + bajas;
  if (base === 0) return 0;
  return Math.round((bajas / base) * 1000) / 10; // un decimal
}

/* Histórico de rotación mensual (últimos N meses) para un conjunto de sucursales.
   El mes actual se calcula de los datos reales; los meses anteriores son datos
   de demostración estables (en producción se registrará el real al cierre de cada mes). */
function historicoRotacion(state, sucIds, meses = 6) {
  const hoy = new Date();
  const rotActual = calcRotacion(state, sucIds, 'mes');
  // Seed estable a partir de los ids para que los valores demo no cambien entre renders
  let seed = sucIds.join('').split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const out = [];
  for (let i = meses - 1; i >= 0; i--) {
    const f = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
    const etiqueta = f.toLocaleDateString('es-MX', { month: 'short' }).replace('.', '');
    let pct;
    if (i === 0) {
      pct = rotActual; // mes actual = real
    } else {
      // demo: valores entre 3% y 14%
      pct = Math.round((3 + rand() * 11) * 10) / 10;
    }
    out.push({ etiqueta, pct, esActual: i === 0, esDemo: i !== 0 });
  }
  return out;
}

/* Días que una sucursal lleva sin plantilla completa (contador continuo).
   Si los activos actuales (incluye gerente) son menos que el objetivo,
   cuenta los días desde la última baja aprobada de esa sucursal hasta hoy. */
function diasSinPlantilla(state, sucursal) {
  const objetivo = sucursal.plantillaObjetivo || 0;
  if (objetivo === 0) return 0;
  const activos = state.colaboradores.filter(c =>
    c.sucursalId === sucursal.id && c.estatus === 'activo').length;
  if (activos >= objetivo) return 0; // plantilla completa
  // Está corta: contar desde la última baja aprobada de esta sucursal
  const bajasSuc = (state.bajas || []).filter(b => {
    if (b.estado !== 'aprobada') return false;
    const colab = state.colaboradores.find(c => c.id === b.colaboradorId);
    return colab && colab.sucursalId === sucursal.id;
  });
  if (bajasSuc.length === 0) return 0;
  const ultima = bajasSuc.reduce((max, b) =>
    new Date(b.fechaBaja) > new Date(max.fechaBaja) ? b : max);
  const dias = Math.floor((new Date() - new Date(ultima.fechaBaja)) / 86400000);
  return Math.max(0, dias);
}

/* Resumen de "días sin plantilla" para un conjunto de sucursales:
   cuántas están cortas y el máximo de días que alguna lleva así. */
function resumenPlantilla(state, sucursales) {
  let cortas = 0, maxDias = 0, faltanTotal = 0;
  sucursales.forEach(s => {
    const objetivo = s.plantillaObjetivo || 0;
    const activos = state.colaboradores.filter(c =>
      c.sucursalId === s.id && c.estatus === 'activo').length;
    if (objetivo > 0 && activos < objetivo) {
      cortas++;
      faltanTotal += (objetivo - activos);
      const d = diasSinPlantilla(state, s);
      if (d > maxDias) maxDias = d;
    }
  });
  return { cortas, maxDias, faltanTotal };
}

/* Lista de sucursales con vacante abierta (plantilla incompleta),
   con cuántos días llevan así y cuántas personas faltan.
   Ordenadas de la más urgente (más días) a la menos. */
function vacantesAbiertas(state, sucursales) {
  return sucursales
    .map(s => {
      const objetivo = s.plantillaObjetivo || 0;
      const activos = state.colaboradores.filter(c =>
        c.sucursalId === s.id && c.estatus === 'activo').length;
      const faltan = objetivo - activos;
      if (objetivo === 0 || faltan <= 0) return null;
      return {
        sucursal: s,
        faltan,
        activos,
        objetivo,
        dias: diasSinPlantilla(state, s),
      };
    })
    .filter(Boolean)
    .sort((a, b) => b.dias - a.dias);
}

function getWeekId(monday) {
  const m = new Date(monday);
  const year = m.getFullYear();
  const start = new Date(year, 0, 1);
  const week = Math.ceil((((m - start) / 86400000) + start.getDay() + 1) / 7);
  return year + '-W' + String(week).padStart(2, '0');
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function dateKey(d) { return new Date(d).toISOString().slice(0,10); }
function parseLocalDate(s) { const p = String(s).slice(0,10).split('-').map(Number); return new Date(p[0], (p[1]||1)-1, p[2]||1); }

const AppCtx = React.createContext(null);

function useApp() { return React.useContext(AppCtx); }

function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, kind='info') => {
    setToast({ msg, kind, id: Date.now() });
    setTimeout(() => setToast(null), 3200);
  }, []);
  const node = toast ? <div className="toast">{toast.msg}</div> : null;
  return { show, node };
}

/* ========================================================================
   LOGIN SCREEN
   ======================================================================== */
function LoginScreen({ onLogin }) {
  const { state } = useApp();
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [info, setInfo] = useState('');
  const [loading, setLoading] = useState(false);

  // Traduce los códigos de error de Firebase a mensajes claros en español.
  function mensajeError(err) {
    const c = (err && err.code) || '';
    if (c === 'auth/invalid-email') return 'El correo no tiene un formato válido.';
    if (c === 'auth/user-disabled') return 'Esta cuenta está deshabilitada. Contacta al administrador.';
    if (c === 'auth/too-many-requests') return 'Demasiados intentos fallidos. Espera unos minutos e inténtalo de nuevo.';
    if (c === 'auth/network-request-failed') return 'Sin conexión a internet. Revisa tu red.';
    if (c === 'auth/invalid-credential' || c === 'auth/wrong-password' || c === 'auth/user-not-found')
      return 'Correo o contraseña incorrectos.';
    if (c === 'auth/configuration-not-found' || c === 'auth/operation-not-allowed')
      return 'El acceso por correo aún no está habilitado en Firebase (Authentication → Sign-in method).';
    return 'No se pudo iniciar sesión. Inténtalo de nuevo.';
  }

  async function submit() {
    setError(''); setInfo('');
    const correo = email.trim().toLowerCase();
    if (!correo || !password) { setError('Escribe tu correo y contraseña.'); return; }
    if (typeof firebase === 'undefined' || !firebase.auth) {
      setError('No se pudo cargar Firebase. Revisa tu conexión a internet.'); return;
    }
    setLoading(true);
    try {
      await firebase.auth().signInWithEmailAndPassword(correo, password);
      // Autenticación correcta en Firebase: ahora buscamos el perfil (rol, nombre) en el sistema.
      const u = getUsuarios(state).find(x => x.email.toLowerCase() === correo);
      if (!u) {
        await firebase.auth().signOut();
        setError('Tu cuenta es válida pero no tiene un perfil asignado en el sistema. Avisa al administrador.');
        return;
      }
      onLogin(u);
    } catch (err) {
      setError(mensajeError(err));
    } finally {
      setLoading(false);
    }
  }

  // Envía un correo de restablecimiento de contraseña (requiere correo real).
  async function recuperar() {
    setError(''); setInfo('');
    const correo = email.trim().toLowerCase();
    if (!correo) { setError('Escribe tu correo arriba y vuelve a tocar "¿Olvidaste tu contraseña?".'); return; }
    if (typeof firebase === 'undefined' || !firebase.auth) { setError('No se pudo cargar Firebase.'); return; }
    try {
      await firebase.auth().sendPasswordResetEmail(correo);
      setInfo('Te enviamos un correo para restablecer tu contraseña. Revisa tu bandeja (y spam).');
    } catch (err) {
      setError(mensajeError(err));
    }
  }

  function onKey(e) { if (e.key === 'Enter') submit(); }

  return (
    <div className="min-h-full grain flex items-center justify-center p-6">
      <div className="w-full" style={{ maxWidth: 380 }}>
        <div className="bg-white rounded-2xl p-8" style={{ boxShadow: '0 12px 40px rgba(0,0,0,0.08), 0 0 0 1px var(--border)' }}>
          {/* Logo */}
          <div className="flex justify-center mb-4">
            <div style={{ width: 52, height: 52, background: 'var(--lem)', borderRadius: 12, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: 600, fontSize: 22, fontFamily: 'var(--font-serif)' }}>L</div>
          </div>
          {/* Títulos */}
          <div className="text-center mb-1">
            <h1 className="font-serif text-2xl" style={{ color: 'var(--lem)', letterSpacing: 0 }}>Grupo LEM Nóminas</h1>
          </div>
          <p className="text-center text-gray-500 text-sm mb-6">Sistema de Pre-Nómina y Control Laboral</p>

          {/* Formulario */}
          <div className="space-y-3">
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Correo</label>
              <input
                type="email" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={onKey}
                placeholder="correo@grupolem.com" autoComplete="username"
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white"
                style={{ borderColor: error ? '#F2B8B3' : 'var(--border-strong)' }}
              />
            </div>
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Contraseña</label>
              <input
                type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={onKey}
                placeholder="••••••" autoComplete="current-password"
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white"
                style={{ borderColor: error ? '#F2B8B3' : 'var(--border-strong)' }}
              />
            </div>
            {error && (
              <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}>
                <Icon name="alert" size={12} /> {error}
              </div>
            )}
            {info && (
              <div className="text-[12px]" style={{ color: '#0E5A42' }}>
                {info}
              </div>
            )}
            <button onClick={submit} disabled={loading} className="btn btn-primary w-full" style={{ padding: '10px 14px', fontSize: 14, opacity: loading ? 0.65 : 1, cursor: loading ? 'default' : 'pointer' }}>
              {loading ? 'Entrando…' : 'Entrar'}
            </button>
            <button onClick={recuperar} className="w-full text-center text-xs text-gray-500 hover:text-gray-800 mt-1" style={{ background: 'none', border: 'none' }}>
              ¿Olvidaste tu contraseña?
            </button>
          </div>
        </div>
        <div className="text-center mt-5 text-xs text-gray-400">
          Demo · Los datos se guardan localmente en tu navegador
        </div>
      </div>
    </div>
  );
}

/* Datos de rotación de una sola sucursal (para las tarjetas de desglose). */
function rotacionDeSucursal(state, sucursal) {
  return {
    rotMes: calcRotacion(state, [sucursal.id], 'mes'),
    rotAnio: calcRotacion(state, [sucursal.id], 'anio'),
    diasSinPlantilla: diasSinPlantilla(state, sucursal),
    faltan: (() => {
      const objetivo = sucursal.plantillaObjetivo || 0;
      const activos = state.colaboradores.filter(c => c.sucursalId === sucursal.id && c.estatus === 'activo').length;
      return objetivo > activos ? objetivo - activos : 0;
    })(),
  };
}

/* Tira de porcentajes de rotación mensual (histórico). */
function HistoricoRotacion({ sucIds, titulo }) {
  const { state } = useApp();
  if (!sucIds || sucIds.length === 0) return null;
  const hist = historicoRotacion(state, sucIds, 6);
  const maxPct = Math.max(...hist.map(h => h.pct), 1);

  return (
    <div className="bg-white rounded-xl shadow-card p-5 mb-6">
      <div className="flex items-center justify-between mb-4">
        <div className="text-xs uppercase tracking-wider text-gray-500 font-medium">{titulo || 'Rotación mensual'}</div>
        <div className="text-[11px] text-gray-400">Últimos 6 meses</div>
      </div>
      <div className="flex items-end justify-between gap-3">
        {hist.map((h, i) => {
          const alto = Math.round((h.pct / maxPct) * 56) + 4;
          const color = h.pct > 10 ? '#8C1F1B' : h.pct > 6 ? '#7A4B05' : '#0E5A42';
          return (
            <div key={i} className="flex-1 flex flex-col items-center">
              <div className="num text-sm font-medium mb-1" style={{ color: h.esActual ? 'var(--lem)' : 'var(--text)' }}>{h.pct}%</div>
              <div style={{ width: '100%', maxWidth: 44, height: alto, background: color, opacity: h.esActual ? 1 : 0.35, borderRadius: 4 }} />
              <div className="text-[11px] mt-1.5 capitalize" style={{ color: h.esActual ? 'var(--lem)' : 'var(--text-soft)', fontWeight: h.esActual ? 600 : 400 }}>
                {h.etiqueta}
              </div>
            </div>
          );
        })}
      </div>
      <div className="text-[11px] text-gray-400 mt-3">
        El mes actual es real. Los meses anteriores son datos de demostración; en producción se registrarán automáticamente al cierre de cada mes.
      </div>
    </div>
  );
}

            const colorDias = urgente ? '#8C1F1B' : medio ? '#7A4B05' : 'var(--text-soft)';
            return (
              <div key={v.sucursal.id} className="flex items-center gap-3 py-2.5 px-3 rounded-lg" style={{ background: 'var(--bg)' }}>
                <span className="brand-dot" style={{ background: un?.color || '#999', width: 10, height: 10 }} />
                <div className="flex-1">
                  <div className="text-sm font-medium">{v.sucursal.nombre}</div>
                  <div className="text-xs text-gray-500">{un?.nombre} · plantilla {v.activos}/{v.objetivo}</div>
                </div>
                <div className="text-right">
                  <div className="num text-sm font-medium" style={{ color: '#8C1F1B' }}>
                    {v.faltan} {v.faltan === 1 ? 'vacante' : 'vacantes'}
                  </div>
                </div>
                <div className="text-right pl-3" style={{ borderLeft: '1px solid var(--border)', minWidth: 90 }}>
                  <div className="text-[10px] uppercase tracking-wider text-gray-400 font-medium">Días abierta</div>
                  <div className="num text-base font-medium" style={{ color: colorDias }}>
                    {v.dias > 0 ? v.dias : '—'}
                  </div>
                </div>
              </div>
            );
          })}
          <div className="text-[11px] text-gray-400 mt-2">
            Los días se cuentan desde la última baja aprobada de cada sucursal. Rojo: 15+ días · ámbar: 7-14 días.
          </div>
        </div>
      )}
    </div>
  );
}

/* Datos de rotación de una unidad de negocio completa. */
function rotacionDeUnidad(state, unId) {
  const sucs = (state.sucursales || SEED.sucursales).filter(s => s.unId === unId);
  const sucIds = sucs.map(s => s.id);
  const plant = resumenPlantilla(state, sucs);
  return {
    rotMes: calcRotacion(state, sucIds, 'mes'),
    rotAnio: calcRotacion(state, sucIds, 'anio'),
    diasSinPlantilla: plant.cortas > 0 ? plant.maxDias : 0,
    faltan: plant.faltanTotal,
  };
}

  // Seguimiento de alta ante el IMSS (solo activos)
  const activos = state.colaboradores.filter(c => c.estatus === 'activo');

  const imssBaja = activos.filter(c => c.statusIMSS === 'baja');

    const colabs = state.colaboradores.map(c => c.id === colabId ? { ...c, statusIMSS: nuevo } : c);

    addAuditLog({ modulo: 'colaboradores', accion: 'status_imss', entidad: colabId,

// Encabezados de la plantilla (orden de columnas en el Excel)
const COLS_IMPORT = [
  { key: 'curp', label: 'CURP', oblig: true },
  { key: 'rfc', label: 'RFC', oblig: false },
  { key: 'nss', label: 'NSS', oblig: false },
  { key: 'nombre', label: 'Nombre(s)', oblig: true },
  { key: 'apellidoPaterno', label: 'Apellido paterno', oblig: true },
  { key: 'apellidoMaterno', label: 'Apellido materno', oblig: false },
  { key: 'fechaNacimiento', label: 'Fecha de nacimiento', oblig: true },
  { key: 'telefono', label: 'Teléfono', oblig: true },
  { key: 'correo', label: 'Correo', oblig: false },
  { key: 'sucursal', label: 'Sucursal', oblig: true },
  { key: 'puesto', label: 'Puesto', oblig: true },
  { key: 'fechaIngreso', label: 'Fecha de ingreso', oblig: true },
  { key: 'sueldoDiario', label: 'Sueldo diario', oblig: false, soloSueldos: true },
  { key: 'bonoTransporte', label: 'Bono transporte', oblig: false, soloSueldos: true },
];

// Normaliza texto para comparar (sin acentos, minúsculas, sin espacios extra)
function normalizar(s) {
  return String(s || '').trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Equivalencias de puestos del Excel hacia el catálogo del sistema.
// Consolidaciones definidas por dirección (3 de junio):
//  - Cocinero, Aux. General, Lavaloza  -> Auxiliar de Servicio
//  - Auxiliar Contable, Marketing, Auxiliar de Calidad -> Auxiliar Administrativo
//  - Gerente General -> Gerente de Sucursal (provisional)
//  - Gerente de Rh -> Gerente de RH ; Gerente de Contaduria -> Gerente de Contaduría
// Ampliación (6 de junio, confirmada por dirección):
//  - Variantes femeninas: Cocinera, Jefa de Cocina, Mesera
//  - Mesero/Mesera Fines -> Mesero ; Logistica -> Auxiliar Administrativo
const EQUIV_PUESTOS = {
  'auxiliar de servicio': 'Auxiliar de Servicio',
  'cocinero': 'Auxiliar de Servicio',
  'cocinera': 'Auxiliar de Servicio',
  'aux. general': 'Auxiliar de Servicio',
  'aux general': 'Auxiliar de Servicio',
  'auxiliar general': 'Auxiliar de Servicio',
  'lavaloza': 'Auxiliar de Servicio',
  'mesero': 'Mesero',
  'mesera': 'Mesero',
  'mesero fines': 'Mesero',
  'mesera fines': 'Mesero',
  'jefe de cocina': 'Jefe de Cocina',
  'jefa de cocina': 'Jefe de Cocina',
  'barrista': 'Barrista',
  'auxiliar administrativo': 'Auxiliar Administrativo',
  'auxiliar contable': 'Auxiliar Administrativo',
  'marketing': 'Auxiliar Administrativo',
  'auxiliar de calidad': 'Auxiliar Administrativo',
  'logistica': 'Auxiliar Administrativo',
  'gerente de sucursal': 'Gerente de Sucursal',
  'gerente general': 'Gerente de Sucursal',
  'asesor': 'Asesor',
  'gerente de rh': 'Gerente de RH',
  'gerente de calidad': 'Gerente de Calidad',
  'gerente de contaduria': 'Gerente de Contaduría',
};
// Dado un texto de puesto del Excel, devuelve el objeto puesto del sistema (o null)
function resolverPuesto(texto) {
  const norm = normalizar(texto);
  // 1) equivalencia directa
  const nombreDestino = EQUIV_PUESTOS[norm];
  if (nombreDestino) return SEED.puestos.find(p => p.nombre === nombreDestino);
  // 2) match directo contra el catálogo (por si ya viene con el nombre exacto)
  return SEED.puestos.find(p => normalizar(p.nombre) === norm) || null;
}

// Convierte un valor de fecha de Excel (serial, Date o texto) a 'YYYY-MM-DD'
function parseFechaExcel(val) {
  if (val == null || val === '') return '';
  // Si SheetJS ya lo dio como Date
  if (val instanceof Date) {
    return val.toISOString().slice(0, 10);
  }
  // Si es número serial de Excel
  if (typeof val === 'number') {
    const d = XLSX.SSF ? XLSX.SSF.parse_date_code(val) : null;
    if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  // Si es texto: intenta varios formatos comunes
  const s = String(val).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);          // YYYY-MM-DD
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);             // DD/MM/YYYY
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return s;
}

function ImportarColaboradoresModal({ onClose }) {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
  const sucursales = (state.sucursales || SEED.sucursales);
  const [paso, setPaso] = useState('cargar'); // cargar | revisar
  const [analisis, setAnalisis] = useState(null);
  const [error, setError] = useState('');
  const fileRef = useRef(null);

  // Descargar plantilla vacía con las columnas correctas
  function descargarPlantilla() {
    const cols = COLS_IMPORT.filter(c => verSueldos || !c.soloSueldos).map(c => c.label);
    const ws = XLSX.utils.aoa_to_sheet([cols]);
    // Una fila de ejemplo para orientar
    const ejemplo = verSueldos
      ? ['CURP18CARACTERESAAA', 'RFC1234567AB1', '12345678901', 'Juan', 'Pérez', 'López', '1990-05-12', '6141234567', 'juan@correo.mx', sucursales[1]?.nombre || 'The Wings D1', 'Mesero', '2024-03-01', '350', '50']
      : ['CURP18CARACTERESAAA', 'RFC1234567AB1', '12345678901', 'Juan', 'Pérez', 'López', '1990-05-12', '6141234567', 'juan@correo.mx', sucursales[1]?.nombre || 'The Wings D1', 'Mesero', '2024-03-01'];
    XLSX.utils.sheet_add_aoa(ws, [ejemplo], { origin: 'A2' });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Colaboradores');
    XLSX.writeFile(wb, 'plantilla_colaboradores_LEM.xlsx');
  }

  function onFile(e) {
    setError('');
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const filas = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
        if (!filas.length) { setError('El archivo está vacío o no tiene filas de datos.'); return; }
        analizar(filas);
      } catch (err) {
        setError('No se pudo leer el archivo. Asegúrate de que sea un Excel (.xlsx) válido.');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // Mapea encabezados del archivo (flexible) a nuestras llaves
  function mapearEncabezados(fila) {
    const mapa = {};
    Object.keys(fila).forEach(h => {
      const hn = normalizar(h);
      const col = COLS_IMPORT.find(c => normalizar(c.label) === hn || normalizar(c.key) === hn);
      if (col) mapa[col.key] = h;
    });
    return mapa;
  }

  function analizar(filas) {
    const mapa = mapearEncabezados(filas[0]);
    const validas = [], conError = [], duplicadas = [];

    filas.forEach((fila, i) => {
      const get = (key) => String(fila[mapa[key]] ?? '').trim();
      const reg = {
        curp: get('curp').toUpperCase(), rfc: get('rfc').toUpperCase(), nss: get('nss'),
        nombre: get('nombre'), apellidoPaterno: get('apellidoPaterno'), apellidoMaterno: get('apellidoMaterno'),
        fechaNacimiento: parseFechaExcel(fila[mapa['fechaNacimiento']]),
        telefono: get('telefono'), correo: get('correo'),
        sucursalTexto: get('sucursal'), puestoTexto: get('puesto'),
        fechaIngreso: parseFechaExcel(fila[mapa['fechaIngreso']]),
      };
      // Sueldo y bono solo si el rol los ve
      if (verSueldos) {
        reg.sueldoDiario = parseFloat(get('sueldoDiario')) || 0;
        reg.bonoTransporte = parseFloat(get('bonoTransporte')) || 0;
      }

      const errores = [];
      // Validar obligatorias
      COLS_IMPORT.filter(c => c.oblig).forEach(c => {
        const v = c.key === 'sucursal' ? reg.sucursalTexto : c.key === 'puesto' ? reg.puestoTexto : reg[c.key];
        if (!v) errores.push(`Falta ${c.label}`);
      });
      // Resolver sucursal
      const suc = sucursales.find(s => normalizar(s.nombre) === normalizar(reg.sucursalTexto));
      if (reg.sucursalTexto && !suc) errores.push(`Sucursal "${reg.sucursalTexto}" no existe`);
      // Resolver puesto
      const pst = resolverPuesto(reg.puestoTexto);
      if (reg.puestoTexto && !pst) errores.push(`Puesto "${reg.puestoTexto}" no existe`);

      reg.fila = i + 2; // +2: fila 1 es encabezado
      reg.sucursalId = suc?.id;
      reg.puestoId = pst?.id;

      if (errores.length) { reg.errores = errores; conError.push(reg); return; }

      // Duplicado: CURP o RFC ya activo
      const dupActivo = state.colaboradores.find(c =>
        c.estatus === 'activo' && (
          (reg.curp && normalizar(c.curp) === normalizar(reg.curp)) ||
          (reg.rfc && c.rfc && normalizar(c.rfc) === normalizar(reg.rfc))
        ));
      if (dupActivo) { reg.motivo = 'Ya existe activo con esa CURP/RFC'; duplicadas.push(reg); return; }

      validas.push(reg);
    });

    setAnalisis({ validas, conError, duplicadas, total: filas.length });
    setPaso('revisar');
  }

  async function confirmarImport() {
    const base = state.colaboradores.length;
    const nuevos = analisis.validas.map((reg, i) => ({
      id: 'c_' + Date.now().toString(36) + '_' + i,
      noEmp: base + i + 1,
      usuarioId: null,
      curp: reg.curp, rfc: reg.rfc, nss: reg.nss,
      nombre: reg.nombre, apellidoPaterno: reg.apellidoPaterno, apellidoMaterno: reg.apellidoMaterno,
      fechaNacimiento: reg.fechaNacimiento, telefono: reg.telefono, correo: reg.correo,
      sucursalId: reg.sucursalId, puestoId: reg.puestoId, gerenteId: 'u_admin',
      fechaIngreso: reg.fechaIngreso,
      sueldoDiario: verSueldos ? (reg.sueldoDiario || 0) : 0,
      bonoTransporte: verSueldos ? (reg.bonoTransporte || 0) : 0,
      statusIMSS: 'pendiente',
      estatus: 'activo',
    }));
    // Fase 2: escribir también a Firestore (ficha pública + compensación privada/regla de oro)
    try {
      if (typeof fsImportarColaboradores === 'function' && db) {
        await fsImportarColaboradores(nuevos, verSueldos);
      }
    } catch (e) {
      toast('Error al guardar en Firestore: ' + (e && e.message ? e.message : e));
      return;
    }
    setState({ ...state, colaboradores: [...state.colaboradores, ...nuevos] });
    addAuditLog({ modulo: 'colaboradores', accion: 'importar', entidad: 'masivo',
      valorAnterior: null, valorNuevo: { importados: nuevos.length, omitidos: analisis.duplicadas.length, errores: analisis.conError.length } });
    toast(`${nuevos.length} colaboradores importados a Firestore.`);
    onClose();
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 640, maxHeight: '88vh', overflow: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
          <h2 className="text-lg font-medium">Importar colaboradores desde Excel</h2>
          <p className="text-sm text-gray-500 mt-0.5">
            {paso === 'cargar'
              ? 'Carga masiva de colaboradores. Descarga la plantilla, llénala y súbela.'
              : 'Revisa el resumen antes de confirmar la importación.'}
          </p>
        </div>

        {paso === 'cargar' && (
          <div className="p-6 space-y-5">
            <div className="p-4 rounded-lg" style={{ background: 'var(--bg)' }}>
              <div className="text-sm font-medium mb-1">1. Descarga la plantilla</div>
              <p className="text-[13px] text-gray-500 mb-3">Trae las columnas correctas y una fila de ejemplo. Las columnas de sueldo {verSueldos ? 'están incluidas' : 'no aparecen (no las capturas tú)'}.</p>
              <button onClick={descargarPlantilla} className="btn btn-secondary"><Icon name="file" size={14} /> Descargar plantilla Excel</button>
            </div>

            <div className="p-4 rounded-lg" style={{ background: 'var(--bg)' }}>
              <div className="text-sm font-medium mb-1">2. Sube el archivo lleno</div>
              <p className="text-[13px] text-gray-500 mb-2">Formato .xlsx. Obligatorias: CURP, nombre, apellidos, fecha de nacimiento, teléfono, sucursal, puesto y fecha de ingreso.</p>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={onFile} className="hidden" />
              <button onClick={() => fileRef.current?.click()} className="btn btn-primary"><Icon name="upload" size={14} /> Seleccionar archivo</button>
            </div>

            <div className="text-[12px] text-gray-500">
              <strong>Sucursales válidas:</strong> {sucursales.map(s => s.nombre).join(', ')}.<br />
              <strong>Puestos válidos:</strong> {SEED.puestos.map(p => p.nombre).join(', ')}.
            </div>

            {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}><Icon name="alert" size={12} /> {error}</div>}
          </div>
        )}

        {paso === 'revisar' && analisis && (
          <div className="p-6 space-y-4">
            <div className="grid grid-cols-3 gap-3">
              <div className="p-3 rounded-lg text-center" style={{ background: '#ECF7E8', border: '1px solid #C8E5BB' }}>
                <div className="text-2xl font-semibold" style={{ color: '#2A5A0E' }}>{analisis.validas.length}</div>
                <div className="text-[11px] uppercase tracking-wider" style={{ color: '#2A5A0E' }}>Listos</div>
              </div>
              <div className="p-3 rounded-lg text-center" style={{ background: '#FEF9E7', border: '1px solid #E8C547' }}>
                <div className="text-2xl font-semibold" style={{ color: '#7A4B05' }}>{analisis.duplicadas.length}</div>
                <div className="text-[11px] uppercase tracking-wider" style={{ color: '#7A4B05' }}>Duplicados</div>
              </div>
              <div className="p-3 rounded-lg text-center" style={{ background: '#FBEAEA', border: '1px solid #E0A8A8' }}>
                <div className="text-2xl font-semibold" style={{ color: '#8C1F1B' }}>{analisis.conError.length}</div>
                <div className="text-[11px] uppercase tracking-wider" style={{ color: '#8C1F1B' }}>Con error</div>
              </div>
            </div>

            {analisis.duplicadas.length > 0 && (
              <div>
                <div className="text-[13px] font-medium mb-1">Se omitirán (ya existen activos):</div>
                <div className="text-[12px] text-gray-600 space-y-0.5 max-h-24 overflow-auto">
                  {analisis.duplicadas.map((r, i) => <div key={i}>Fila {r.fila}: {r.nombre} {r.apellidoPaterno} — {r.motivo}</div>)}
                </div>
              </div>
            )}

            {analisis.conError.length > 0 && (
              <div>
                <div className="text-[13px] font-medium mb-1" style={{ color: '#8C1F1B' }}>No se importarán (corrige y vuelve a subir):</div>
                <div className="text-[12px] text-gray-600 space-y-0.5 max-h-32 overflow-auto">
                  {analisis.conError.map((r, i) => <div key={i}>Fila {r.fila}: {r.errores.join(' · ')}</div>)}
                </div>
              </div>
            )}

            {analisis.validas.length === 0 && (
              <div className="text-[13px]" style={{ color: '#8C1F1B' }}>No hay filas válidas para importar. Revisa los errores y vuelve a subir el archivo.</div>
            )}
          </div>
        )}

        <div className="px-6 py-4 flex justify-between gap-2" style={{ borderTop: '1px solid var(--border)' }}>
          {paso === 'revisar'
            ? <button onClick={() => { setPaso('cargar'); setAnalisis(null); }} className="btn btn-ghost text-gray-500">← Volver</button>
            : <span />}
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-secondary">Cancelar</button>
            {paso === 'revisar' && analisis?.validas.length > 0 && (
              <button onClick={confirmarImport} className="btn btn-primary"><Icon name="check" size={14} /> Importar {analisis.validas.length}</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// Exporta el listado de colaboradores a Excel. Admin: todo. RH: sin sueldos.
function exportarColaboradores(state, user) {
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
  const sucursales = (state.sucursales || SEED.sucursales);
  const activos = state.colaboradores.filter(c => c.estatus === 'activo');
  const filas = activos.map(c => {
    const suc = sucursales.find(s => s.id === c.sucursalId);
    const pst = SEED.puestos.find(p => p.id === c.puestoId);
    const fila = {
      'CURP': c.curp, 'RFC': c.rfc, 'NSS': c.nss,
      'Nombre(s)': c.nombre, 'Apellido paterno': c.apellidoPaterno, 'Apellido materno': c.apellidoMaterno,
      'Fecha de nacimiento': c.fechaNacimiento, 'Teléfono': c.telefono, 'Correo': c.correo,
      'Sucursal': suc?.nombre || '', 'Puesto': pst?.nombre || '', 'Fecha de ingreso': c.fechaIngreso,
    };
    if (verSueldos) {
      fila['Sueldo diario'] = c.sueldoDiario;
      fila['Bono transporte'] = c.bonoTransporte;
    }
    return fila;
  });
  const ws = XLSX.utils.json_to_sheet(filas);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Colaboradores');
  const hoy = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `colaboradores_LEM_${hoy}.xlsx`);
}

function AltaColaboradorModal({ onClose }) {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const todasSuc = (state.sucursales || SEED.sucursales).filter(s => s.unId !== 'corp');
  // Solo Admin y Contabilidad ven y capturan montos salariales
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';

  const [form, setForm] = useState({
    curp: '', rfc: '', nss: '',
    nombre: '', apellidoPaterno: '', apellidoMaterno: '',
    fechaNacimiento: '', telefono: '', correo: '',
    sucursalId: todasSuc[0]?.id || '', puestoId: 'p_mes',
    fechaIngreso: '', sueldoDiario: '', bonoTransporte: '',
    // Contrato inicial (opcional)
    contratoTipo: 'temporal', contratoFin: '', registrarContrato: true,
  });
  const [error, setError] = useState('');
  const [coincidencia, setCoincidencia] = useState(null); // colaborador existente detectado
  const [autorizaRecontratacion, setAutorizaRecontratacion] = useState(false);

  function set(campo, val) {
    setForm(f => ({ ...f, [campo]: val }));
    setError('');
  }

  // Detección de recontratación: al escribir CURP o RFC, busca en la base
  function checarDuplicado(curp, rfc) {
    const c = (curp || '').trim().toUpperCase();
    const r = (rfc || '').trim().toUpperCase();
    if (c.length < 4 && r.length < 4) { setCoincidencia(null); return; }
    const existente = state.colaboradores.find(col =>
      (c.length >= 4 && col.curp && col.curp.toUpperCase() === c) ||
      (r.length >= 4 && col.rfc && col.rfc.toUpperCase() === r)
    );
    setCoincidencia(existente || null);
    if (!existente) setAutorizaRecontratacion(false);
  }

  const puestosOp = SEED.puestos.filter(p => p.cat === 'op');

  // ¿La coincidencia es alguien dado de baja? -> recontratación
  const esRecontratacion = coincidencia && coincidencia.estatus === 'baja';
  // ¿La coincidencia es alguien activo? -> bloqueo total (duplicado real)
  const esDuplicadoActivo = coincidencia && coincidencia.estatus === 'activo';

  function guardar() {
    setError('');
    // Validaciones básicas
    if (!form.nombre.trim() || !form.apellidoPaterno.trim()) { setError('Nombre y apellido paterno son obligatorios.'); return; }
    if (!form.curp.trim()) { setError('La CURP es obligatoria.'); return; }
    if (!form.fechaIngreso) { setError('Indica la fecha de ingreso.'); return; }
    if (!form.sucursalId) { setError('Selecciona una sucursal.'); return; }

    // Bloqueo: duplicado activo
    if (esDuplicadoActivo) {
      setError('Ya existe un colaborador ACTIVO con esa CURP/RFC. No se puede dar de alta dos veces.');
      return;
    }
    // Recontratación: requiere ser admin y marcar autorización
    if (esRecontratacion) {
      if (user.rol !== 'admin') {
        setError('Esta persona fue dada de baja anteriormente. Solo el Administrador puede autorizar una recontratación.');
        return;
      }
      if (!autorizaRecontratacion) {
        setError('Marca la casilla de autorización de recontratación para continuar.');
        return;
      }
      // Reactivar al colaborador existente
      const nuevos = state.colaboradores.map(c => c.id === coincidencia.id
        ? { ...c, estatus: 'activo', sucursalId: form.sucursalId, puestoId: form.puestoId,
            fechaIngreso: form.fechaIngreso, sueldoDiario: parseFloat(form.sueldoDiario) || c.sueldoDiario,
            bonoTransporte: parseFloat(form.bonoTransporte) || 0,
            recontratado: true, fechaRecontratacion: new Date().toISOString(), recontratadoPor: user.id }
        : c);
      setState({ ...state, colaboradores: nuevos });
      addAuditLog({ modulo: 'colaboradores', accion: 'recontratar', entidad: coincidencia.id,
        valorAnterior: { estatus: 'baja' }, valorNuevo: { estatus: 'activo', autorizadoPor: user.nombre } });
      toast(`${coincidencia.nombre} ${coincidencia.apellidoPaterno} fue recontratado(a).`);
      onClose();
      return;
    }

    // Alta nueva normal
    const nuevo = {
      id: 'c_' + Date.now().toString(36),
      noEmp: state.colaboradores.length + 1,
      usuarioId: null,
      curp: form.curp.trim().toUpperCase(),
      rfc: form.rfc.trim().toUpperCase(),
      nss: form.nss.trim(),
      nombre: form.nombre.trim(),
      apellidoPaterno: form.apellidoPaterno.trim(),
      apellidoMaterno: form.apellidoMaterno.trim(),
      fechaNacimiento: form.fechaNacimiento,
      telefono: form.telefono.trim(),
      correo: form.correo.trim(),
      sucursalId: form.sucursalId,
      puestoId: form.puestoId,
      gerenteId: 'u_admin',
      fechaIngreso: form.fechaIngreso,
      sueldoDiario: parseFloat(form.sueldoDiario) || 0,
      bonoTransporte: parseFloat(form.bonoTransporte) || 0,
      statusIMSS: 'pendiente',
      estatus: 'activo',
    };
    // Si RH marcó registrar contrato inicial, lo creamos junto
    const nuevosContratos = [...(state.contratos || [])];
    if (form.registrarContrato && form.fechaIngreso) {
      const tipoVence = TIPOS_CONTRATO[form.contratoTipo]?.vence;
      if (!tipoVence || form.contratoFin) {
        nuevosContratos.push({
          id: 'k_' + Date.now().toString(36),
          colaboradorId: nuevo.id,
          tipo: form.contratoTipo,
          fechaInicio: form.fechaIngreso,
          fechaFin: tipoVence ? form.contratoFin : null,
          notas: 'Contrato inicial registrado al dar de alta',
        });
      }
    }
    setState({ ...state, colaboradores: [...state.colaboradores, nuevo], contratos: nuevosContratos });
    addAuditLog({ modulo: 'colaboradores', accion: 'alta', entidad: nuevo.id,
      valorAnterior: null, valorNuevo: { nombre: nuevo.nombre + ' ' + nuevo.apellidoPaterno } });
    toast('Colaborador dado de alta.');
    onClose();
  }

  const sucDeCoincidencia = coincidencia
    ? (state.sucursales || SEED.sucursales).find(s => s.id === coincidencia.sucursalId)
    : null;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 640, maxHeight: '90vh', overflow: 'auto' }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
          <h2 className="text-lg font-medium">Nuevo colaborador</h2>
          <p className="text-sm text-gray-500 mt-0.5">Captura los datos. El sistema verifica si la persona ya existió en la empresa.</p>
        </div>
        <div className="p-6 space-y-4">
          {/* Identificadores con detección */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">CURP</label>
              <input value={form.curp}
                onChange={e => { set('curp', e.target.value); checarDuplicado(e.target.value, form.rfc); }}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: coincidencia ? '#F2B8B3' : 'var(--border-strong)' }}
                placeholder="18 caracteres" />
            </div>
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">RFC</label>
              <input value={form.rfc}
                onChange={e => { set('rfc', e.target.value); checarDuplicado(form.curp, e.target.value); }}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: coincidencia ? '#F2B8B3' : 'var(--border-strong)' }}
                placeholder="13 caracteres" />
            </div>
          </div>

          {/* Aviso de coincidencia */}
          {esDuplicadoActivo && (
            <div className="p-4 rounded-lg border bg-red-50 fade-in" style={{ borderColor: '#F2B8B3' }}>
              <div className="flex items-center gap-2 mb-1">
                <Icon name="alert" size={15} style={{ color: '#8C1F1B' }} />
                <span className="text-sm font-medium" style={{ color: '#8C1F1B' }}>Colaborador ya activo</span>
              </div>
              <p className="text-sm text-gray-700">
                <strong>{coincidencia.nombre} {coincidencia.apellidoPaterno} {coincidencia.apellidoMaterno}</strong> ya está registrado y activo en {sucDeCoincidencia?.nombre}. No puede darse de alta dos veces.
              </p>
            </div>
          )}
          {esRecontratacion && (
            <div className="p-4 rounded-lg border fade-in" style={{ borderColor: '#E8C547', background: '#FEF9E7' }}>
              <div className="flex items-center gap-2 mb-1">
                <Icon name="alert" size={15} style={{ color: '#7A4B05' }} />
                <span className="text-sm font-medium" style={{ color: '#7A4B05' }}>Recontratación detectada</span>
              </div>
              <p className="text-sm text-gray-700 mb-2">
                <strong>{coincidencia.nombre} {coincidencia.apellidoPaterno} {coincidencia.apellidoMaterno}</strong> ya trabajó en la empresa y fue dado de baja. 
                {coincidencia.fechaBajaActual && <> Fecha de baja: <span className="num">{fmtFecha(coincidencia.fechaBajaActual)}</span>.</>}
              </p>
              {user.rol === 'admin' ? (
                <label className="flex items-center gap-2.5 cursor-pointer mt-2 p-2 rounded" style={{ background: 'white' }}>
                  <input type="checkbox" checked={autorizaRecontratacion}
                    onChange={e => { setAutorizaRecontratacion(e.target.checked); setError(''); }}
                    style={{ width: 16, height: 16 }} />
                  <span className="text-sm font-medium">Autorizo la recontratación de esta persona</span>
                </label>
              ) : (
                <p className="text-sm font-medium mt-1" style={{ color: '#8C1F1B' }}>
                  Solo el Administrador puede autorizar recontrataciones. Solicita su autorización.
                </p>
              )}
            </div>
          )}

          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">NSS <span className="text-gray-400 normal-case">(opcional)</span></label>
            <input value={form.nss} onChange={e => set('nss', e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }}
              placeholder="Número de seguridad social" />
          </div>

          {/* Datos personales */}
          <div className="grid grid-cols-3 gap-3">
            <div>

function EstatusPill({ estatus }) {
  if (estatus === 'baja') return <span className="badge badge-rechazada">Baja</span>;
  if (estatus === 'vacaciones') return <span className="badge badge-enviada">Vacaciones</span>;
  if (estatus === 'incapacidad') return <span className="badge badge-revision">Incapacidad</span>;
  return <span className="badge badge-aprobada">Activo</span>;
}

function ColaboradorFicha({ colab, puedeVerSueldo, onClose }) {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab.sucursalId);
  const un = SEED.unidades.find(u => u.id === suc?.unId);
  const puesto = SEED.puestos.find(p => p.id === colab.puestoId);
  const gerente = getUsuarios(state).find(u => u.id === colab.gerenteId);
  const edad = new Date().getFullYear() - new Date(colab.fechaNacimiento).getFullYear();
  // Solo Admin y Contabilidad ven y editan el estatus ante el IMSS
  const verIMSS = user.rol === 'admin' || user.rol === 'contabilidad';

  // Edición de expediente. RH edita datos generales; Admin y Contabilidad
  // además pueden editar sueldo y bono (compensación protegida).
  const puedeEditar = user.rol === 'admin' || user.rol === 'rh' || user.rol === 'contabilidad';
  const verSueldos = user.rol === 'admin' || user.rol === 'contabilidad';
  const [editando, setEditando] = useState(false);
  const [form, setForm] = useState(() => ({
    nombre: colab.nombre || '', apellidoPaterno: colab.apellidoPaterno || '', apellidoMaterno: colab.apellidoMaterno || '',
    curp: colab.curp || '', rfc: colab.rfc || '', nss: colab.nss || '',
    fechaNacimiento: colab.fechaNacimiento || '', telefono: colab.telefono || '', correo: colab.correo || '',
    sucursalId: colab.sucursalId || '', puestoId: colab.puestoId || '', fechaIngreso: colab.fechaIngreso || '',
    sueldoDiario: colab.sueldoDiario ?? '', bonoTransporte: colab.bonoTransporte ?? '',
  }));
  const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const _inp = { width:'100%', border:'1px solid var(--border)', borderRadius:8, padding:'8px 10px', marginTop:4, fontSize:13, color:'#2b2b33' };
  const _lbl = { fontSize:11, color:'#6b6b76', display:'block', textTransform:'uppercase', letterSpacing:'.04em' };
  function guardarEdicion() {
    if (!form.nombre.trim() || !form.apellidoPaterno.trim()) { toast('Nombre y apellido paterno son obligatorios.'); return; }
    const patch = {
      nombre: form.nombre, apellidoPaterno: form.apellidoPaterno, apellidoMaterno: form.apellidoMaterno,
      curp: form.curp, rfc: form.rfc, nss: form.nss,
      fechaNacimiento: form.fechaNacimiento, telefono: form.telefono, correo: form.correo,
      sucursalId: form.sucursalId, puestoId: form.puestoId, fechaIngreso: form.fechaIngreso,
    };
    // Sueldo y bono solo los toca quien ve sueldos (Admin/Contabilidad).
    if (verSueldos) {
      patch.sueldoDiario = parseFloat(form.sueldoDiario) || 0;
      patch.bonoTransporte = parseFloat(form.bonoTransporte) || 0;
    }
    setState({ ...state, colaboradores: state.colaboradores.map(c => c.id === colab.id ? { ...c, ...patch } : c) });
    addAuditLog({ modulo: 'colaboradores', accion: 'editar', entidad: colab.id,
      valorAnterior: { nombre: colab.nombre }, valorNuevo: { nombre: form.nombre } });
    toast('Expediente actualizado.');
    onClose();
  }

  function cambiarIMSS(nuevo) {
    const colabs = state.colaboradores.map(c => c.id === colab.id ? { ...c, statusIMSS: nuevo } : c);
    setState({ ...state, colaboradores: colabs });
    addAuditLog({ modulo: 'colaboradores', accion: 'status_imss', entidad: colab.id,
      valorAnterior: { statusIMSS: colab.statusIMSS || 'pendiente' }, valorNuevo: { statusIMSS: nuevo } });
    toast(`Estatus IMSS de ${colab.nombre}: ${imssInfo(nuevo).label}.`);
  }

  const Campo = ({ label, value, mono }) => (
    <div>
      <div className="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-0.5">{label}</div>
      <div className={`text-sm ${mono ? 'font-mono' : ''}`}>{value || <span className="text-gray-400">—</span>}</div>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{maxWidth: 600}} onClick={e => e.stopPropagation()}>

            <div className="flex-1">

              <div className="flex items-center gap-2 mt-2">

            </div>
            <button onClick={onClose} className="btn btn-ghost p-2"><Icon name="x" size={16} /></button>
          </div>
        </div>

        {/* Cuerpo */}
        {!editando && (<div className="p-6 space-y-5">
          <div>
            <div className="text-xs uppercase tracking-wider text-gray-500 font-medium mb-3">Datos personales</div>
            <div className="grid grid-cols-2 gap-4">
              <Campo label="CURP" value={colab.curp} mono />
              <Campo label="RFC" value={colab.rfc} mono />
              <Campo label="NSS (Seguro Social)" value={colab.nss} mono />
              <Campo label="Fecha de nacimiento" value={`${fmtFecha(colab.fechaNacimiento)} · ${edad} años`} />
            </div>
          </div>

          <div>
            <div className="text-xs uppercase tracking-wider text-gray-500 font-medium mb-3">Contacto</div>
            <div className="grid grid-cols-2 gap-4">
              <Campo label="Teléfono" value={colab.telefono} mono />
              <Campo label="Correo electrónico" value={colab.correo} />
            </div>
          </div>

          <div>
            <div className="text-xs uppercase tracking-wider text-gray-500 font-medium mb-3">Asignación</div>
            <div className="grid grid-cols-2 gap-4">
              <div>
                <div className="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-0.5">Unidad de negocio</div>
                <div className="text-sm flex items-center gap-1.5">
                  <span className="brand-dot" style={{background:un?.color}} />{un?.nombre}
                </div>
              </div>
              <Campo label="Sucursal" value={suc?.nombre} />
              <Campo label="Puesto" value={puesto?.nombre} />
              <Campo label="Gerente responsable" value={gerente?.nombre} />
            </div>
          </div>

          <div>
            <div className="text-xs uppercase tracking-wider text-gray-500 font-medium mb-3">Antigüedad</div>

          {puedeVerSueldo && (

              <div className="grid grid-cols-2 gap-4">
                <div>
                  <div className="text-[10px] uppercase tracking-wider font-medium mb-0.5" style={{color:'var(--lem-dark)'}}>Sueldo diario</div>

                </div>
                <div>
                  <div className="text-[10px] uppercase tracking-wider font-medium mb-0.5" style={{color:'var(--lem-dark)'}}>Bono de transporte (semanal)</div>
                  <div className="text-lg font-medium num">${(colab.bonoTransporte||0).toLocaleString('es-MX')}</div>
                </div>

            return (
              <div className="p-4 rounded-lg" style={{ background: 'var(--bg)', border: '1px solid var(--border)' }}>
                <div className="flex items-center justify-between mb-3">
                  <div className="text-xs uppercase tracking-wider font-medium" style={{ color: 'var(--text-soft)' }}>Alta ante el IMSS</div>

                </div>

                  {['pendiente', 'alta', 'baja'].map(s => (

        </div>)}

        {editando && (

            <label style={_lbl}>Apellido paterno<input style={_inp} value={form.apellidoPaterno} onChange={e => setF('apellidoPaterno', e.target.value)} /></label>
