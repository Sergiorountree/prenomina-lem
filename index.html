/* ========================================================================
   PRE-NÓMINA CAPTURE (the killer feature)
   ======================================================================== */
function PrenominaCapture({ presetSucursalId, presetWeekId }) {
  const { user, state, setState, addAuditLog, toast } = useApp();

  // Sucursales disponibles para este usuario
  const sucursalesDisp = useMemo(() => {
    const todas = state.sucursales || SEED.sucursales;
    if (user.rol === 'gerente') {
      const misSucIds = sucursalesDeGerente(state, user.id);
      return todas.filter(s => misSucIds.includes(s.id));
    }
    if (user.rol === 'asesor')  return todas.filter(s => sucursalesDeAsesor(state, user.id).includes(s.id));
    return todas.filter(s => s.unId !== 'corp');
  }, [user, state.sucursales]);

  const [sucursalId, setSucursalId] = useState(presetSucursalId || sucursalesDisp[0]?.id || '');
  useEffect(() => { if (presetSucursalId) setSucursalId(presetSucursalId); }, [presetSucursalId]);

  // Semana: si la pre-nómina viene de la bandeja/lista, respeta SU semana (no la
  // actual). Así contabilidad puede aprobar pre-nóminas de semanas anteriores
  // aunque ya haya cambiado el lunes.
  const weekId = presetWeekId || getWeekId(getMonday());
  const _preExistente = state.prenominas[sucursalId + '_' + weekId];
  const monday = (_preExistente && _preExistente.semanaInicio)
    ? parseLocalDate(_preExistente.semanaInicio) : getMonday();

  const sucursal = (state.sucursales || SEED.sucursales).find(s => s.id === sucursalId);
  const un = SEED.unidades.find(u => u.id === sucursal?.unId);
  const colabs = state.colaboradores.filter(c => c.sucursalId === sucursalId && c.estatus === 'activo');

  // Get or create prenomina. Se pre-llena con el horario de la semana
  // y con las vacaciones aprobadas que caigan en estos 7 días.
  const preKey = sucursalId + '_' + weekId;
  const horarioSemana = state.horarios?.[sucursalId + '_' + weekId];
  const vacacionesAprob = (state.vacaciones || []).filter(v => v.estado === 'aprobada');
  const prenomina = state.prenominas[preKey] || createEmptyPrenomina(sucursalId, monday, colabs, horarioSemana, vacacionesAprob);

  const isReadOnly = prenomina.estado === 'aprobada' || prenomina.estado === 'cerrada' ||
    (user.rol === 'gerente' && prenomina.estado === 'enviada');

  const [activeCell, setActiveCell] = useState(null); // {colId, dia}
  const [obsModal, setObsModal] = useState(null); // colId
  const [sendModal, setSendModal] = useState(false);
  const [rejectModal, setRejectModal] = useState(false);

  function updateCell(colId, dia, indicador) {
    const newPre = { ...prenomina };
    newPre.detalle = { ...newPre.detalle };
    newPre.detalle[colId] = { ...(newPre.detalle[colId] || {}) };
    newPre.detalle[colId][dia] = { ...(newPre.detalle[colId][dia] || {}), indicador };
    setState({
      ...state,
      prenominas: { ...state.prenominas, [preKey]: newPre }
    });
  }

  function updateObservacion(colId, obs) {
    const newPre = { ...prenomina };
    newPre.detalle = { ...newPre.detalle };
    newPre.detalle[colId] = { ...(newPre.detalle[colId] || {}), observacion: obs };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
  }

  function updateHE(colId, horas) {
    const newPre = { ...prenomina };
    newPre.detalle = { ...newPre.detalle };
    newPre.detalle[colId] = { ...(newPre.detalle[colId] || {}), horasExtras: horas };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
  }

  // Validación
  const validacion = useMemo(() => validar(prenomina, colabs), [prenomina, colabs]);

  function enviar() {
    if (validacion.bloqueantes.length > 0) {
      toast('Hay errores que impiden el envío.');
      return;
    }
    const newPre = { ...prenomina, estado: 'enviada', fechaEnvio: new Date().toISOString(), enviadoPor: user.id };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
    addAuditLog({
      modulo: 'prenomina', accion: 'enviar', entidad: preKey,
      valorAnterior: { estado: prenomina.estado }, valorNuevo: { estado: 'enviada' }
    });
    toast('Pre-nómina enviada a contabilidad.');
    setSendModal(false);
  }

  function aprobar() {
    // Según el diseño, al aprobar la pre-nómina queda cerrada automáticamente e inmutable.
    const newPre = { ...prenomina, estado: 'cerrada',
      fechaAprobacion: new Date().toISOString(), aprobadoPor: user.id };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
    addAuditLog({
      modulo: 'prenomina', accion: 'aprobar', entidad: preKey,
      valorAnterior: { estado: prenomina.estado }, valorNuevo: { estado: 'cerrada' }
    });
    toast('Pre-nómina aprobada y cerrada.');
  }

  function rechazar(motivo) {
    const newPre = { ...prenomina, estado: 'rechazada', motivoRechazo: motivo, rechazadoPor: user.id };
    setState({ ...state, prenominas: { ...state.prenominas, [preKey]: newPre } });
    addAuditLog({
      modulo: 'prenomina', accion: 'rechazar', entidad: preKey,
      valorAnterior: { estado: prenomina.estado }, valorNuevo: { estado: 'rechazada', motivo }
    });
    toast('Pre-nómina regresada al gerente.');
    setRejectModal(false);
  }

  if (!sucursal) return (
    <>
      <TopBar title="Pre-nómina" subtitle="Captura semanal" />
      <div className="p-8">
        <div className="bg-white rounded-xl p-8 text-center shadow-card">
          <div className="font-serif text-xl mb-2">Sin sucursal asignada</div>
          <p className="text-sm text-gray-500">
            No tienes ninguna sucursal asignada todavía. Pídele al administrador que te asigne una desde el panel de Sucursales.
          </p>
        </div>
      </div>
    </>
  );

  return (
    <>
      <TopBar
        title={`Pre-nómina · ${sucursal.nombre}`}
        subtitle={`Semana ${weekId} · ${fmtFechaCorta(monday)} – ${fmtFechaCorta(addDays(monday,6))}`}
        actions={
          <div className="flex items-center gap-2">
            <Badge estado={prenomina.estado} />
            {sucursalesDisp.length > 1 && (
              <select value={sucursalId} onChange={e => setSucursalId(e.target.value)}
                className="px-3 py-1.5 rounded-lg border text-sm bg-white" style={{borderColor: 'var(--border-strong)'}}>
                {sucursalesDisp.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            )}
          </div>
        }
      />
      <div className="p-6">
        {/* Aviso de pre-llenado desde el horario */}
        {prenomina.prellenadaDesdeHorario && prenomina.estado === 'borrador' && (
          <div className="mb-4 p-3 rounded-lg border bg-green-50 text-sm flex items-center gap-2" style={{borderColor:'#C8E5BB', color:'#2A5A0E'}}>
            <Icon name="check" size={14} />
            Esta pre-nómina se pre-llenó con el horario que definiste la semana pasada. Revisa y ajusta lo que haya cambiado en la realidad.
          </div>
        )}
        {/* Banner de motivo de rechazo */}
        {prenomina.estado === 'rechazada' && prenomina.motivoRechazo && (
          <div className="mb-4 p-4 rounded-lg border bg-red-50" style={{borderColor:'#F2B8B3'}}>
            <div className="text-xs uppercase tracking-wider font-medium mb-1" style={{color:'#8C1F1B'}}>Motivo del rechazo de contabilidad</div>
            <div className="text-sm">{prenomina.motivoRechazo}</div>
          </div>
        )}

        {/* Validación */}
        {(validacion.bloqueantes.length > 0 || validacion.advertencias.length > 0) && (
          <div className="mb-4 grid grid-cols-1 md:grid-cols-2 gap-3">
            {validacion.bloqueantes.length > 0 && (

                <div className="font-medium mb-1" style={{color:'#8C1F1B'}}>Errores ({validacion.bloqueantes.length})</div>
                <ul className="space-y-0.5">{validacion.bloqueantes.slice(0,3).map((b,i)=>(<li key={i} className="text-[12px]" style={{color:'#8C1F1B'}}>· {b}</li>))}</ul>
              </div>
            )}
            {validacion.advertencias.length > 0 && (
              <div className="p-3 rounded-lg border bg-amber-50 text-sm" style={{borderColor:'#F0CD83'}}>
                <div className="font-medium mb-1" style={{color:'#7A4B05'}}>Advertencias ({validacion.advertencias.length})</div>

              </div>

                  <th style={{width:60}}>#</th>
                  <th style={{minWidth:200}}>Colaborador</th>
                  <th style={{width:140}}>Puesto</th>
                  {[0,1,2,3,4,5,6].map(d => {

                        <div className="text-[10px] font-normal text-gray-400 num normal-case mt-0.5">{f.getDate()}</div>

                  <th style={{width:120, textAlign:'center'}}>Total</th>
                  <th style={{width:80}}>Obs.</th>

              </thead>

                {colabs.map((c, i) => {
                  const det = prenomina.detalle?.[c.id] || {};

                  return (

                      <td className="text-gray-400 num text-xs">{String(i+1).padStart(3,'0')}</td>

                      </td>
                      <td style={{textAlign:'center'}}>
                        <DayCountsPill counts={conteos} />

                      <td>
                        <button onClick={() => setObsModal(c.id)} disabled={isReadOnly} className="btn btn-ghost p-1.5">

          </div>
        </div>

        {/* Footer con resumen y acciones */}

            <div><span className="text-gray-500 text-xs uppercase tracking-wider mr-2">Plantilla</span><span className="num font-medium">{colabs.length}</span></div>
            <div><span className="text-gray-500 text-xs uppercase tracking-wider mr-2">Capturado</span><span className="num font-medium">{computeProgress(prenomina, colabs)}%</span></div>
            {validacion.bloqueantes.length === 0 && validacion.advertencias.length === 0 && (
              <div className="text-green-700 text-xs flex items-center gap-1.5"><Icon name="check" size={12}/>Sin errores ni advertencias</div>
            )}
          </div>
          <div className="flex gap-2">
            {/* Acciones de gerente */}
            {user.rol === 'gerente' && !isReadOnly && (
              <>
                <button className="btn btn-secondary" onClick={() => { setState({ ...state, prenominas: { ...state.prenominas, [preKey]: prenomina } }); toast('Borrador guardado.'); }}><Icon name="check" size={14}/>Guardar borrador</button>
                <button className="btn btn-primary" onClick={() => setSendModal(true)} disabled={validacion.bloqueantes.length > 0}>
                  <Icon name="upload" size={14}/>Enviar a contabilidad
                </button>
              </>
            )}
            {/* Acciones de contabilidad y administrador */}
            {(user.rol === 'contabilidad' || user.rol === 'admin') && (prenomina.estado === 'enviada' || prenomina.estado === 'corregida') && (
              <>
                <button className="btn btn-danger" onClick={() => setRejectModal(true)}><Icon name="x" size={14}/>Rechazar</button>
                <button className="btn btn-success" onClick={aprobar}><Icon name="check" size={14}/>Aprobar y cerrar</button>
              </>
            )}
          </div>
        </div>

        {/* Leyenda de indicadores */}
        <div className="mt-4 flex flex-wrap gap-2">
          {INDICADORES.map(ind => (
            <div key={ind.code} className={`cell-${ind.code} px-2.5 py-1 rounded-md text-xs font-medium border tip`}>
              <span className="font-mono mr-1.5">{ind.code}</span>{ind.nombre}
              <div className="tip-body">{ind.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {obsModal && (
        <ObservacionModal
          colab={colabs.find(c => c.id === obsModal)}
          observacion={prenomina.detalle?.[obsModal]?.observacion || ''}
          onClose={() => setObsModal(null)}
          onSave={obs => { updateObservacion(obsModal, obs); setObsModal(null); }}
          readOnly={isReadOnly}
        />
      )}
      {sendModal && (
        <ConfirmModal
          title="Enviar pre-nómina a contabilidad"
          message="Una vez enviada, no podrás editarla hasta que contabilidad la apruebe o rechace. ¿Continuar?"
          confirmLabel="Sí, enviar"
          onConfirm={enviar}
          onClose={() => setSendModal(false)}
        />
      )}
      {rejectModal && (
        <RejectModal onClose={() => setRejectModal(false)} onReject={rechazar} />
      )}
    </>
  );
}

function CellSelector({ value, onChange, disabled }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();

  useEffect(() => {
    if (!open) return;
    const close = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, [open]);

  const ind = INDICADORES.find(i => i.code === value);

  return (
    <div className="relative" ref={ref}>
      <button
        className={`cell-btn ${value ? `cell-${value}` : 'cell-empty'}`}
        onClick={() => !disabled && setOpen(!open)}
        disabled={disabled}
        style={{ cursor: disabled ? 'default' : 'pointer' }}
      >
        {value || '—'}
      </button>
      {open && (
        <div className="day-popover fade-in" style={{ top: 38, left: 0 }}>
          <div className="text-[10px] uppercase tracking-wider text-gray-500 px-2 py-1 font-medium">Selecciona</div>
          {INDICADORES.map(ind => (
            <button key={ind.code} onClick={() => { onChange(ind.code); setOpen(false); }}
              className="w-full text-left px-2 py-1.5 rounded hover:bg-gray-50 text-sm flex items-center gap-2">
              <span className={`cell-${ind.code} px-1.5 py-0.5 rounded text-[11px] font-mono font-medium border`} style={{minWidth:42, textAlign:'center'}}>{ind.code}</span>
              <span className="text-[13px]">{ind.nombre}</span>
            </button>
          ))}
          {value && (
            <>
              <div style={{borderTop:'1px solid var(--border)', margin:'4px 0'}} />
              <button onClick={() => { onChange(null); setOpen(false); }} className="w-full text-left px-2 py-1.5 text-xs text-gray-500 hover:bg-gray-50 rounded">Limpiar</button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

function DayCountsPill({ counts }) {
  const items = [];
  if (counts.A) items.push({label:'A',n:counts.A,c:'#2A5A0E'});
  if (counts.D) items.push({label:'D',n:counts.D,c:'#565550'});
  if (counts.FI) items.push({label:'FI',n:counts.FI,c:'#8C1F1B'});
  if (counts.INC) items.push({label:'INC',n:counts.INC,c:'#7A4B05'});
  if (counts.VAC) items.push({label:'VAC',n:counts.VAC,c:'#0F4471'});
  if (counts.PSGS) items.push({label:'PSGS',n:counts.PSGS,c:'#322787'});
  if (counts.PCGS) items.push({label:'PCGS',n:counts.PCGS,c:'#0E5A42'});
  if (items.length === 0) return <span className="text-gray-300 text-xs">—</span>;
  return (
    <div className="flex justify-center gap-1.5 flex-wrap">
      {items.map((it,i) => (
        <span key={i} className="text-[10px] num font-medium" style={{color:it.c}}>{it.n}{it.label}</span>
      ))}
    </div>
  );
}

function createEmptyPrenomina(sucursalId, monday, colabs, horario, vacacionesAprobadas) {
  const detalle = {};
  // 1) Si existe un horario definido para esta semana, pre-llenar:
  //    turno -> A, descanso -> D, vacaciones -> VAC.
  if (horario && horario.detalle) {
    colabs.forEach(c => {
      const h = horario.detalle[c.id];
      if (!h) return;
      detalle[c.id] = {};
      for (let d = 0; d < 7; d++) {
        const v = h[d];
        if (!v) continue;
        let ind = null;
        if (v.tipo === 'trabaja') ind = 'A';
        else if (v.tipo === 'descanso') ind = 'D';
        else if (v.tipo === 'vacaciones') ind = 'VAC';
        else if (v.tipo === 'pcgs') ind = 'PCGS';
        else if (v.tipo === 'psgs') ind = 'PSGS';
        if (ind) detalle[c.id][d] = { indicador: ind, desdeHorario: true };
      }
    });
  }
  // 2) Las vacaciones APROBADAS prevalecen: pintan VAC sobre los días que caen
  //    dentro del rango aprobado, aunque el horario dijera otra cosa.
  if (vacacionesAprobadas && vacacionesAprobadas.length) {
    colabs.forEach(c => {
      const vacs = vacacionesAprobadas.filter(v => v.colaboradorId === c.id && v.estado === 'aprobada');
      if (!vacs.length) return;
      if (!detalle[c.id]) detalle[c.id] = {};
      for (let d = 0; d < 7; d++) {
        const fecha = addDays(monday, d);
        const fStr = dateKey(fecha);
        const enVac = vacs.some(v => fStr >= v.fechaInicio && fStr <= v.fechaFin);
        if (enVac) detalle[c.id][d] = { indicador: 'VAC', desdeVacaciones: true };
      }
    });
  }
  return {
    sucursalId,
    weekId: getWeekId(monday),
    semanaInicio: dateKey(monday),
    semanaFin: dateKey(addDays(monday, 6)),
    estado: 'borrador',
    detalle,
    prellenadaDesdeHorario: !!(horario && horario.detalle),
    fechaCreacion: new Date().toISOString(),
  };
}

function countDays(detalle) {
  const counts = { A:0, D:0, FI:0, INC:0, VAC:0, PSGS:0, PCGS:0, BAJA:0 };
  for (let d = 0; d < 7; d++) {
    const ind = detalle[d]?.indicador;
    if (ind && counts[ind] !== undefined) counts[ind]++;
  }
  return counts;
}

function computeProgress(prenomina, colabs) {
  let total = colabs.length * 7;
  let done = 0;
  colabs.forEach(c => {
    const det = prenomina.detalle?.[c.id] || {};
    for (let d = 0; d < 7; d++) {
      if (det[d]?.indicador) done++;
    }
  });
  return total ? Math.round((done / total) * 100) : 0;
}

function validar(prenomina, colabs) {
  const bloqueantes = [];
  const advertencias = [];
  let faltanDias = 0;
  let fiSinObs = 0;
  let incSinDoc = 0;

  colabs.forEach(c => {
    const det = prenomina.detalle?.[c.id] || {};
    let hasFI = false; let hasINC = false; let hasD = false; let aCount = 0;
    for (let d = 0; d < 7; d++) {
      const ind = det[d]?.indicador;
      if (!ind) faltanDias++;
      if (ind === 'FI') hasFI = true;
      if (ind === 'INC') hasINC = true;
      if (ind === 'D') hasD = true;
      if (ind === 'A') aCount++;
    }
    if (hasFI && !det.observacion) fiSinObs++;
    if (hasINC && !det.documento) incSinDoc++;
    if (aCount === 7) advertencias.push(`${c.nombre} ${c.apellidoPaterno}: 7 días seguidos de A.`);
    if (!hasD && Object.keys(det).filter(k => !isNaN(k)).length === 7)
      advertencias.push(`${c.nombre} ${c.apellidoPaterno}: sin día de descanso.`);
  });

  if (faltanDias > 0) bloqueantes.push(`Faltan ${faltanDias} celdas por capturar.`);
  if (fiSinObs > 0)   bloqueantes.push(`${fiSinObs} colaborador(es) con FI sin observación.`);
  if (incSinDoc > 0)  advertencias.push(`${incSinDoc} INC sin documento adjunto.`);

  return { bloqueantes, advertencias };
}

function PrenominasList({ inbox = false }) {
  const { user, state } = useApp();
  const [view, setView] = useState(null); // sucursalId
  const [filter, setFilter] = useState(inbox ? 'pendientes' : 'todas');

  // Lista de sucursales relevantes
  let lista = [];
  if (inbox) {
    // Contabilidad: ver todas las pre-nóminas (pendientes, rechazadas y cerradas)
    lista = Object.values(state.prenominas).filter(p =>
      p.estado === 'enviada' || p.estado === 'corregida' ||
      p.estado === 'rechazada' || p.estado === 'aprobada' || p.estado === 'cerrada');
  } else if (user.rol === 'gerente') {
    const monday = getMonday(); const weekId = getWeekId(monday);
    const misSucIds = sucursalesDeGerente(state, user.id);
    lista = misSucIds.map(sId => {
      const key = sId + '_' + weekId;
      return state.prenominas[key] || { sucursalId: sId, weekId, estado: 'borrador', semanaInicio: dateKey(monday), semanaFin: dateKey(addDays(monday,6)) };
    });
  } else if (user.rol === 'asesor') {
    const misSucIds = sucursalesDeAsesor(state, user.id);
    lista = Object.values(state.prenominas).filter(p => misSucIds.includes(p.sucursalId));
  } else {
    lista = Object.values(state.prenominas);
  }

  if (filter === 'pendientes') lista = lista.filter(p => p.estado === 'enviada' || p.estado === 'corregida');
  else if (filter === 'aprobadas') lista = lista.filter(p => p.estado === 'aprobada' || p.estado === 'cerrada');
  else if (filter === 'rechazadas') lista = lista.filter(p => p.estado === 'rechazada');

  if (view) return <PrenominaCapture presetSucursalId={view.sucursalId} presetWeekId={view.weekId} />;

  return (
    <>
      <TopBar
        title={inbox ? 'Bandeja de pre-nóminas' : 'Pre-nóminas'}
        subtitle={inbox ? 'Para revisión de contabilidad' : 'Estado y captura'}
        actions={
          <div className="flex gap-2">
            <select value={filter} onChange={e=>setFilter(e.target.value)}
              className="px-3 py-1.5 rounded-lg border text-sm bg-white" style={{borderColor:'var(--border-strong)'}}>
              <option value="todas">Todas</option>
              <option value="pendientes">Pendientes</option>
              <option value="aprobadas">Aprobadas</option>
              <option value="rechazadas">Rechazadas</option>
            </select>
          </div>
        }
      />
      <div className="p-8">
        {lista.length === 0 ? (
          <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">No hay pre-nóminas con este filtro.</div>
        ) : (
          <div className="bg-white rounded-xl overflow-hidden shadow-card">
            <table className="lem-table w-full">
              <thead><tr>
                <th>Sucursal</th><th>Semana</th><th>Estado</th><th>Última actualización</th><th></th>
              </tr></thead>
              <tbody>
                {lista.map(p => {
                  const s = (state.sucursales || SEED.sucursales).find(x => x.id === p.sucursalId);
                  const un = SEED.unidades.find(u => u.id === s?.unId);
                  return (
                    <tr key={p.sucursalId + '_' + p.weekId}>
                      <td>
                        <div className="flex items-center gap-2">
                          <span className="brand-dot" style={{background:un?.color}} />
                          <span className="font-medium">{s?.nombre}</span>
                        </div>
                      </td>
                      <td className="num text-sm">{p.weekId}</td>
                      <td><Badge estado={p.estado} /></td>
                      <td className="text-sm text-gray-600">{p.fechaEnvio ? fmtFechaCorta(p.fechaEnvio) : (p.fechaCreacion ? fmtFechaCorta(p.fechaCreacion) : '—')}</td>
                      <td>
                        <button onClick={() => setView({ sucursalId: p.sucursalId, weekId: p.weekId })} className="btn btn-secondary">
                          {inbox && (p.estado === 'enviada' || p.estado === 'corregida') ? 'Revisar' : 'Abrir'} <Icon name="chevronR" size={14} />
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

function BonosScreen() {
  const { state } = useApp();
  const mes = new Date().getMonth();
  const anio = new Date().getFullYear();
  const filas = state.colaboradores.filter(c => c.estatus === 'activo').map(c => {
    const puesto = SEED.puestos.find(p => p.id === c.puestoId);
    const fiCount = countFIInMonth(state, c.id, anio, mes);
    let estatus, label;
    if (!puesto?.bonoFI) { estatus = 'na'; label = 'N/A'; }
    else if (fiCount === 0) { estatus = 'eligible'; label = 'Elegible'; }
    else { estatus = 'no_eligible'; label = 'No elegible'; }
    return { c, puesto, fiCount, estatus, label };
  });

  const elig = filas.filter(f => f.estatus === 'eligible').length;
  const noElig = filas.filter(f => f.estatus === 'no_eligible').length;
  const na = filas.filter(f => f.estatus === 'na').length;

  return (
    <>
      <TopBar title="Bonos mensuales" subtitle={`${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][mes]} ${anio}`} />
      <div className="p-8">
        <div className="grid grid-cols-3 gap-4 mb-6">
          <StatCard label="Elegibles" value={elig} color="#0E5A42" />
          <StatCard label="No elegibles por FI" value={noElig} color="#8C1F1B" />
          <StatCard label="N/A (gerencial / corp)" value={na} />
        </div>
        <div className="bg-white rounded-xl overflow-hidden shadow-card">
          <table className="lem-table w-full">
            <thead><tr><th>Colaborador</th><th>Puesto</th><th>Sucursal</th><th>FI en el mes</th><th>Estatus de bono</th></tr></thead>
            <tbody>
              {filas.slice(0, 30).map(({c, puesto, fiCount, estatus, label}) => {
                const suc = (state.sucursales || SEED.sucursales).find(s => s.id === c.sucursalId);
                return (
                  <tr key={c.id}>
                    <td className="font-medium">{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</td>
                    <td>{puesto?.nombre}</td>
                    <td>{suc?.nombre}</td>
                    <td className="num text-center">{fiCount}</td>
                    <td>
                      <span className={`badge ${estatus === 'eligible' ? 'badge-aprobada' : estatus === 'no_eligible' ? 'badge-rechazada' : 'badge-borrador'}`}>{label}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

function countFIInMonth(state, colabId, anio, mes) {
  let count = 0;
  Object.values(state.prenominas).forEach(p => {
    if (p.detalle?.[colabId]) {
      const monday = parseLocalDate(p.semanaInicio);
      for (let d = 0; d < 7; d++) {
        const fecha = addDays(monday, d);
        if (fecha.getFullYear() === anio && fecha.getMonth() === mes) {
          if (p.detalle[colabId][d]?.indicador === 'FI') count++;
        }
      }
    }
  });
  return count;
}

/* ========================================================================
   SUCURSALES — gestión para el Administrador
   ======================================================================== */
function SucursalesScreen() {
  const { state, setState, addAuditLog, toast } = useApp();
  const [modal, setModal] = useState(null); // { mode:'nueva'|'editar', sucursal }

  const sucursales = state.sucursales || SEED.sucursales;
  // Gerentes y asesores disponibles para asignar
  const gerentes = getUsuarios(state).filter(u => u.rol === 'gerente');
  const asesores = getUsuarios(state).filter(u => u.rol === 'asesor');

  // Agrupar por unidad de negocio (solo operativas)
  const unidadesOp = SEED.unidades.filter(u => u.tipo === 'op');

  function colabsEnSucursal(sId) {
    return state.colaboradores.filter(c => c.sucursalId === sId && c.estatus === 'activo').length;
  }

  function guardarSucursal(data) {
    let nuevasSuc;
    if (modal.mode === 'nueva') {
      const nueva = {
        id: 's_' + Date.now().toString(36),
        nombre: data.nombre,
        unId: data.unId,
        direccion: data.direccion,
        gerenteId: data.gerenteId || null,
        asesorId: data.asesorId || null,
        plantillaObjetivo: data.plantillaObjetivo || 5,
      };
      nuevasSuc = [...sucursales, nueva];
      addAuditLog({ modulo: 'sucursales', accion: 'create', entidad: nueva.id,
        valorAnterior: null, valorNuevo: { nombre: data.nombre } });
      toast('Sucursal creada: ' + data.nombre);
    } else {
      nuevasSuc = sucursales.map(s => s.id === modal.sucursal.id
        ? { ...s, nombre: data.nombre, unId: data.unId, direccion: data.direccion,
            gerenteId: data.gerenteId || null, asesorId: data.asesorId || null, plantillaObjetivo: data.plantillaObjetivo || 5 }
        : s);
      addAuditLog({ modulo: 'sucursales', accion: 'update', entidad: modal.sucursal.id,
        valorAnterior: { nombre: modal.sucursal.nombre, gerenteId: modal.sucursal.gerenteId },
        valorNuevo: { nombre: data.nombre, gerenteId: data.gerenteId } });
      toast('Sucursal actualizada.');
    }
    setState({ ...state, sucursales: nuevasSuc });
    setModal(null);
  }

  return (
    <>
      <TopBar title="Sucursales" subtitle={`${sucursales.length} sucursales en ${unidadesOp.length} unidades de negocio`} actions={
        <button className="btn btn-primary" onClick={() => setModal({ mode: 'nueva', sucursal: null })}>
          <Icon name="plus" size={14} /> Nueva sucursal
        </button>
      } />
      <div className="p-8 space-y-6">
        {unidadesOp.map(un => {
          const sucsUN = sucursales.filter(s => s.unId === un.id);
          return (
            <div key={un.id}>
              <div className="flex items-center gap-2 mb-3">
                <span className="brand-dot" style={{ background: un.color, width: 10, height: 10 }} />
                <h2 className="text-base font-medium">{un.nombre}</h2>
                <span className="text-xs text-gray-500">· {sucsUN.length} sucursal(es)</span>
              </div>
              {sucsUN.length === 0 ? (
                <div className="bg-white rounded-xl p-5 text-sm text-gray-500 shadow-card">
                  Sin sucursales. Agrega la primera con el botón de arriba.
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  {sucsUN.map(s => {
                    const ger = gerentes.find(g => g.id === s.gerenteId);
                    return (
                      <div key={s.id} className="bg-white rounded-xl shadow-card p-4">
                        <div className="flex items-start justify-between mb-3">
                          <div className="flex items-center gap-2.5">
                            <div style={{ width: 36, height: 36, borderRadius: 8, background: un.color,
                              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                              <Icon name="home" size={16} className="text-white" />
                            </div>
                            <div>
                              <div className="font-medium text-sm">{s.nombre}</div>
                              {(() => {
                                const actual = colabsEnSucursal(s.id);
                                const objetivo = s.plantillaObjetivo || 0;
                                const corta = objetivo > 0 && actual < objetivo;
                                return (
                                  <div className="text-xs" style={{ color: corta ? '#8C1F1B' : 'var(--text-soft)' }}>
                                    {actual} / {objetivo} plantilla
                                    {corta && <span> · faltan {objetivo - actual}</span>}
                                  </div>
                                );
                              })()}
                            </div>
                          </div>
                          <button onClick={() => setModal({ mode: 'editar', sucursal: s })}
                            className="btn btn-ghost p-1.5 tip">
                            <Icon name="settings" size={14} />
                            <span className="tip-body">Editar</span>
                          </button>
                        </div>
                        {s.direccion && <div className="text-xs text-gray-500 mb-2">{s.direccion}</div>}
                        <div className="pt-2" style={{ borderTop: '1px solid var(--border)' }}>
                          <div className="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-1">Gerente responsable</div>
                          {ger ? (
                            <div className="flex items-center gap-2">
                              <div className="avatar" style={{ width: 24, height: 24, background: '#8C1F1B', fontSize: 10 }}>
                                {ger.nombre.split(' ').map(p => p[0]).slice(0,2).join('')}
                              </div>
                              <span className="text-sm">{ger.nombre}</span>
                            </div>
                          ) : (
                            <span className="text-sm text-gray-400">Sin asignar</span>
                          )}
                          {(() => {
                            const ase = asesores.find(a => a.id === s.asesorId);
                            return ase ? (
                              <div className="mt-2">
                                <div className="text-[10px] uppercase tracking-wider text-gray-400 font-medium mb-1">Asesor</div>
                                <div className="flex items-center gap-2">
                                  <div className="avatar" style={{ width: 24, height: 24, background: 'var(--lem)', fontSize: 10 }}>
                                    {ase.nombre.split(' ').map(p => p[0]).slice(0,2).join('')}
                                  </div>
                                  <span className="text-sm">{ase.nombre}</span>
                                </div>
                              </div>
                            ) : null;
                          })()}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {modal && (
        <SucursalModal
          mode={modal.mode}
          sucursal={modal.sucursal}
          unidades={unidadesOp}
          gerentes={gerentes}
          asesores={asesores}
          onClose={() => setModal(null)}
          onSave={guardarSucursal}
        />
      )}
    </>
  );
}

function SucursalModal({ mode, sucursal, unidades, gerentes, asesores, onClose, onSave }) {
  const [nombre, setNombre] = useState(sucursal?.nombre || '');
  const [unId, setUnId] = useState(sucursal?.unId || unidades[0]?.id || '');
  const [direccion, setDireccion] = useState(sucursal?.direccion || '');
  const [gerenteId, setGerenteId] = useState(sucursal?.gerenteId || '');
  const [asesorId, setAsesorId] = useState(sucursal?.asesorId || '');
  const [plantillaObjetivo, setPlantillaObjetivo] = useState(sucursal?.plantillaObjetivo || 5);
  const [error, setError] = useState('');

  function submit() {
    if (!nombre.trim()) { setError('El nombre de la sucursal es obligatorio.'); return; }
    const obj = parseInt(plantillaObjetivo) || 0;
    if (obj < 1) { setError('La plantilla objetivo debe ser al menos 1.'); return; }
    onSave({ nombre: nombre.trim(), unId, direccion: direccion.trim(), gerenteId, asesorId, plantillaObjetivo: obj });
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{ maxWidth: 480 }} onClick={e => e.stopPropagation()}>
        <div className="p-6 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
          <h2 className="text-lg font-medium">{mode === 'nueva' ? 'Nueva sucursal' : 'Editar sucursal'}</h2>
          <p className="text-sm text-gray-500 mt-0.5">
            {mode === 'nueva' ? 'Registra una sucursal y asígnale un gerente.' : 'Modifica los datos de la sucursal.'}
          </p>
        </div>
        <div className="p-6 space-y-4">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Nombre de la sucursal</label>
            <input value={nombre} onChange={e => { setNombre(e.target.value); setError(''); }}
              placeholder="Ej. Wings Plaza Sur"
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white"
              style={{ borderColor: error ? '#F2B8B3' : 'var(--border-strong)' }} />
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Unidad de negocio</label>
            <select value={unId} onChange={e => setUnId(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              {unidades.map(u => <option key={u.id} value={u.id}>{u.nombre}</option>)}
            </select>
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Dirección <span className="text-gray-400 normal-case">(opcional)</span></label>
            <input value={direccion} onChange={e => setDireccion(e.target.value)}
              placeholder="Calle, número, colonia"
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }} />
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Plantilla objetivo</label>
            <input type="number" min="1" value={plantillaObjetivo}
              onChange={e => { setPlantillaObjetivo(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
            <p className="text-[11px] text-gray-400 mt-1">Número de colaboradores que la sucursal debe tener (incluye al gerente). Se usa para medir días sin plantilla completa.</p>
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Gerente responsable</label>
            <select value={gerenteId} onChange={e => setGerenteId(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              <option value="">Sin asignar</option>
              {gerentes.map(g => <option key={g.id} value={g.id}>{g.nombre}</option>)}
            </select>
            <p className="text-[11px] text-gray-400 mt-1">Un gerente puede tener varias sucursales. Solo verá las que tenga asignadas.</p>
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Asesor asignado <span className="text-gray-400 normal-case">(opcional)</span></label>
            <select value={asesorId} onChange={e => setAsesorId(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              <option value="">Sin asignar</option>
              {asesores.map(a => <option key={a.id} value={a.id}>{a.nombre}</option>)}
            </select>
            <p className="text-[11px] text-gray-400 mt-1">Un asesor puede supervisar varias sucursales de cualquier marca. Solo verá y aprobará lo de las que tenga asignadas.</p>
          </div>
          {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}>
            <Icon name="alert" size={12} /> {error}</div>}
        </div>
        <div className="px-6 py-4 flex justify-end gap-2" style={{ borderTop: '1px solid var(--border)' }}>
          <button onClick={onClose} className="btn btn-secondary">Cancelar</button>
          <button onClick={submit} className="btn btn-primary">
            {mode === 'nueva' ? 'Crear sucursal' : 'Guardar cambios'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ========================================================================
   HORARIO — planeación de la próxima semana (turnos + descansos)
   ======================================================================== */
function HorarioScreen() {
  const { user, state, setState, addAuditLog, toast } = useApp();

  // Navegación de semanas: 0 = semana en curso, 1 = próxima, -1 = anterior, etc.
  // Por defecto abre en la próxima semana (la que el gerente planea).
  const [weekOffset, setWeekOffset] = useState(1);
  const proxMonday = addDays(getMonday(), weekOffset * 7);
  const proxWeekId = getWeekId(proxMonday);
  const esActual = weekOffset === 0;
  const esProxima = weekOffset === 1;
  const esPasada = weekOffset < 0;

  // Sucursales disponibles según rol
  const sucursalesDisp = useMemo(() => {
    const todas = state.sucursales || SEED.sucursales;
    if (user.rol === 'gerente') {
      const ids = sucursalesDeGerente(state, user.id);
      return todas.filter(s => ids.includes(s.id));
    }
    if (user.rol === 'asesor') return todas.filter(s => sucursalesDeAsesor(state, user.id).includes(s.id));
    return todas.filter(s => s.unId !== 'corp');
  }, [user, state.sucursales]);

  const [sucursalId, setSucursalId] = useState(sucursalesDisp[0]?.id || '');
  const sucursal = (state.sucursales || SEED.sucursales).find(s => s.id === sucursalId);
  const un = SEED.unidades.find(u => u.id === sucursal?.unId);
  const colabs = state.colaboradores.filter(c => c.sucursalId === sucursalId && c.estatus === 'activo');

  const horKey = sucursalId + '_' + proxWeekId;
  const horario = state.horarios?.[horKey] || { sucursalId, weekId: proxWeekId,
    semanaInicio: dateKey(proxMonday), detalle: {}, estado: 'borrador' };

  // El gerente edita la semana en curso y las futuras; las pasadas son solo
  // consulta. Asesor y admin siempre consultan.
  const soloLectura = user.rol !== 'gerente' || weekOffset < 0;

  const [editCell, setEditCell] = useState(null); // { colId, dia }

  function setDia(colId, dia, valor) {
    const nuevo = { ...horario, detalle: { ...horario.detalle } };
    nuevo.detalle[colId] = { ...(nuevo.detalle[colId] || {}) };
    nuevo.detalle[colId][dia] = valor;
    setState({ ...state, horarios: { ...state.horarios, [horKey]: nuevo } });
  }

  function guardar() {
    const nuevo = { ...horario, estado: 'definido', fechaGuardado: new Date().toISOString() };
    setState({ ...state, horarios: { ...state.horarios, [horKey]: nuevo } });
    addAuditLog({ modulo: 'horario', accion: 'guardar', entidad: horKey,
      valorAnterior: null, valorNuevo: { weekId: proxWeekId } });
    toast('Horario guardado.');
  }

  if (!sucursal) return (
    <>
      <TopBar title="Horario" subtitle="Planeación de turnos" />
      <div className="p-8">
        <div className="bg-white rounded-xl p-8 text-center shadow-card">
          <div className="font-serif text-xl mb-2">Sin sucursal asignada</div>
          <p className="text-sm text-gray-500">No tienes sucursales para planear horario.</p>
        </div>
      </div>
    </>
  );

  const dn = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
  const dnCorto = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  // Conteo de cobertura por día
  function coberturaDia(d) {
    let trabajan = 0;
    colabs.forEach(c => {
      const v = horario.detalle?.[c.id]?.[d];
      if (v && v.tipo === 'trabaja') trabajan++;
    });
    return trabajan;
  }

  return (
    <>
      <TopBar
        title="Horarios"
        subtitle={`${sucursal.nombre} · ${esActual ? 'Semana en curso' : esProxima ? 'Próxima semana' : esPasada ? 'Semana anterior' : 'Semana futura'} · ${fmtFechaCorta(proxMonday)} – ${fmtFechaCorta(addDays(proxMonday,6))}`}
        actions={
          <div className="flex items-center gap-2">
            <div className="flex items-center gap-1">
              <button onClick={() => setWeekOffset(weekOffset - 1)} className="btn btn-secondary">← Anterior</button>
              <button onClick={() => setWeekOffset(0)} className="btn btn-secondary" disabled={esActual}>Hoy</button>
              <button onClick={() => setWeekOffset(weekOffset + 1)} className="btn btn-secondary">Siguiente →</button>
            </div>
            {horario.estado === 'definido' && <span className="badge badge-aprobada">Definido</span>}
            {horario.estado === 'borrador' && <span className="badge badge-borrador">Borrador</span>}
            {sucursalesDisp.length > 1 && (
              <select value={sucursalId} onChange={e => setSucursalId(e.target.value)}
                className="px-3 py-1.5 rounded-lg border text-sm bg-white" style={{borderColor:'var(--border-strong)'}}>
                {sucursalesDisp.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            )}
          </div>
        }
      />
      <div className="p-6">
        {soloLectura && (
          <div className="mb-4 p-3 rounded-lg border bg-blue-50 text-sm" style={{borderColor:'#ABCAE9', color:'#0F4471'}}>
            {user.rol === 'gerente'
              ? 'Las semanas anteriores son solo de consulta y no se pueden editar.'
              : 'Vista de consulta. El horario lo define el gerente de la sucursal.'}
          </div>
        )}
        <div className="mb-4 p-3 rounded-lg" style={{background:'var(--lem-light)'}}>
          <div className="text-[13px]" style={{color:'var(--lem-dark)'}}>
            {esProxima
              ? <>Este horario es para la <strong>próxima semana</strong>. Cuando inicie esa semana, la captura de pre-nómina se pre-llenará automáticamente: turno → A, descanso → D.</>
              : esActual
              ? <>Estás viendo el horario de la <strong>semana en curso</strong>.</>
              : esPasada
              ? <>Estás viendo el horario de una <strong>semana anterior</strong> (solo consulta).</>
              : <>Estás viendo el horario de una <strong>semana futura</strong>.</>}
          </div>
        </div>

        <div className="bg-white rounded-xl shadow-card overflow-hidden">
          <div className="overflow-auto" style={{maxHeight:'calc(100vh - 380px)'}}>
            <table className="lem-table w-full" style={{minWidth: 1000}}>
              <thead>
                <tr>
                  <th style={{minWidth:200}}>Colaborador</th>
                  {dnCorto.map((d,i) => (
                    <th key={i} style={{width:120, textAlign:'center'}}>
                      <div>{d}</div>
                      <div className="text-[10px] font-normal text-gray-400 num normal-case mt-0.5">{addDays(proxMonday,i).getDate()}</div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {colabs.map(c => {
                  const det = horario.detalle?.[c.id] || {};
                  const puesto = SEED.puestos.find(p => p.id === c.puestoId);
                  return (
                    <tr key={c.id}>
                      <td>
                        <div className="flex items-center gap-2.5">
                          <div className="avatar" style={{width:28,height:28,background:un?.color,fontSize:11}}>{c.nombre[0]}{c.apellidoPaterno[0]}</div>
                          <div>
                            <div className="font-medium text-sm">{c.nombre} {c.apellidoPaterno}</div>
                            <div className="text-[11px] text-gray-500">{puesto?.nombre}</div>
                          </div>
                        </div>
                      </td>
                      {[0,1,2,3,4,5,6].map(d => (
                        <td key={d} style={{padding:'6px 4px', textAlign:'center'}}>
                          <HorarioCell
                            valor={det[d]}
                            dia={d}
                            soloLectura={soloLectura}
                            onClick={() => !soloLectura && setEditCell({ colId: c.id, dia: d })}
                          />
                        </td>
                      ))}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>

        {/* Resumen de cobertura */}
        <div className="mt-4 bg-white rounded-xl shadow-card p-4">
          <div className="text-xs uppercase tracking-wider text-gray-500 font-medium mb-2">Cobertura por día (cuántos trabajan)</div>
          <div className="flex gap-2 flex-wrap">
            {dnCorto.map((d,i) => {
              const n = coberturaDia(i);
              return (
                <div key={i} className="px-3 py-1.5 rounded-lg text-sm" style={{background: n===0 ? '#FCE7E5' : 'var(--bg)', border:'1px solid var(--border)'}}>
                  <span className="text-gray-500">{d}</span> <span className="num font-medium" style={{color: n===0?'#8C1F1B':'var(--text)'}}>{n}</span>
                </div>
              );
            })}
          </div>
        </div>

        {!soloLectura && (
          <div className="mt-4 flex justify-end gap-2">
            <button className="btn btn-secondary" onClick={() => toast('Borrador guardado automáticamente.')}>Guardar borrador</button>
            <button className="btn btn-primary" onClick={guardar}><Icon name="check" size={14}/>Definir horario</button>
          </div>
        )}

        {/* Leyenda */}
        <div className="mt-4 flex flex-wrap gap-2 text-xs">
          <div className="cell-A px-2.5 py-1 rounded-md font-medium border">Trabaja (con horario)</div>
          <div className="cell-D px-2.5 py-1 rounded-md font-medium border">Descanso</div>
          <div className="cell-VAC px-2.5 py-1 rounded-md font-medium border">Vacaciones</div>
          <div className="cell-PCGS px-2.5 py-1 rounded-md font-medium border">Permiso c/goce</div>
          <div className="cell-PSGS px-2.5 py-1 rounded-md font-medium border">Permiso s/goce</div>
          <div className="cell-empty px-2.5 py-1 rounded-md font-medium border">Sin asignar</div>
        </div>

        {/* Aviso de descansos en fin de semana (vie/sáb/dom) */}
        {(() => {
          const findes = descansosFinDeSemana(horario);
          if (findes.length === 0) return null;
          return (
            <div className="mt-4 rounded-lg p-3" style={{ background: '#FFF4ED', border: '1px solid #FDBA8C' }}>
              <div className="flex items-center gap-1.5 text-sm font-medium mb-1" style={{ color: '#9A3412' }}>
                <Icon name="alert" size={14} /> Descansos en fin de semana ({findes.length})
              </div>
              <p className="text-[12px] mb-2" style={{ color: '#9A3412' }}>
                Viernes, sábado y domingo son días pico. Estos descansos quedarán visibles para el asesor y la administración:
              </p>
              <div className="space-y-0.5">
                {findes.map(f => {
                  const c = colabs.find(x => x.id === f.colaboradorId);
                  if (!c) return null;
                  return (
                    <div key={f.colaboradorId} className="text-[12px]" style={{ color: '#7C2D12' }}>
                      • <strong>{c.nombre} {c.apellidoPaterno}</strong> descansa {f.nombresDias.join(' y ')}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>

      {editCell && (
        <HorarioCellModal
          colab={colabs.find(c => c.id === editCell.colId)}
          dia={dn[editCell.dia]}
          valor={horario.detalle?.[editCell.colId]?.[editCell.dia]}
          onClose={() => setEditCell(null)}
          onSave={v => { setDia(editCell.colId, editCell.dia, v); setEditCell(null); }}
        />
      )}
    </>
  );
}

function HorarioCell({ valor, dia, soloLectura, onClick }) {
  let claseColor = 'cell-empty', texto = '—';
  if (valor?.tipo === 'trabaja') { claseColor = 'cell-A'; texto = (valor.entrada || '?') + '–' + (valor.salida || '?'); }
  else if (valor?.tipo === 'descanso') { claseColor = 'cell-D'; texto = 'Descanso'; }
  else if (valor?.tipo === 'vacaciones') { claseColor = 'cell-VAC'; texto = 'VAC'; }
  else if (valor?.tipo === 'pcgs') { claseColor = 'cell-PCGS'; texto = 'PCGS'; }
  else if (valor?.tipo === 'psgs') { claseColor = 'cell-PSGS'; texto = 'PSGS'; }

  // Advertencia: descanso en viernes (4), sábado (5) o domingo (6) — días pico
  const descansoFinde = valor?.tipo === 'descanso' && DIAS_FINDE.includes(dia);

  return (
    <button
      className={claseColor}
      onClick={onClick}
      title={descansoFinde ? 'Descanso en fin de semana (día pico) — visible para asesor y administración' : undefined}
      style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center', gap:3,
        width:'100%', height:36, borderRadius:6,
        border: descansoFinde ? '2px solid #C2410C' : '1px solid',
        fontWeight:500, fontSize:11, cursor: soloLectura ? 'default' : 'pointer',
      }}>
      {descansoFinde && <span style={{ fontSize: 10 }}>⚠</span>}
      {texto}
    </button>
  );
}

function HorarioCellModal({ colab, dia, valor, onClose, onSave }) {
  const [tipo, setTipo] = useState(valor?.tipo || 'trabaja');
  const [entrada, setEntrada] = useState(valor?.entrada || '09:00');
  const [salida, setSalida] = useState(valor?.salida || '17:00');

  function submit() {
    if (tipo === 'trabaja') onSave({ tipo, entrada, salida });
    else onSave({ tipo });
  }

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" style={{maxWidth: 420}} onClick={e=>e.stopPropagation()}>
        <div className="p-6 pb-4" style={{borderBottom:'1px solid var(--border)'}}>
          <h2 className="text-lg font-medium">{colab?.nombre} {colab?.apellidoPaterno}</h2>
          <p className="text-sm text-gray-500 mt-0.5">{dia} · ¿Qué tiene asignado?</p>
        </div>
        <div className="p-6 space-y-4">
          <div className="grid grid-cols-3 gap-2">
            {[
              { v:'trabaja', label:'Trabaja' },
              { v:'descanso', label:'Descanso' },
              { v:'vacaciones', label:'Vacaciones' },
              { v:'pcgs', label:'Permiso c/goce' },
              { v:'psgs', label:'Permiso s/goce' },
            ].map(opt => (
              <button key={opt.v} onClick={() => setTipo(opt.v)}
                className="py-2 rounded-lg text-[13px] font-medium border"
                style={tipo===opt.v
                  ? {background:'var(--lem)', color:'white', borderColor:'var(--lem)'}
                  : {background:'white', borderColor:'var(--border-strong)', color:'var(--text-soft)'}}>
                {opt.label}
              </button>
            ))}
          </div>

          {tipo === 'trabaja' && (
            <div className="grid grid-cols-2 gap-3 fade-in">
              <div>
                <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Hora de entrada</label>
                <input type="time" value={entrada} onChange={e=>setEntrada(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border text-sm bg-white num" style={{borderColor:'var(--border-strong)'}} />
              </div>
              <div>
                <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Hora de salida</label>
                <input type="time" value={salida} onChange={e=>setSalida(e.target.value)}
                  className="w-full px-3 py-2 rounded-lg border text-sm bg-white num" style={{borderColor:'var(--border-strong)'}} />
              </div>
            </div>
          )}
          {tipo === 'descanso' && <p className="text-sm text-gray-500 fade-in">Este colaborador descansa ese día.</p>}
          {tipo === 'vacaciones' && <p className="text-sm text-gray-500 fade-in">Este colaborador estará de vacaciones ese día.</p>}
          {tipo === 'pcgs' && <p className="text-sm text-gray-500 fade-in">Permiso <strong>con</strong> goce de sueldo. En la pre-nómina aparecerá como PCGS.</p>}
          {tipo === 'psgs' && <p className="text-sm text-gray-500 fade-in">Permiso <strong>sin</strong> goce de sueldo. En la pre-nómina aparecerá como PSGS.</p>}
        </div>
        <div className="px-6 py-4 flex justify-between gap-2" style={{borderTop:'1px solid var(--border)'}}>
          <button onClick={() => onSave(null)} className="btn btn-ghost text-gray-500">Limpiar</button>
          <div className="flex gap-2">
            <button onClick={onClose} className="btn btn-secondary">Cancelar</button>
            <button onClick={submit} className="btn btn-primary">Guardar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ========================================================================
   VACACIONES — solicitud, aprobación y saldos
   ======================================================================== */
function VacacionesScreen() {
  const { user, state } = useApp();
  // Tres pestañas: saldos, solicitar, aprobaciones
  const [tab, setTab] = useState(user.rol === 'gerente' || user.rol === 'asesor' ? 'solicitar' : 'aprobaciones');

  const tabs = [];
  // Solicitar: gerente (su equipo + él) y asesor (él mismo)
  if (user.rol === 'gerente' || user.rol === 'asesor') tabs.push({ key: 'solicitar', label: 'Solicitar' });
  // Aprobaciones: asesor, rh, admin
  if (user.rol === 'asesor' || user.rol === 'rh' || user.rol === 'admin') tabs.push({ key: 'aprobaciones', label: 'Aprobaciones' });
  // Saldos: todos los roles con acceso
  tabs.push({ key: 'saldos', label: 'Días pendientes' });
  // Historial
  tabs.push({ key: 'historial', label: 'Historial' });

  return (
    <>
      <TopBar title="Vacaciones" subtitle="Solicitudes, aprobaciones y saldos" />
      <div className="px-8 pt-5">
        <div className="flex gap-1 border-b" style={{ borderColor: 'var(--border)' }}>
          {tabs.map(t => (
            <button key={t.key} onClick={() => setTab(t.key)}
              className="px-4 py-2.5 text-sm font-medium relative"
              style={tab === t.key ? { color: 'var(--lem)' } : { color: 'var(--text-soft)' }}>
              {t.label}
              {tab === t.key && <div style={{ position:'absolute', bottom:-1, left:0, right:0, height:2, background:'var(--lem)' }} />}
            </button>
          ))}
        </div>
      </div>
      <div className="p-8 pt-6">
        {tab === 'solicitar' && <VacSolicitar />}
        {tab === 'aprobaciones' && <VacAprobaciones />}
        {tab === 'saldos' && <VacSaldos />}
        {tab === 'historial' && <VacHistorial />}
      </div>
    </>
  );
}

/* --- Lista de colaboradores que el usuario puede gestionar para vacaciones --- */
function colaboradoresGestionables(state, user) {
  const todos = state.colaboradores.filter(c => c.estatus === 'activo');
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    // Su equipo + él mismo
    return todos.filter(c => ids.includes(c.sucursalId) || c.usuarioId === user.id);
  }
  if (user.rol === 'asesor') {
    // El asesor solicita solo las suyas (su propio registro de colaborador)
    return todos.filter(c => c.usuarioId === user.id);
  }
  return todos;
}

/* --- Pestaña: Solicitar vacaciones --- */
function VacSolicitar() {
  const { user, state, setState, addAuditLog, toast } = useApp();
  const gestionables = colaboradoresGestionables(state, user);
  const [colabId, setColabId] = useState(gestionables[0]?.id || '');
  const [inicio, setInicio] = useState('');
  const [fin, setFin] = useState('');
  const [motivo, setMotivo] = useState('');
  const [error, setError] = useState('');

  const colab = state.colaboradores.find(c => c.id === colabId);
  const saldo = colab ? saldoVacaciones(state, colab) : null;
  const diasSolicitados = (inicio && fin) ? diasEntreFechas(inicio, fin) : 0;

  function enviar() {
    setError('');
    if (!colabId) { setError('Selecciona un colaborador.'); return; }
    if (!inicio || !fin) { setError('Indica la fecha de inicio y fin.'); return; }
    if (new Date(fin) < new Date(inicio)) { setError('La fecha fin no puede ser anterior a la de inicio.'); return; }
    if (diasSolicitados > saldo.pendientes) {
      setError(`Solo tiene ${saldo.pendientes} día(s) disponible(s). No puede solicitar ${diasSolicitados}.`);
      return;
    }
    const nueva = {
      id: 'vac_' + Date.now().toString(36),
      colaboradorId: colabId,
      fechaInicio: inicio,
      fechaFin: fin,
      diasNaturales: diasSolicitados,
      motivo: motivo.trim(),
      estado: 'pendiente',
      solicitanteId: user.id,
      fechaSolicitud: new Date().toISOString(),
    };
    setState({ ...state, vacaciones: [...(state.vacaciones || []), nueva] });
    addAuditLog({ modulo: 'vacaciones', accion: 'solicitar', entidad: nueva.id,
      valorAnterior: null, valorNuevo: { colaborador: colab.nombre, dias: diasSolicitados } });
    toast('Solicitud de vacaciones enviada.');
    setInicio(''); setFin(''); setMotivo('');
  }

  if (gestionables.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No tienes colaboradores para gestionar vacaciones.
    </div>;
  }

  return (
    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div className="lg:col-span-2 bg-white rounded-xl shadow-card p-6">
        <h3 className="text-base font-medium mb-4">Nueva solicitud de vacaciones</h3>
        <div className="space-y-4">
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Colaborador</label>
            <select value={colabId} onChange={e => { setColabId(e.target.value); setError(''); }}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)' }}>
              {gestionables.map(c => (
                <option key={c.id} value={c.id}>{c.nombre} {c.apellidoPaterno} {c.apellidoMaterno}</option>
              ))}
            </select>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha de inicio</label>
              <input type="date" value={inicio} onChange={e => { setInicio(e.target.value); setError(''); }}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
            </div>
            <div>
              <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Fecha de fin</label>
              <input type="date" value={fin} onChange={e => { setFin(e.target.value); setError(''); }}
                className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white num" style={{ borderColor: 'var(--border-strong)' }} />
            </div>
          </div>
          <div>
            <label className="text-[11px] uppercase tracking-wider text-gray-500 font-medium mb-1 block">Motivo / comentarios <span className="text-gray-400 normal-case">(opcional)</span></label>
            <textarea value={motivo} onChange={e => setMotivo(e.target.value)}
              className="w-full px-3 py-2.5 rounded-lg border text-sm bg-white" style={{ borderColor: 'var(--border-strong)', minHeight: 70 }}
              placeholder="Ej. vacaciones familiares" />
          </div>
          {error && <div className="text-[12px] flex items-center gap-1.5" style={{ color: '#8C1F1B' }}>
            <Icon name="alert" size={12} /> {error}</div>}
          <div className="flex justify-end">
            <button onClick={enviar} className="btn btn-primary"><Icon name="calendar" size={14} /> Enviar solicitud</button>
          </div>
        </div>
      </div>

      {/* Panel de saldo del colaborador seleccionado */}
      {saldo && (
        <div className="bg-white rounded-xl shadow-card p-6 h-fit">

            <div className="flex justify-between text-sm">
              <span className="text-gray-500">Antigüedad</span>
              <span className="font-medium">{saldo.aniosCumplidos} año(s)</span>
            </div>
            <div className="flex justify-between text-sm">
              <span className="text-gray-500">Le corresponden</span>
              <span className="num font-medium">{saldo.diasCorresponden} días</span>
            </div>
            <div className="flex justify-between text-sm">
              <span className="text-gray-500">Ya tomados</span>
              <span className="num font-medium">{saldo.tomados} días</span>
            </div>
            <div className="flex justify-between text-sm pt-2" style={{ borderTop: '1px solid var(--border)' }}>
              <span className="font-medium">Disponibles</span>
              <span className="num font-medium text-lg" style={{ color: saldo.pendientes > 0 ? '#0E5A42' : '#8C1F1B' }}>{saldo.pendientes} días</span>
            </div>
            {diasSolicitados > 0 && (
              <div className="mt-2 p-2.5 rounded-lg text-sm" style={{ background: 'var(--lem-light)', color: 'var(--lem-dark)' }}>
                Esta solicitud: <strong className="num">{diasSolicitados} día(s)</strong> naturales
              </div>
            )}
            <div className="text-[11px] text-gray-400 pt-1">
              Próximo aniversario: {fmtFecha(saldo.proxAniv)}. Lo que no se goce antes se pierde.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* --- Pestaña: Aprobaciones --- */
function VacAprobaciones() {
  const { user, state, setState, addAuditLog, toast } = useApp();

  // Quién puede aprobar qué:
  // - colaboradores normales y gerentes: asesor, rh, admin
  // - asesores: solo admin
  // - corporativo: solo admin
  function puedeAprobar(vac) {
    const colab = state.colaboradores.find(c => c.id === vac.colaboradorId);
    if (!colab) return false;
    const puesto = SEED.puestos.find(p => p.id === colab.puestoId);
    const esAsesor = puesto?.cat === 'asesor';
    const esCorp = puesto?.cat === 'corp';
    if (esAsesor || esCorp) return user.rol === 'admin';
    return user.rol === 'asesor' || user.rol === 'rh' || user.rol === 'admin';
  }

  const pendientes = (state.vacaciones || []).filter(v => v.estado === 'pendiente');
  const visibles = pendientes.filter(puedeAprobar);

  function resolver(vacId, nuevoEstado, motivoRechazo) {
    const nuevas = (state.vacaciones || []).map(v => v.id === vacId
      ? { ...v, estado: nuevoEstado, aprobadorId: user.id, fechaResolucion: new Date().toISOString(),
          motivoRechazo: motivoRechazo || null }
      : v);
    setState({ ...state, vacaciones: nuevas });
    const v = state.vacaciones.find(x => x.id === vacId);
    const colab = state.colaboradores.find(c => c.id === v.colaboradorId);
    addAuditLog({ modulo: 'vacaciones', accion: nuevoEstado === 'aprobada' ? 'aprobar' : 'rechazar',
      entidad: vacId, valorAnterior: { estado: 'pendiente' }, valorNuevo: { estado: nuevoEstado } });
    toast(nuevoEstado === 'aprobada'
      ? `Vacaciones de ${colab?.nombre} aprobadas.`
      : `Solicitud de ${colab?.nombre} rechazada.`);
  }

  const [rechazando, setRechazando] = useState(null);

  if (visibles.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      No hay solicitudes de vacaciones pendientes de tu aprobación.
    </div>;
  }

  return (
    <>
      <div className="space-y-3">
        {visibles.map(v => {
          const colab = state.colaboradores.find(c => c.id === v.colaboradorId);
          const suc = (state.sucursales || SEED.sucursales).find(s => s.id === colab?.sucursalId);
          const un = SEED.unidades.find(u => u.id === suc?.unId);
          const solicitante = getUsuarios(state).find(u => u.id === v.solicitanteId);
          const saldo = colab ? saldoVacaciones(state, colab) : null;
          return (
            <div key={v.id} className="bg-white rounded-xl shadow-card p-5">
              <div className="flex items-start gap-4">
                <div className="avatar" style={{ width: 42, height: 42, background: un?.color || '#999' }}>
                  {colab?.nombre[0]}{colab?.apellidoPaterno[0]}
                </div>
                <div className="flex-1">
                  <div className="font-medium">{colab?.nombre} {colab?.apellidoPaterno} {colab?.apellidoMaterno}</div>
                  <div className="text-xs text-gray-500 mb-2">{suc?.nombre} · {SEED.puestos.find(p => p.id === colab?.puestoId)?.nombre}</div>
                  <div className="flex flex-wrap gap-x-6 gap-y-1 text-sm">
                    <div><span className="text-gray-500">Periodo:</span> <span className="num">{fmtFecha(v.fechaInicio)}</span> – <span className="num">{fmtFecha(v.fechaFin)}</span></div>
                    <div><span className="text-gray-500">Días:</span> <span className="num font-medium">{v.diasNaturales}</span></div>
                    {saldo && <div><span className="text-gray-500">Disponibles:</span> <span className="num font-medium">{saldo.pendientes}</span></div>}
                  </div>
                  {v.motivo && <div className="text-sm text-gray-600 mt-1.5">"{v.motivo}"</div>}
                  <div className="text-[11px] text-gray-400 mt-1.5">Solicitó {solicitante?.nombre} · {fmtFecha(v.fechaSolicitud)}</div>
                </div>
                <div className="flex flex-col gap-2">
                  <button onClick={() => resolver(v.id, 'aprobada')} className="btn btn-success"><Icon name="check" size={14} /> Aprobar</button>
                  <button onClick={() => setRechazando(v.id)} className="btn btn-danger"><Icon name="x" size={14} /> Rechazar</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {rechazando && (
        <VacRechazoModal
          onClose={() => setRechazando(null)}
          onConfirm={(motivo) => { resolver(rechazando, 'rechazada', motivo); setRechazando(null); }}
        />
      )}
    </>
  );
}

/* --- Pestaña: Historial --- */
function VacHistorial() {
  const { user, state } = useApp();
  let lista = [...(state.vacaciones || [])];
  // Filtrar por alcance
  if (user.rol === 'gerente') {
    const ids = sucursalesDeGerente(state, user.id);
    lista = lista.filter(v => {
      const c = state.colaboradores.find(x => x.id === v.colaboradorId);
      return c && (ids.includes(c.sucursalId) || c.usuarioId === user.id);
    });
  } else if (user.rol === 'asesor') {
    const sucs = sucursalesDeAsesor(state, user.id);
    lista = lista.filter(v => {
      const c = state.colaboradores.find(x => x.id === v.colaboradorId);
      return c && (sucs.includes(c.sucursalId) || c.usuarioId === user.id);
    });
  }
  lista.sort((a, b) => new Date(b.fechaSolicitud) - new Date(a.fechaSolicitud));

  if (lista.length === 0) {
    return <div className="bg-white rounded-xl p-8 text-center text-sm text-gray-500 shadow-card">
      Aún no hay solicitudes de vacaciones registradas.

  return (
    <div className="bg-white rounded-xl overflow-hidden shadow-card">
      <table className="lem-table w-full">
        <thead><tr>
          <th>Colaborador</th><th>Periodo</th><th>Días</th><th>Estado</th><th>Solicitada</th>
        </tr></thead>
        <tbody>
          {lista.slice(0, 60).map(v => {
            const colab = state.colaboradores.find(c => c.id === v.colaboradorId);
            return (
              <tr key={v.id}>
                <td className="font-medium">{colab?.nombre} {colab?.apellidoPaterno}</td>
